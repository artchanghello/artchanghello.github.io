function renderHerbs() {
  const container = document.getElementById("herbContainer");
  const emptyState = document.getElementById("emptyState");
  const filtered = filterHerbs();

  if (filtered.length === 0) {
    container.innerHTML = "";
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  const grouped = {};
  filtered.forEach(h => {
    const key = h.subcat || h.cat;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(h);
  });

  let html = "";
  Object.keys(grouped).forEach(subcat => {
    html += `<div class="sub-title">${subcat}（` + grouped[subcat].length + `味）</div>`;
    html += `<div class="herb-grid">`;
    grouped[subcat].forEach((h, i) => {
      const globalIdx = HERBS.indexOf(h);
      html += `
        <div class="herb-card" onclick="openModal(${globalIdx})" role="button" tabindex="0"
             onkeydown="if(event.key==='Enter')openModal(${globalIdx})">
          <div class="card-header">
            <div class="herb-name">${h.name}</div>
            <div class="herb-cat">${h.subcat}</div>
          </div>
          <div class="herb-xingwei">性味：${h.xingwei} ｜ 归经：${h.guijing}</div>
          <div class="herb-gongxiao">${h.gongxiao}</div>
          ${h.daibiao ? `<div class="herb-daibiao"><span class="daibiao-label">代表方：</span>${h.daibiao}</div>` : ""}
        </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

function handleSearch() {
  currentSearch = document.getElementById("searchInput").value.trim();
  renderHerbs();
}
document.getElementById("searchInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleSearch();
});

document.querySelectorAll(".cat-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".cat-tab").forEach(t => {
      t.classList.remove("active");
      t.setAttribute("aria-selected", "false");
    });
    tab.classList.add("active");
    tab.setAttribute("aria-selected", "true");
    currentCat = tab.dataset.cat;
    renderHerbs();
  });
});

function openModal(idx) {
  const h = HERBS[idx];
  document.getElementById("modalName").textContent = h.name;
  document.getElementById("modalCat").textContent = `${h.cat} · ${h.subcat}`;
  document.getElementById("modalXingwei").textContent = h.xingwei;
  document.getElementById("modalGuijing").textContent = h.guijing;
  document.getElementById("modalGongxiao").textContent = h.gongxiao;
  document.getElementById("modalDaibiao").textContent = h.daibiao || "暂无";


  document.getElementById("modalDaibiaoSection").style.display = h.daibiao ? "block" : "none";

  document.getElementById("modalOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("active");
  document.body.style.overflow = "";
}

document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModal();
});

renderHerbs();
</script>
