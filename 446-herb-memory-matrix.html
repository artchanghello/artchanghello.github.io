<title>446 药材三阶记忆</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Noto Serif SC','STSong','SimSun','PingFang SC',serif;
  background:#F5F0E8;color:#292524;padding:8px;
  -webkit-font-smoothing:antialiased;
  font-size:14px;line-height:1.65;
}
.back-home{display:flex;align-items:center;gap:4px;max-width:520px;margin:0 auto 6px;padding:0 2px;font-size:12px;color:#78716C;text-decoration:none;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
.back-home:hover{color:#7C5E10}
.back-home svg{width:14px;height:14px;flex-shrink:0}
.wrap{max-width:520px;margin:0 auto;background:#FFFCF7;border-radius:14px;overflow:hidden;border:0.5px solid #E8E0D0}
.accent{height:4px;background:linear-gradient(90deg,#A32D2D,#D85A30,#BA7517,#F1EFE8,#85B7EB,#378ADD,#0C447C)}
.inner{padding:14px 10px 18px}
h1{font-size:20px;font-weight:700;text-align:center;letter-spacing:2px;margin-bottom:2px;color:#292524}
.sub{text-align:center;font-size:12px;color:#A8A29E;margin-bottom:10px}

/* Controls */
.controls{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 14px;border-radius:14px;border:0.5px solid #D3D1C7;background:transparent;font-size:12px;cursor:pointer;transition:all .2s;color:#5F5E5A;font-family:inherit}
.filter-btn.active{background:#7C5E10;color:#fff;border-color:#7C5E10}
.filter-btn:hover:not(.active){background:#F1EFE8}

/* Stage tabs */
.stage-tabs{display:flex;gap:4px;margin-bottom:12px;background:#F5F0E8;border-radius:10px;padding:3px}
.stage-tab{flex:1;padding:8px 6px;border-radius:8px;border:none;background:transparent;font-size:12px;cursor:pointer;color:#A8A29E;font-family:inherit;text-align:center;transition:all .2s}
.stage-tab.active{background:#FFFCF7;color:#292524;box-shadow:0 1px 4px rgba(0,0,0,0.06);font-weight:600}
.stage-tab .st-num{display:block;font-size:10px;color:#A8A29E;margin-bottom:1px}
.stage-tab.active .st-num{color:#7C5E10}

/* Legend */
.legend{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.legend-item{display:flex;align-items:center;gap:3px;font-size:10px;color:#78716C}
.legend-dot{width:10px;height:10px;border-radius:3px;border:0.5px solid #E8E0D0}
.l-h{background:#FEF2F2}.l-w{background:#FFF7ED}.l-m{background:#FAFAF5}.l-c{background:#F0F7FF}.l-cd{background:#EFF6FF}

/* ====== 性味景观 ====== */
.landscape-toggle{display:flex;align-items:center;gap:6px;margin-bottom:10px;cursor:pointer;user-select:none}
.landscape-toggle .lt-arrow{font-size:10px;transition:transform .2s;color:#A8A29E}
.landscape-toggle.open .lt-arrow{transform:rotate(90deg)}
.landscape-toggle .lt-label{font-size:12px;color:#5F5E5A}
#landscapeView{margin-bottom:8px;overflow:hidden}
.flavor-band{margin-bottom:6px;padding:6px 8px;background:#FFFCF7;border-radius:8px;border:0.5px solid #E8E0D0}
.flavor-band-header{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.flavor-label{font-size:14px;font-weight:700;min-width:20px;text-align:center}
.flavor-sense{font-size:10px;color:#A8A29E;line-height:1.4}
.flavor-chips{display:flex;flex-wrap:wrap;gap:2px}
.flavor-chip{padding:1px 6px;border-radius:3px;font-size:10px;cursor:pointer;white-space:nowrap;border:0.5px solid transparent}
.flavor-chip:active{opacity:.7}
.flavor-hot{background:#FEF2F2;color:#A32D2D;border-color:#FECACA}
.flavor-warm{background:#FFF7ED;color:#BA7517;border-color:#FED7AA}
.flavor-mid{background:#FAFAF5;color:#5F5E5A;border-color:#E8E0D0}
.flavor-cool{background:#F0F7FF;color:#378ADD;border-color:#BFDBFE}
.flavor-cold{background:#EFF6FF;color:#185FA5;border-color:#BFDBFE}
#stage1View{}
.meri-card{margin-bottom:8px;padding:12px;background:#FFFCF7;border-radius:10px;border:0.5px solid #E8E0D0;overflow:hidden}
.meri-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.meri-name{font-size:16px;font-weight:700;color:#292524}
.meri-tag{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.meri-count{font-size:12px;color:#A8A29E}
.meri-pattern{font-size:12px;color:#78716C;margin-bottom:8px;line-height:1.7}
.meri-herbs{display:flex;flex-wrap:wrap;gap:4px}
.meri-chip{padding:4px 9px;border-radius:5px;font-size:11px;border:0.5px solid #E8E0D0;cursor:pointer;transition:.15s;white-space:nowrap}
.meri-chip:active{opacity:.7}
.pair-divider{text-align:center;font-size:10px;color:#C5C0BB;margin:0 0 4px;letter-spacing:2px}
.pair-divider span{font-size:9px;margin:0 4px;color:#D3D1C7}

/* ====== STAGE 2: 方剂锚定 ====== */
#stage2View{display:none}
.fang-card{margin-bottom:10px;padding:12px 14px;background:#FFFCF7;border-radius:10px;border:0.5px solid #E8E0D0;overflow:hidden}
.fang-card-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:4px}
.fang-num{font-size:10px;color:#A8A29E;font-weight:400}
.fang-name{font-size:17px;font-weight:700;color:#292524;letter-spacing:1px}
.fang-meta{font-size:11px;color:#A8A29E}
.fang-zhuzhi{font-size:12px;color:#78716C;margin-bottom:8px;line-height:1.6;padding:6px 10px;background:#F5F0E8;border-radius:6px}
.fang-herbs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.fang-herb-chip{padding:6px 10px;border-radius:6px;font-size:12px;line-height:1.6;border:0.5px solid #E8E0D0;min-width:0}
.fang-herb-chip .fh-name{font-weight:600;font-size:13px;color:#292524;display:block;margin-bottom:1px}
.fang-herb-chip .fh-meta{color:#A8A29E;font-size:11px;line-height:1.5}
.fang-herb-chip .fh-meta-nf{color:#C5C0BB;font-size:11px;font-style:italic}
.fang-herb-chip .fh-xing{font-weight:500;color:#7C5E10}
/* 3D 映射药材 */
.fang-herb-3d{padding:10px 12px;border-radius:8px;border:0.5px solid #E8E0D0;min-width:0;width:100%}
.fh3d-name{font-size:14px;font-weight:700;color:#292524;display:block;margin-bottom:4px;letter-spacing:0.5px}
.fh3d-dose{font-size:10px;font-weight:400;color:#A8A29E;display:inline-block;margin-left:2px;text-transform:none}
.fh3d-row{display:flex;gap:3px;align-items:baseline;font-size:11px;line-height:1.75;margin:0}
.fh3d-label{font-size:9px;color:#A8A29E;min-width:18px;flex-shrink:0}
.fh3d-val{color:#5F5E5A;font-size:11px}
.fh3d-ding{font-weight:600;color:#7C5E10;font-size:11px}
.fh3d-task{margin-top:5px;padding-top:4px;border-top:0.5px dashed #E8E0D0;font-size:12px;font-weight:600;color:#292524;line-height:1.5}
.fh3d-task .fh3d-task-label{font-size:9px;color:#A8A29E;font-weight:400;display:inline-block;margin-right:3px}
.fang-pattern{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.fang-pattern-chip{padding:3px 8px;border-radius:4px;font-size:10px;border:0.5px solid #E8E0D0;background:#FAFAF5;color:#78716C}
.fang-pattern-chip strong{color:#292524;font-size:11px}

/* ====== STAGE 3: 鉴别对比 ====== */
#stage3View{display:none}
.contrast-pair{margin-bottom:10px;padding:12px 14px;background:#FFFCF7;border-radius:10px;border:0.5px solid #E8E0D0}
.contrast-title{font-size:14px;font-weight:600;margin-bottom:8px;color:#292524;padding-bottom:6px;border-bottom:0.5px solid #E8E0D0}
.contrast-herbs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.contrast-herb{padding:10px 12px;border-radius:8px;border:0.5px solid #E8E0D0;font-size:12px;line-height:1.8}
.contrast-herb .ch-name{font-size:15px;font-weight:600;color:#292524;display:block;margin-bottom:2px}
.contrast-herb .ch-row{display:flex;gap:6px;align-items:baseline;margin:1px 0}
.contrast-herb .ch-label{font-size:10px;color:#A8A29E;min-width:20px}
.contrast-herb .ch-val{font-size:12px;color:#444441}
.contrast-herb .ch-diff{font-weight:600;color:#7C5E10}

/* Orphan section */
.orphan-section{margin-top:14px;padding:12px;text-align:center;color:#A8A29E;font-size:12px;background:#FAFAF5;border-radius:10px;border:0.5px dashed #E8E0D0;line-height:1.8}
.orphan-section strong{color:#78716C}
</style>
</head>

  "大热":"热以胜寒·回阳救逆","热":"热以胜寒·温中散寒",
  "温":"温以散寒·温通经脉","微温":"微温助阳·缓散寒邪",
  "平":"平和不偏·调和补益","微寒":"微寒清热·凉润不伤正",
  "凉":"凉以清热·疏散风热","寒":"寒以泻火·清热凉血",
  "大寒":"大寒胜热·泻火除烦"
};
const WEI_DINGFA = {
  "辛":"辛→散行气血","甘":"甘→补缓中和","苦":"苦→泄燥降",
  "酸":"酸→收固涩","咸":"咸→软润下","淡":"淡→渗利湿"
};
const GUI_DINGWEI = {
  "肺":"肺（司呼吸·主宣降）","脾":"脾（主运化·升清）","心":"心（主血脉·藏神）",
  "肝":"肝（主疏泄·藏血）","肾":"肾（主藏精·纳气）","胃":"胃（主受纳·降浊）",
  "胆":"胆（主决断·藏精汁）","大肠":"大肠（主传导·糟粕）","小肠":"小肠（泌别清浊）",
  "膀胱":"膀胱（主气化·藏津）","心包":"心包（代心受邪）","三焦":"三焦（通调水道）"
};
function deriveDingxing(herb){ return XING_DINGXING[parseXing(herb.xing)]||"平和不偏·调和补益"; }
function deriveDingfa(herb){
  const weis = herb.wei.split('、').map(w=>w.trim()).filter(w=>WEI_DINGFA[w]);
  return weis.map(w=>WEI_DINGFA[w]).join(' + ') || '甘→补缓中和';
}
function deriveDingwei(herb){
  return (herb.gui||[]).map(g=>GUI_DINGWEI[g]||g).join(' · ') || '';
}
function deriveTask(fangName, herbName){
  if(RW_MAP[fangName] && RW_MAP[fangName][herbName]) return RW_MAP[fangName][herbName];
  const h = findHerbAlias(herbName);
  return h ? h.gongxiao : '';
}

// ====== 工具函数 ======
const NATURE_ORDER = ["大热","热","温","微温","平","微寒","凉","寒","大寒"];
const MERIDIANS = ["小肠","膀胱","大肠","胃","三焦","胆","肺","脾","心","肾","心包","肝"];
const MERI_PERSONALITY = {
  "肺":"肺喜辛散·主宣降","脾":"脾家喜甘温·主运化","心":"心喜苦寒·主血脉神",
  "肝":"肝喜辛散苦泄·主疏泄","肾":"肾喜咸甘温·主藏精","胃":"胃喜甘平·主受纳",
  "胆":"胆喜苦·主决断","大肠":"大肠喜润·主传导","小肠":"小肠喜淡·主分清泌浊",
  "膀胱":"膀胱喜淡·主气化","心包":"心包代心受邪","三焦":"三焦为水道"
};

function getHeatClass(xing){
  if(xing==="大热"||xing==="热") return "hot";
  if(xing==="温"||xing==="微温") return "warm";
  if(xing==="平") return "mid";
  if(xing==="微寒"||xing==="凉") return "cool";
  if(xing==="寒"||xing==="大寒") return "cold";
  return "mid";
}
function getHeatBg(hc){
  return {hot:"#FEF2F2",warm:"#FFF7ED",mid:"#FAFAF5",cool:"#F0F7FF",cold:"#EFF6FF"}[hc]||"#FAFAF5";
}
function parseXing(raw){
  if(!raw) return "平";
  if(raw.includes("大热")) return "大热";
  if(raw.includes("大寒")) return "大寒";
  if(raw.includes("热")&&!raw.includes("微")) return "热";
  if(raw.includes("微温")) return "微温";
  if(raw.includes("温")&&!raw.includes("微")&&!raw.includes("大")) return "温";
  if(raw.includes("微寒")) return "微寒";
  if(raw.includes("凉")) return "凉";
  if(raw.includes("寒")&&!raw.includes("微")&&!raw.includes("大")) return "寒";
  return "平";
}

let currentCat = "all";
let currentStage = 1;
function filterHerbs(){ return currentCat==="all"?HERBS:HERBS.filter(h=>h.cat===currentCat); }
function filterFormulas(){ return currentCat==="all"?FANG72:FANG72.filter(f=>f.cat===currentCat); }

// ====== 第一阶：归经谱系 ======
function renderStage1(){
  const herbs = filterHerbs();
  const meriMap = {};
  MERIDIANS.forEach(m=>{meriMap[m]=[]});
  herbs.forEach(h=>{(h.gui||[]).forEach(m=>{if(meriMap[m])meriMap[m].push(h)})});
  
  const meriSorted = MERIDIANS.filter(m=>meriMap[m].length>0);
  
  let html = '';
  const PAIR_NAMES = ["太阳病","阳明病","少阳病","太阴病","少阴病","厥阴病"];
const LIUJING_TAG = {
  "太阳病":"城墙卫兵·最外层", "阳明病":"灶台大火·里实热",
  "少阳病":"门轴合页·半表里", "太阴病":"潮湿仓库·脾阳虚",
  "少阴病":"炉底火种·心肾根", "厥阴病":"黎明破晓·阴阳搏"
};
  let pairIdx = 0;
  meriSorted.forEach((m,i)=>{
    const mherbs = meriMap[m];
    const xingDist = {};
    mherbs.forEach(h=>{const x=parseXing(h.xing);xingDist[x]=(xingDist[x]||0)+1});
    const warm = ["大热","热","温","微温"], cold = ["微寒","凉","寒","大寒"];
    let wc=0,cc=0;
    Object.entries(xingDist).forEach(([x,c])=>{if(warm.includes(x))wc+=c;if(cold.includes(x))cc+=c});
    const lean=wc>cc?"温":"寒";
    const leanBg=lean==="温"?"#FEF2F2":"#EFF6FF", leanColor=lean==="温"?"#A32D2D":"#185FA5";
    
    const xingStr = Object.entries(xingDist).sort((a,b)=>NATURE_ORDER.indexOf(a[0])-NATURE_ORDER.indexOf(b[0])).map(([x,c])=>`${x}${c}味`).join(' · ');
    const weiDist = {};
    mherbs.forEach(h=>{h.wei.split('、').forEach(w=>{const wt=w.trim();if(wt)weiDist[wt]=(weiDist[wt]||0)+1})});
    const weiStr = Object.entries(weiDist).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([w,c])=>`${w}${c}味`).join(' · ');
    
    html += `<div class="meri-card" style="border-left:3px solid ${leanColor}">`;
    if(i%2===0 && pairIdx<PAIR_NAMES.length){
      html += `<div class="pair-divider">${PAIR_NAMES[pairIdx]}<span>${LIUJING_TAG[PAIR_NAMES[pairIdx]]}</span></div>`;
    }
    html += `<div class="meri-card-header"><span class="meri-name">${m}经</span><span class="meri-tag" style="background:${leanBg};color:${leanColor}">${lean==="温"?"温性为主":"寒凉为主"}</span><span class="meri-count">${mherbs.length}味</span></div>`;
    html += `<div class="meri-pattern"><strong>${MERI_PERSONALITY[m]||""}</strong><br>性：${xingStr}<br>味：${weiStr}</div>`;
    html += `<div class="meri-herbs">`;
    mherbs.forEach(h=>{
      const hc=getHeatClass(parseXing(h.xing));
      html += `<span class="meri-chip" style="background:${getHeatBg(hc)}">${h.name}</span>`;
    });
    html += `</div></div>`;
    if(i%2===1) pairIdx++;
  });
  document.getElementById('stage1View').innerHTML = html;
}

// ====== 第二阶：方剂锚定（72首完整数据） ======
function renderStage2(){
  const formulas = filterFormulas();
  const catOrder = {四虚:1,四实:2,六外感:3};
  const sorted = [...formulas].sort((a,b)=>{
    const ca=catOrder[a.cat]||4,cb=catOrder[b.cat]||4;
    return ca!==cb?ca-cb:a["#"]-b["#"];
  });
  
  let html = '';
  sorted.forEach(f=>{
    // Collect aggregate stats (for summary bar)
    const xings=new Set(), weis=new Set(), guis=new Set();
    let herb3d = '';
    
    f.herbs.forEach(hn=>{
      const hh = findHerbAlias(hn);
      if(hh){
        xings.add(parseXing(hh.xing));
        hh.wei.split('、').forEach(w=>weis.add(w.trim()));
        (hh.gui||[]).forEach(g=>guis.add(g));
        const hc=getHeatClass(parseXing(hh.xing));
        
        // 三维映射推导
        const dingxing = deriveDingxing(hh);
        const dingfa = deriveDingfa(hh);
        const dingwei = deriveDingwei(hh);
        const task = deriveTask(f.name, hn);
        
        herb3d += `<div class="fang-herb-3d" style="background:${getHeatBg(hc)}">`;
        const doseInfo = DOSAGE_MAP[f.name]?.[hn] || '';
        herb3d += `<span class="fh3d-name">${hh.name}${doseInfo ? ` <span class="fh3d-dose">${doseInfo}</span>` : ''}</span>`;
        herb3d += `<div class="fh3d-row"><span class="fh3d-label">性</span><span class="fh3d-val">${hh.xing} → </span><span class="fh3d-ding">${dingxing}</span></div>`;
        herb3d += `<div class="fh3d-row"><span class="fh3d-label">味</span><span class="fh3d-val">${hh.wei} → </span><span class="fh3d-ding">${dingfa}</span></div>`;
        herb3d += `<div class="fh3d-row"><span class="fh3d-label">归</span><span class="fh3d-val">${hh.gui.join('、')} → </span><span class="fh3d-ding">${dingwei}</span></div>`;
        herb3d += `<div class="fh3d-task"><span class="fh3d-task-label">任务</span>${task}</div>`;
        herb3d += `</div>`;
      } else {
        herb3d += `<div class="fang-herb-chip" style="background:#F8F7F5">`;
        herb3d += `<span class="fh-name">${hn}</span>`;
        herb3d += `<span class="fh-meta-nf">（不在89味药材表中）</span></div>`;
      }
    });
    
    html += `<div class="fang-card">`;
    html += `<div class="fang-card-header">`;
    html += `<span class="fang-name"><span class="fang-num">#${f["#"]} </span>${f.name}</span>`;
    html += `<span class="fang-meta">${f.cat}·${f.subcat} · ${f.herbs.length}味</span>`;
    html += `</div>`;
    html += `<div class="fang-zhuzhi">${f.zhuzhi}</div>`;
    html += `<div class="fang-herbs" style="display:flex;flex-wrap:wrap;gap:6px">${herb3d}</div>`;
    if(xings.size>0){
      html += `<div class="fang-pattern">`;
      html += `<span class="fang-pattern-chip"><strong>性:</strong>${[...xings].join('、')}</span>`;
      html += `<span class="fang-pattern-chip"><strong>味:</strong>${[...weis].join('、')}</span>`;
      html += `<span class="fang-pattern-chip"><strong>归:</strong>${[...guis].join('、')}</span>`;
      html += `</div>`;
    }
    html += `</div>`;
  });
  
  document.getElementById('stage2View').innerHTML = html;
}

function renderStage3(){
  const herbs = filterHerbs();
  const herbNames = new Set(herbs.map(h=>h.name));
  let html = '';
  CONTRASTS.forEach(pair=>{
    const available = pair.herbs.filter(h=>herbNames.has(h.name));
    if(available.length<2) return;
    html += `<div class="contrast-pair"><div class="contrast-title">${pair.title}</div><div class="contrast-herbs">`;
    pair.herbs.forEach(h=>{
      if(!herbNames.has(h.name)) return;
      const hc=getHeatClass(parseXing(h.xing)),bg=getHeatBg(hc);
      html += `<div class="contrast-herb" style="background:${bg}">`;
      html += `<span class="ch-name">${h.name}</span>`;
      html += `<div class="ch-row"><span class="ch-label">性</span><span class="ch-val">${h.xing}</span></div>`;
      html += `<div class="ch-row"><span class="ch-label">味</span><span class="ch-val">${h.wei}</span></div>`;
      html += `<div class="ch-row"><span class="ch-label">归</span><span class="ch-val">${h.gui}</span></div>`;
      html += `<div class="ch-row"><span class="ch-label">功</span><span class="ch-val">${h.gongxiao}</span></div>`;
      html += `<div class="ch-row"><span class="ch-label">鉴</span><span class="ch-val ch-diff">${h.diff}</span></div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('stage3View').innerHTML = html || '<div style="text-align:center;color:#A8A29E;padding:20px;font-size:13px">当前筛选下无可对比药材</div>';
}

function switchStage(stage){
  currentStage = stage;
  document.querySelectorAll('.stage-tab').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-stage="${stage}"]`).classList.add('active');
  document.getElementById('stage1View').style.display = stage===1?'block':'none';
  document.getElementById('stage2View').style.display = stage===2?'block':'none';
  document.getElementById('stage3View').style.display = stage===3?'block':'none';
  if(stage===1) renderStage1();
  if(stage===2) renderStage2();
  if(stage===3) renderStage3();
}

// ====== 性味景观（感官映射） ======
const FLAVOR_SENSE = {
  辛:"如椒如姜·散而走窜",甘:"如饴如枣·缓而补益",
  苦:"如药如茶·燥而泄降",酸:"如梅如醋·收而固涩",
  咸:"如盐如海·软而润下",淡:"如水如露·渗而利湿"
};

function renderLandscape(){
  const herbs = filterHerbs();
  // Collect all wei values, split by 、
  const flavorHerbs = {辛:[],甘:[],苦:[],酸:[],咸:[],淡:[]};
  herbs.forEach(h=>{
    h.wei.split('、').forEach(w=>{
      const wt = w.trim();
      if(flavorHerbs[wt]) flavorHerbs[wt].push(h);
    });
  });
  
  let html = '';
  Object.entries(flavorHerbs).forEach(([flavor, fherbs])=>{
    if(fherbs.length===0) return;
    // Sort by 性 from hot to cold
    fherbs.sort((a,b)=>NATURE_ORDER.indexOf(parseXing(a.xing))-NATURE_ORDER.indexOf(parseXing(b.xing)));
    
    // Count 性 distribution
    const xingCnt={};
    fherbs.forEach(h=>{const x=parseXing(h.xing);xingCnt[x]=(xingCnt[x]||0)+1});
    const warm=["大热","热","温","微温"],cold=["微寒","凉","寒","大寒"];
    let wc=0,cc=0;
    Object.entries(xingCnt).forEach(([x,c])=>{if(warm.includes(x))wc+=c;if(cold.includes(x))cc+=c});
    const dominance = wc>cc?"温热为主":cc>wc?"寒凉为主":"寒热均衡";
    
    html += `<div class="flavor-band">`;
    html += `<div class="flavor-band-header">`;
    html += `<span class="flavor-label">${flavor}</span>`;
    html += `<span class="flavor-sense">${FLAVOR_SENSE[flavor]} · ${fherbs.length}味 · ${dominance}</span>`;
    html += `</div>`;
    html += `<div class="flavor-chips">`;
    fherbs.forEach(h=>{
      const hc = getHeatClass(parseXing(h.xing));
      html += `<span class="flavor-chip flavor-${hc}">${h.name}</span>`;
    });
    html += `</div></div>`;
  });
  
  document.getElementById('landscapeView').innerHTML = html;
}

function toggleLandscape(){
  const toggle = document.querySelector('.landscape-toggle');
  toggle.classList.toggle('open');
  const lv = document.getElementById('landscapeView');
  lv.style.display = toggle.classList.contains('open')?'block':'none';
  if(toggle.classList.contains('open') && !lv.innerHTML) renderLandscape();
}

    switchStage(currentStage);
  });
});
document.querySelectorAll('.stage-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{ switchStage(parseInt(btn.dataset.stage)); });
});

// ====== 初始化 ======
renderLandscape();
switchStage(1);
</script>
</body>
