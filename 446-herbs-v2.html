<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --secondary: #65A30D;
  --accent: #C2410C;
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-alt: #FFFBEB;
  --border: #E7E5E4;
  --text: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-heading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-body: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
  --fs-h1: clamp(1.75rem, 4vw, 2.25rem);
  --fs-h2: clamp(1.35rem, 3vw, 1.75rem);
  --fs-h3: clamp(1.15rem, 2.5vw, 1.35rem);
  --fs-body: clamp(0.95rem, 2vw, 1.05rem);
  --fs-small: clamp(0.85rem, 1.5vw, 0.9rem);
  --container-max: 1200px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.skip-link {
  position: absolute; top: -40px; left: 0;
  background: var(--primary); color: white;
  padding: 8px 16px; z-index: 10000;
  text-decoration: none; border-radius: 0 0 4px 0;
  transition: top 0.2s;
}
.skip-link:focus { top: 0; }

/* Nav */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(255, 248, 240, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 600; color: var(--primary);
  text-decoration: none;
}
.navbar .logo span { color: var(--secondary); }
.nav-links { display: flex; align-items: center; gap: 10px; }
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 18px;
  background: var(--primary); color: white !important;
  border-radius: var(--radius-sm); text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: background 0.25s ease, transform 0.15s ease;
  cursor: pointer; font-family: inherit;
}
.nav-btn:hover { background: var(--primary-light); }
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-btn.secondary { background: var(--secondary); }
.nav-btn.secondary:hover { background: #4D7C0F; }

/* Hero */
.hero {
  background: linear-gradient(135deg, #B45309 0%, #D97706 45%, #65A30D 100%);
  color: white; text-align: center;
  padding: 80px 24px 64px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
}
.hero * { position: relative; z-index: 1; }
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--fs-h1); font-weight: 600;
  margin-bottom: 12px; letter-spacing: 0.02em;
}
.hero p {
  font-size: var(--fs-body); opacity: 0.88;
  margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto;
}

/* Search */
.search-wrap {
  max-width: 520px; margin: 0 auto;
  display: flex; align-items: center;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 40px; overflow: hidden;
  backdrop-filter: blur(4px); transition: border-color 0.25s ease;
}
.search-wrap:focus-within {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.2);
}
.search-wrap input {
  flex: 1; padding: 14px 24px; border: none;
  background: transparent; color: white; font-size: 15px; outline: none;
  font-family: var(--font-body);
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
.search-wrap button {
  padding: 0 20px; border: none;
  background: transparent; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: color 0.2s; display: flex; align-items: center;
}
.search-wrap button:hover { color: white; }
.search-wrap button svg { width: 20px; height: 20px; }

/* Main */
.main {
  max-width: var(--container-max); margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Tabs */
.cat-tabs {
  display: flex; gap: 10px; margin-bottom: 32px;
  flex-wrap: wrap;
}
.cat-tab {
  padding: 10px 24px; border: 1.5px solid var(--border);
  border-radius: 40px; background: var(--surface);
  font-size: 15px; cursor: pointer; transition: all 0.25s ease;
  color: var(--text-secondary); font-weight: 500;
  font-family: var(--font-body);
}
.cat-tab:hover { border-color: var(--primary); color: var(--primary); }
.cat-tab.active {
  background: var(--primary); color: white; border-color: var(--primary);
}

/* Sub category title */
.sub-title {
  font-family: var(--font-heading);
  font-size: 18px; font-weight: 600; color: var(--primary);
  margin: 40px 0 20px; padding-left: 14px;
  border-left: 3px solid var(--secondary);
  position: relative;
}
.sub-title .count {
  font-family: var(--font-body);
  font-size: 13px; font-weight: 400; color: var(--text-muted);
  margin-left: 8px;
}

/* Herb grid */
.herb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px; margin-bottom: 48px;
}

/* Herb card */
.herb-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 24px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.25s ease;
  border: 1px solid var(--border);
}
.herb-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.herb-card .card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px; margin-bottom: 12px;
}
.herb-card .herb-name {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 600; color: var(--primary);
  line-height: 1.3;
}
.herb-card .herb-tag {
  flex-shrink: 0;
  font-size: 11px; padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500; white-space: nowrap;
}
.herb-tag.xu { background: #EBF5FB; color: #1E6FA0; }
.herb-tag.shi { background: #FDEBD0; color: #A25E0A; }
.herb-tag.wai { background: #E8F8F0; color: #1D7A5E; }
.herb-card .herb-xingwei {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 10px; line-height: 1.5;
}
.herb-card .herb-gongxiao {
  font-size: 14px; color: var(--text);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.herb-card .herb-daibiao {
  font-size: 13px; color: var(--secondary);
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  line-height: 1.5;
}
.daibiao-label { color: var(--text-muted); }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 24px; color: var(--text-muted);
}
.empty-state svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 16px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 1000; justify-content: center; align-items: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  max-width: 600px; width: 100%; max-height: 80vh;
  overflow-y: auto; padding: 36px; position: relative;
  box-shadow: var(--shadow-lg);
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none;
  cursor: pointer; color: var(--text-muted);
  transition: color 0.2s; padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--text); }
.modal-close svg { width: 24px; height: 24px; }
.modal h2 {
  font-family: var(--font-heading);
  font-size: 26px; color: var(--primary); margin-bottom: 4px;
}
.modal .modal-cat {
  font-size: 14px; color: var(--secondary); margin-bottom: 24px;
}
.modal-section { margin-bottom: 20px; }
.modal-label {
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 6px; letter-spacing: 0.5px;
}
.modal-value { font-size: 15px; line-height: 1.65; color: var(--text); }

/* Footer */
.footer {
  text-align: center; padding: 32px 24px;
  color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 768px) {
  .navbar { padding: 0 16px; height: 56px; }
  .navbar .logo { font-size: 17px; }
  .nav-btn { padding: 6px 12px; font-size: 13px; gap: 4px; }
  .hero { padding: 56px 16px 48px; }
  .hero h1 { font-size: 26px; }
  .main { padding: 32px 16px 64px; }
  .herb-grid { grid-template-columns: 1fr; gap: 16px; }
  .cat-tabs { gap: 8px; }
  .cat-tab { padding: 8px 16px; font-size: 14px; }
  .modal { padding: 24px; margin: 16px; }
}
@media (max-width: 380px) {
  .navbar .logo { font-size: 15px; }
  .hero h1 { font-size: 22px; }
}

/* 药象法折叠展示 */
.herb-yaoxiang-toggle {
  display: flex; align-items: center; gap: 4px;
  margin-top: 6px; padding: 4px 0;
  font-size: 11px; color: #C4BFBA;
  cursor: pointer; user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.2s;
}
.herb-yaoxiang-toggle:hover { color: #A8A29E; }
.herb-yaoxiang-toggle .arrow {
  width: 10px; height: 10px;
  transition: transform 0.25s ease;
  opacity: 0.6;
}
.herb-yaoxiang-toggle .arrow.open { transform: rotate(180deg); }
.herb-yaoxiang {
  display: none; margin-top: 4px; padding: 6px 8px;
  background: #F8F7F5; border-radius: 4px;
  font-size: 12px; line-height: 1.6;
  color: #78716C;
}
.herb-yaoxiang.open { display: block; }
.yaoxiang-value { color: #78716C; }
.yaoxiang-value .arrow-char { color: #A8A29E; margin: 0 2px; }
.yaoxiang-void { margin-top: 6px; font-size: 10px; color: #D6D3D1; font-style: italic; }

/* 弹窗中药象法区域 */
.modal-yaoxiang-section { display: none; }
.my-block .mb-value .my-arrow { color: var(--primary); }

</style>

const YAOXIANG_NAME_ALIASES = {
  '生地黄（酒煎）': '生地黄',
  '生牡蛎': '牡蛎',
  '生龙骨': '龙骨',
  '瓜蒌根（天花粉）': '天花粉',
  '无硫黑顺片（附子）': '附子',
  '生姜皮（姜皮）': '生姜',
  '丹皮（牡丹皮）': '丹皮',
};

function mergeYaoxiang(herb) {
  const name = YAOXIANG_NAME_ALIASES[herb.name] || herb.name;
  // Try exact match: name|subcat
  let key = name + '|' + herb.subcat;
  let match = YAOXIANG_MAP[key];
  if (match) {
    herb.yaoxiang_look = match.look;
    herb.yaoxiang_out = match.out;
    return;
  }
  // Try name-only fallback
  for (const [yk, yv] of Object.entries(YAOXIANG_MAP)) {
    if (yk.startsWith(name + '|')) {
      herb.yaoxiang_look = yv.look;
      herb.yaoxiang_out = yv.out;
      return;
    }
  }
}

let currentCat = "all";
let currentSearch = "";

function filterHerbs() {
  return HERBS.filter(h => {
    const catMatch = currentCat === "all" || h.cat === currentCat;
    const s = currentSearch;
    const searchMatch = !s ||
      h.name.includes(s) || h.xingwei.includes(s) || h.guijing.includes(s) || (h.yaoxiang_look && h.yaoxiang_look.includes(s)) || (h.yaoxiang_out && h.yaoxiang_out.includes(s)) ||
      h.gongxiao.includes(s) || (h.daibiao && h.daibiao.includes(s));
    return catMatch && searchMatch;
  });
}

// 合并药象法数据
HERBS.forEach(mergeYaoxiang);

function renderHerbs() {
  const container = document.getElementById('herbContainer');
  const emptyState = document.getElementById('emptyState');
  const filtered = filterHerbs();

  if (filtered.length === 0) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const grouped = {};
  filtered.forEach(h => {
    const key = h.subcat || h.cat;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(h);
  });

  const catClass = (cat) => CAT_COLORS[cat] || '';

  let html = '';
  Object.keys(grouped).forEach(subcat => {
    html += `<div class="sub-title">${subcat}<span class="count">${grouped[subcat].length}味</span></div>`;
    html += '<div class="herb-grid">';
    grouped[subcat].forEach(h => {
      const idx = HERBS.indexOf(h);
      html += `<div class="herb-card" onclick="toggleYaoxiangCard(this)" role="button" tabindex="0" onkeydown="if(event.key==='Enter')toggleYaoxiangCard(this)">
        <div class="card-top">
          <div class="herb-name">${h.name}</div>
          <div class="herb-tag ${catClass(h.cat)}">${h.subcat}</div>
        </div>
        <div class="herb-xingwei">${h.xingwei} · ${h.guijing}</div>
        <div class="herb-gongxiao">${h.gongxiao}</div>
        ${h.daibiao ? `<div class="herb-daibiao"><span class="daibiao-label">代表方 </span>${h.daibiao}</div>` : ''}
        ${h.yaoxiang_look || h.yaoxiang_out ? `
        <div class="herb-yaoxiang-toggle" onclick="event.stopPropagation();toggleYaoxiangCard(this.parentElement)">
          <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
          <span>看形识药性</span>
        </div>
        <div class="herb-yaoxiang">
          <div class="yaoxiang-value">${h.yaoxiang_look || ''}</div>
          ${h.yaoxiang_out ? `<div style="margin-top:4px"><span class="arrow-char">→</span> ${h.yaoxiang_out}</div>` : ''}
        </div>` : '<div class="yaoxiang-void">暂无药象数据</div>'}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function handleSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderHerbs();
}
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
});

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    tab.classList.add('active');
    tab.setAttribute('aria-selected', 'true');
    currentCat = tab.dataset.cat;
    renderHerbs();
  });
});

function toggleYaoxiangCard(el) {
  const content = el.querySelector('.herb-yaoxiang');
  if (content) {
    content.classList.toggle('open');
    const arrow = el.querySelector('.herb-yaoxiang-toggle .arrow');
    if (arrow) arrow.classList.toggle('open');
  }
}

const CAT_CLICK_HANDLED = true;

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

renderHerbs();
</script>
</body>
</html>
