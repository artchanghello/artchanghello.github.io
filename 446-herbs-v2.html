<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --secondary: #65A30D;
  --accent: #C2410C;
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-alt: #FFFBEB;
  --border: #E7E5E4;
  --text: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-heading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-body: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
  --fs-h1: clamp(1.75rem, 4vw, 2.25rem);
  --fs-h2: clamp(1.35rem, 3vw, 1.75rem);
  --fs-h3: clamp(1.15rem, 2.5vw, 1.35rem);
  --fs-body: clamp(0.95rem, 2vw, 1.05rem);
  --fs-small: clamp(0.85rem, 1.5vw, 0.9rem);
  --container-max: 1200px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

.skip-link {
  position: absolute; top: -40px; left: 0;
  background: var(--primary); color: white;
  padding: 8px 16px; z-index: 10000;
  text-decoration: none; border-radius: 0 0 4px 0;
  transition: top 0.2s;
}
.skip-link:focus { top: 0; }

/* Nav */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(255, 248, 240, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 600; color: var(--primary);
  text-decoration: none;
}
.navbar .logo span { color: var(--secondary); }
.nav-links { display: flex; align-items: center; gap: 10px; }
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 18px;
  background: var(--primary); color: white !important;
  border-radius: var(--radius-sm); text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: background 0.25s ease, transform 0.15s ease;
  cursor: pointer; font-family: inherit;
}
.nav-btn:hover { background: var(--primary-light); }
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-btn.secondary { background: var(--secondary); }
.nav-btn.secondary:hover { background: #4D7C0F; }

/* Hero */
.hero {
  background: linear-gradient(135deg, #B45309 0%, #D97706 45%, #65A30D 100%);
  color: white; text-align: center;
  padding: 80px 24px 64px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.12) 0%, transparent 60%);
}
.hero * { position: relative; z-index: 1; }
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--fs-h1); font-weight: 600;
  margin-bottom: 12px; letter-spacing: 0.02em;
}
.hero p {
  font-size: var(--fs-body); opacity: 0.88;
  margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto;
}

/* Search */
.search-wrap {
  max-width: 520px; margin: 0 auto;
  display: flex; align-items: center;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.28);
  border-radius: 40px; overflow: hidden;
  backdrop-filter: blur(4px); transition: border-color 0.25s ease;
}
.search-wrap:focus-within {
  border-color: rgba(255,255,255,0.6);
  background: rgba(255,255,255,0.2);
}
.search-wrap input {
  flex: 1; padding: 14px 24px; border: none;
  background: transparent; color: white; font-size: 15px; outline: none;
  font-family: var(--font-body);
}
.search-wrap input::placeholder { color: rgba(255,255,255,0.55); }
.search-wrap button {
  padding: 0 20px; border: none;
  background: transparent; color: rgba(255,255,255,0.7);
  cursor: pointer; transition: color 0.2s; display: flex; align-items: center;
}
.search-wrap button:hover { color: white; }
.search-wrap button svg { width: 20px; height: 20px; }

/* Main */
.main {
  max-width: var(--container-max); margin: 0 auto;
  padding: 48px 24px 80px;
}

/* Tabs */
.cat-tabs {
  display: flex; gap: 10px; margin-bottom: 32px;
  flex-wrap: wrap;
}
.cat-tab {
  padding: 10px 24px; border: 1.5px solid var(--border);
  border-radius: 40px; background: var(--surface);
  font-size: 15px; cursor: pointer; transition: all 0.25s ease;
  color: var(--text-secondary); font-weight: 500;
  font-family: var(--font-body);
}
.cat-tab:hover { border-color: var(--primary); color: var(--primary); }
.cat-tab.active {
  background: var(--primary); color: white; border-color: var(--primary);
}

/* Sub category title */
.sub-title {
  font-family: var(--font-heading);
  font-size: 18px; font-weight: 600; color: var(--primary);
  margin: 40px 0 20px; padding-left: 14px;
  border-left: 3px solid var(--secondary);
  position: relative;
}
.sub-title .count {
  font-family: var(--font-body);
  font-size: 13px; font-weight: 400; color: var(--text-muted);
  margin-left: 8px;
}

/* Herb grid */
.herb-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px; margin-bottom: 48px;
}

/* Herb card */
.herb-card {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 24px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.25s ease;
  border: 1px solid var(--border);
}
.herb-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
}
.herb-card .card-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  gap: 8px; margin-bottom: 12px;
}
.herb-card .herb-name {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 600; color: var(--primary);
  line-height: 1.3;
}
.herb-card .herb-tag {
  flex-shrink: 0;
  font-size: 11px; padding: 3px 10px;
  border-radius: 20px;
  font-weight: 500; white-space: nowrap;
}
.herb-tag.xu { background: #EBF5FB; color: #1E6FA0; }
.herb-tag.shi { background: #FDEBD0; color: #A25E0A; }
.herb-tag.wai { background: #E8F8F0; color: #1D7A5E; }
.herb-card .herb-xingwei {
  font-size: 13px; color: var(--text-secondary);
  margin-bottom: 10px; line-height: 1.5;
}
.herb-card .herb-gongxiao {
  font-size: 14px; color: var(--text);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.herb-card .herb-daibiao {
  font-size: 13px; color: var(--secondary);
  margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--border);
  line-height: 1.5;
}
.daibiao-label { color: var(--text-muted); }

/* Empty state */
.empty-state {
  text-align: center; padding: 80px 24px; color: var(--text-muted);
}
.empty-state svg { width: 56px; height: 56px; margin-bottom: 16px; opacity: 0.5; }
.empty-state p { font-size: 16px; }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.45);
  z-index: 1000; justify-content: center; align-items: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  max-width: 600px; width: 100%; max-height: 80vh;
  overflow-y: auto; padding: 36px; position: relative;
  box-shadow: var(--shadow-lg);
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none;
  cursor: pointer; color: var(--text-muted);
  transition: color 0.2s; padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { color: var(--text); }
.modal-close svg { width: 24px; height: 24px; }
.modal h2 {
  font-family: var(--font-heading);
  font-size: 26px; color: var(--primary); margin-bottom: 4px;
}
.modal .modal-cat {
  font-size: 14px; color: var(--secondary); margin-bottom: 24px;
}
.modal-section { margin-bottom: 20px; }
.modal-label {
  font-size: 12px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 6px; letter-spacing: 0.5px;
}
.modal-value { font-size: 15px; line-height: 1.65; color: var(--text); }

/* Footer */
.footer {
  text-align: center; padding: 32px 24px;
  color: var(--text-muted); font-size: 13px;
  border-top: 1px solid var(--border);
}

/* Responsive */
@media (max-width: 768px) {
  .navbar { padding: 0 16px; height: 56px; }
  .navbar .logo { font-size: 17px; }
  .nav-btn { padding: 6px 12px; font-size: 13px; gap: 4px; }
  .hero { padding: 56px 16px 48px; }
  .hero h1 { font-size: 26px; }
  .main { padding: 32px 16px 64px; }
  .herb-grid { grid-template-columns: 1fr; gap: 16px; }
  .cat-tabs { gap: 8px; }
  .cat-tab { padding: 8px 16px; font-size: 14px; }
  .modal { padding: 24px; margin: 16px; }
}
@media (max-width: 380px) {
  .navbar .logo { font-size: 15px; }
  .hero h1 { font-size: 22px; }
}
</style>

  { name: "牛蒡子", cat: "六外感", subcat: "外火", xingwei: "辛、苦，寒", guijing: "肺、胃经", gongxiao: "疏散风热、解毒透疹、利咽消肿。", daibiao: "银翘散" },
  { name: "薄荷", cat: "六外感", subcat: "外火", xingwei: "辛，凉", guijing: "肺、肝经", gongxiao: "疏散风热、清利头目、疏肝行气。", daibiao: "银翘散" },
  { name: "桑叶", cat: "六外感", subcat: "热燥", xingwei: "苦、甘，寒", guijing: "肺、肝经", gongxiao: "疏散风热、清肺润燥、平肝明目。", daibiao: "清燥救肺汤" },
  { name: "胡麻仁", cat: "六外感", subcat: "热燥", xingwei: "甘，平", guijing: "肺、脾、肝、肾经", gongxiao: "润燥滑肠、滋养肝肾。", daibiao: "清燥救肺汤" },
  { name: "枇杷叶", cat: "六外感", subcat: "热燥", xingwei: "苦，微寒", guijing: "肺、胃经", gongxiao: "清肺止咳、降逆止呕。", daibiao: "清燥救肺汤" },
  { name: "杏仁", cat: "六外感", subcat: "凉燥", xingwei: "苦，微温；有小毒", guijing: "肺、大肠经", gongxiao: "止咳平喘、润肠通便。凉燥证用杏苏散治之。", daibiao: "麻黄汤、麻杏石甘汤、三仁汤、杏苏散" },
  { name: "紫苏叶", cat: "六外感", subcat: "凉燥", xingwei: "辛，温", guijing: "肺、脾经", gongxiao: "解表散寒、行气和胃、解鱼蟹毒。", daibiao: "杏苏散" },
];

let currentCat = "all";
let currentSearch = "";

function filterHerbs() {
  return HERBS.filter(h => {
    const catMatch = currentCat === "all" || h.cat === currentCat;
    const s = currentSearch;
    const searchMatch = !s ||
      h.name.includes(s) || h.xingwei.includes(s) || h.guijing.includes(s) ||
      h.gongxiao.includes(s) || (h.daibiao && h.daibiao.includes(s));
    return catMatch && searchMatch;
  });
}

function renderHerbs() {
  const container = document.getElementById('herbContainer');
  const emptyState = document.getElementById('emptyState');
  const filtered = filterHerbs();

  if (filtered.length === 0) {
    container.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const grouped = {};
  filtered.forEach(h => {
    const key = h.subcat || h.cat;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(h);
  });

  const catClass = (cat) => CAT_COLORS[cat] || '';

  let html = '';
  Object.keys(grouped).forEach(subcat => {
    html += `<div class="sub-title">${subcat}<span class="count">${grouped[subcat].length}味</span></div>`;
    html += '<div class="herb-grid">';
    grouped[subcat].forEach(h => {
      const idx = HERBS.indexOf(h);
      html += `<div class="herb-card" onclick="openModal(${idx})" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openModal(${idx})">
        <div class="card-top">
          <div class="herb-name">${h.name}</div>
          <div class="herb-tag ${catClass(h.cat)}">${h.subcat}</div>
        </div>
        <div class="herb-xingwei">${h.xingwei} · ${h.guijing}</div>
        <div class="herb-gongxiao">${h.gongxiao}</div>
        ${h.daibiao ? `<div class="herb-daibiao"><span class="daibiao-label">代表方 </span>${h.daibiao}</div>` : ''}
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function handleSearch() {
  currentSearch = document.getElementById('searchInput').value.trim();
  renderHerbs();
}
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSearch();
});

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => {
      t.classList.remove('active');
      t.setAttribute('aria-selected', 'false');
    });
    tab.classList.add('active');
    tab.setAttribute('aria-selected', 'true');
    currentCat = tab.dataset.cat;
    renderHerbs();
  });
});

function openModal(idx) {
  const h = HERBS[idx];
  document.getElementById('modalName').textContent = h.name;
  document.getElementById('modalCat').textContent = `${h.cat} · ${h.subcat}`;
  document.getElementById('modalXingwei').textContent = h.xingwei;
  document.getElementById('modalGuijing').textContent = h.guijing;
  document.getElementById('modalGongxiao').textContent = h.gongxiao;
  document.getElementById('modalDaibiao').textContent = h.daibiao || '暂无';
  document.getElementById('modalDaibiaoSection').style.display = h.daibiao ? 'block' : 'none';
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

renderHerbs();
</script>
</body>
</html>
