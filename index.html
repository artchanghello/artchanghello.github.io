<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>446辨证体系 · 首页</title>
<link rel="icon" href="446-logo-og.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* 绿色系（保持原色调） */
    --primary: #1B4332;
    --primary-light: #2D6A4F;
    --accent: #40916C;
    --accent-light: #52B788;
    --surface-warm: #F7F5F0;
    --surface-card: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #555555;
    --text-muted: #999999;
    --border: #E0E4E0;

    /* 字体 */
    --font-heading: 'Noto Serif SC', 'Songti SC', Georgia, serif;
    --font-body: 'Noto Sans SC', 'PingFang SC', sans-serif;

    /* 字号 */
    --fs-h1: clamp(1.75rem, 5vw, 2.625rem);
    --fs-h2: clamp(1.35rem, 3.5vw, 1.625rem);
    --fs-body: clamp(0.95rem, 2vw, 1.05rem);
    --fs-small: clamp(0.85rem, 1.5vw, 0.95rem);
    --fs-caption: 0.75rem;

    /* 间距 */
    --space-xs: 4px;
    --space-sm: 8px;
    --space-md: 16px;
    --space-lg: 24px;
    --space-xl: 48px;
    --space-2xl: 64px;

    /* 圆角 */
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;

    /* 阴影 */
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-elevated: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
    --shadow-modal: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);

    /* 过渡 */
    --transition-fast: 150ms ease;
    --transition-base: 250ms ease;
    --transition-slow: 350ms ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--surface-warm);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Hero ===== */
  .hero {
    background: linear-gradient(170deg, #162E23 0%, #1F4F3A 35%, #2D6A4F 70%, #3A8C63 100%);
    color: white;
    text-align: center;
    padding: 90px 24px 80px;
    position: relative;
    overflow: hidden;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(180,210,190,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(184,216,190,0.5), transparent);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    font-family: var(--font-heading);
    font-size: var(--fs-h2);
    font-weight: 700;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.92);
    margin-bottom: var(--space-lg);
    position: relative;
  }
  .hero-badge::before,
  .hero-badge::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px; height: 1px;
    background: rgba(184,216,190,0.4);
  }
  .hero-badge::before { right: calc(100% + 16px); }
  .hero-badge::after  { left:  calc(100% + 16px); }

  .hero h1 {
    font-family: var(--font-heading);
    font-size: var(--fs-h1);
    font-weight: 700;
    margin-bottom: 18px;
    position: relative;
    letter-spacing: 2px;
    line-height: 1.3;
  }
  .hero h1 span {
    background: linear-gradient(90deg, #C8E6C9, #E8F5E9, #A5D6A7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .subtitle {
    font-size: var(--fs-small);
    opacity: 0.70;
    line-height: 1.8;
    max-width: 440px;
    margin: 0 auto;
    letter-spacing: 1px;
    font-weight: 300;
  }
  .hero-scroll-hint {
    position: absolute;
    bottom: var(--space-lg);
    left: 50%; transform: translateX(-50%);
    animation: floatDown 2s ease-in-out infinite;
    opacity: 0.35;
  }
  @keyframes floatDown {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }

  /* ===== Section Title ===== */
  .section-heading {
    text-align: center;
    padding: var(--space-xl) var(--space-lg) 36px;
  }
  .section-heading .eyebrow {
    font-size: var(--fs-caption);
    letter-spacing: 3px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: var(--space-sm);
    text-transform: uppercase;
  }
  .section-heading h2 {
    font-family: var(--font-heading);
    font-size: var(--fs-h2);
    color: var(--primary);
    font-weight: 700;
  }

  /* ===== Cards ===== */
  .cards {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 32px;
    padding: 0 32px 80px;
    flex-wrap: wrap;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }
  .card-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 260px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    font-size: 20px; font-weight: 700;
    letter-spacing: 2px;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    position: relative;
    overflow: hidden;
    padding: var(--space-xl) var(--space-lg);
  }
  .card-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 50%);
    pointer-events: none;
    border-radius: 20px;
  }
  .card-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background var(--transition-base);
    border-radius: 20px;
    pointer-events: none;
  }
  .card-btn:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 16px 48px rgba(0,0,0,0.16); }
  .card-btn:hover::after { background: rgba(255,255,255,0.06); }
  .card-btn:focus-visible {
    outline: 3px solid white;
    outline-offset: 4px;
  }

  .card-btn .icon-wrap {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
    position: relative; z-index: 1;
    transition: transform var(--transition-base);
  }
  .card-btn:hover .icon-wrap { transform: scale(1.08); }
  .card-btn .icon-wrap svg { width: 36px; height: 36px; }

  .card-btn .label {
    position: relative; z-index: 1;
    margin-bottom: var(--space-sm);
  }
  .card-btn .sub {
    font-size: 12px; font-weight: 400;
    opacity: 0.75;
    letter-spacing: 1px;
    position: relative; z-index: 1;
  }
  .card-btn .arrow {
    position: absolute;
    bottom: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity var(--transition-base), transform var(--transition-base);
    z-index: 1;
  }
  .card-btn:hover .arrow {
    opacity: 1;
    transform: translateX(0);
  }
  .card-btn .arrow svg { width: 16px; height: 16px; }

  .card-btn.green  { background: linear-gradient(160deg, #1B4332, #2D6A4F 50%, #40916C); }
  .card-btn.gold   { background: linear-gradient(160deg, #7C5E10, #9A7518 50%, #B8860B); }
  .card-btn.blue   { background: linear-gradient(160deg, #1a3a5c, #1d4ed8 50%, #2980B9); }
  .card-btn.orange { background: linear-gradient(160deg, #B8430A, #D35400 50%, #E67E22); }

  .cards.row-layout {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: var(--space-lg);
    padding: 0 32px 80px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    justify-items: center;
  }

  /* ===== Animation ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in {
    animation: fadeInUp 0.5s ease both;
  }
  .animate-in:nth-child(2) { animation-delay: 0.1s; }
  .animate-in:nth-child(3) { animation-delay: 0.2s; }

  @media (max-width: 768px) {
    .hero { padding: var(--space-2xl) 20px 56px; min-height: auto; }
    .hero-badge { font-size: var(--fs-h2); letter-spacing: 5px; }
    .hero-badge::before, .hero-badge::after { width: 24px; }
    .hero h1 { font-size: var(--fs-h1); }
    .hero .subtitle { font-size: 13px; }
    .cards { gap: 20px; padding: 0 var(--space-md) 60px; }
    .card-btn { width: 100%; max-width: 320px; padding: 36px 20px; }
    .card-btn .icon-wrap { width: 56px; height: 56px; margin-bottom: var(--space-md); }
    .card-btn .icon-wrap svg { width: 28px; height: 28px; }
    .section-heading { padding: 32px var(--space-md) 20px; }
    .section-heading h2 { font-size: var(--fs-h2); }
    .hero-scroll-hint { display: none; }
  }

  @media (max-width: 380px) {
    .hero-badge { font-size: 20px; letter-spacing: 3px; }
    .hero h1 { font-size: 22px; }
    .hero .subtitle { font-size: 12px; }
    .card-btn { padding: var(--space-lg) var(--space-md); font-size: 18px; }
    .card-btn .sub { font-size: 11px; }
  }
</style>
</head>
