<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>446辨证体系 · 首页</title>
<link rel="icon" href="446-logo-og.png" type="image/png">
<style>
  * { margin:0; padding:0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    background: #F7F5F0;
    color: #1A1A1A;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Hero ===== */
  .hero {
    background: linear-gradient(170deg, #162E23 0%, #1F4F3A 35%, #2D6A4F 70%, #3A8C63 100%);
    color: white;
    text-align: center;
    padding: 90px 24px 80px;
    position: relative;
    overflow: hidden;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  /* 水墨纹理叠加 */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(180,210,190,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  /* 底部装饰细线 */
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(184,216,190,0.5), transparent);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    font-family: "Songti SC", "Noto Serif SC", Georgia, serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 8px;
    color: rgba(255,255,255,0.92);
    margin-bottom: 20px;
    position: relative;
  }
  /* 徽章两侧装饰线 */
  .hero-badge::before,
  .hero-badge::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40px; height: 1px;
    background: rgba(184,216,190,0.4);
  }
  .hero-badge::before { right: calc(100% + 16px); }
  .hero-badge::after  { left:  calc(100% + 16px); }

  .hero h1 {
    font-family: Georgia, "Songti SC", "Noto Serif SC", serif;
    font-size: 42px; font-weight: 700;
    margin-bottom: 18px;
    position: relative;
    letter-spacing: 2px;
    line-height: 1.3;
  }
  .hero h1 span {
    background: linear-gradient(90deg, #C8E6C9, #E8F5E9, #A5D6A7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .subtitle {
    font-size: 15px;
    opacity: 0.70;
    line-height: 1.8;
    max-width: 440px;
    margin: 0 auto;
    letter-spacing: 1px;
    font-weight: 300;
  }
  /* 向下指示箭头 */
  .hero-scroll-hint {
    position: absolute;
    bottom: 24px;
    left: 50%; transform: translateX(-50%);
    animation: floatDown 2s ease-in-out infinite;
    opacity: 0.35;
  }
  @keyframes floatDown {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(6px); }
  }

  /* ===== Section Title ===== */
  .section-heading {
    text-align: center;
    padding: 48px 24px 36px;
  }
  .section-heading .eyebrow {
    font-size: 11px;
    letter-spacing: 3px;
    color: #40916C;
    font-weight: 600;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .section-heading h2 {
    font-family: Georgia, "Songti SC", "Noto Serif SC", serif;
    font-size: 26px;
    color: #1B4332;
    font-weight: 700;
  }

  /* ===== Cards ===== */
  .cards {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 32px;
    padding: 0 32px 80px;
    flex-wrap: wrap;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
  }
  .card-btn {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 260px;
    border-radius: 20px;
    text-decoration: none;
    color: white;
    font-size: 20px; font-weight: 700;
    letter-spacing: 2px;
    transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.28s ease;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    position: relative;
    overflow: hidden;
    padding: 48px 24px;
  }
  .card-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, transparent 50%);
    pointer-events: none;
    border-radius: 20px;
  }
  .card-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.28s ease;
    border-radius: 20px;
    pointer-events: none;
  }
  .card-btn:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 16px 48px rgba(0,0,0,0.16); }
  .card-btn:hover::after { background: rgba(255,255,255,0.06); }

  .card-btn .icon-wrap {
    width: 72px; height: 72px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 22px;
    position: relative; z-index: 1;
    transition: transform 0.28s ease;
  }
  .card-btn:hover .icon-wrap { transform: scale(1.08); }
  .card-btn .icon-wrap svg { width: 36px; height: 36px; }

  .card-btn .label {
    position: relative; z-index: 1;
    margin-bottom: 8px;
  }
  .card-btn .sub {
    font-size: 12px; font-weight: 400;
    opacity: 0.75;
    letter-spacing: 1px;
    position: relative; z-index: 1;
  }
  .card-btn .arrow {
    position: absolute;
    bottom: 20px; right: 20px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.28s ease, transform 0.28s ease;
    z-index: 1;
  }
  .card-btn:hover .arrow {
    opacity: 1;
    transform: translateX(0);
  }
  .card-btn .arrow svg { width: 16px; height: 16px; }

  .card-btn.green  { background: linear-gradient(160deg, #1B4332, #2D6A4F 50%, #40916C); }
  .card-btn.gold  { background: linear-gradient(160deg, #7C5E10, #9A7518 50%, #B8860B); }
  .card-btn.blue  { background: linear-gradient(160deg, #1a3a5c, #1d4ed8 50%, #2980B9); }
  .card-btn.orange  { background: linear-gradient(160deg, #B8430A, #D35400 50%, #E67E22); }

  /* 两行卡片布局 */
  .cards.row-layout {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 24px;
    padding: 0 32px 80px;
    max-width: 1000px;
    margin: 0 auto;
    width: 100%;
    justify-items: center;
  }

  /* ===== Animation ===== */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .animate-in {
    animation: fadeInUp 0.5s ease both;
  }
  .animate-in:nth-child(2) { animation-delay: 0.1s; }
  .animate-in:nth-child(3) { animation-delay: 0.2s; }

  @media (max-width: 768px) {
    .hero { padding: 64px 20px 56px; min-height: auto; }
    .hero-badge { font-size: 24px; letter-spacing: 5px; }
    .hero-badge::before, .hero-badge::after { width: 24px; }
    .hero h1 { font-size: 26px; }
    .hero .subtitle { font-size: 13px; }
    .cards { gap: 20px; padding: 0 16px 60px; }
    .card-btn { width: 100%; max-width: 320px; padding: 36px 20px; }
    .card-btn .icon-wrap { width: 56px; height: 56px; margin-bottom: 16px; }
    .card-btn .icon-wrap svg { width: 28px; height: 28px; }
    .section-heading { padding: 32px 16px 20px; }
    .section-heading h2 { font-size: 22px; }
    .hero-scroll-hint { display: none; }
  }

  @media (max-width: 380px) {
    .hero-badge { font-size: 20px; letter-spacing: 3px; }
    .hero h1 { font-size: 22px; }
    .hero .subtitle { font-size: 12px; }
    .card-btn { padding: 24px 16px; font-size: 18px; }
    .card-btn .sub { font-size: 11px; }
  }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-badge">四虚 · 四实 · 六外感</div>
  <h1>446<span>辨证体系</span></h1>
  <p class="subtitle">基于《四虚四实六外感》教学体系，提供方剂查询、用药学习、术语词典与辨证训练四大工具。</p>
  <div class="hero-scroll-hint">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
  </div>
</section>

<div class="section-heading">
  <h2>选择工具</h2>
</div>

<div class="cards row-layout">
  <a href="446-query.html" class="card-btn green animate-in">
    <div class="icon-wrap">
      <!-- 方剂图标：写实药碗（带蒸汽） -->
      <svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <!-- 碗身 -->
        <path d="M16 20 C16 20, 14 40, 20 46 L44 46 C50 40, 48 20, 48 20 Z" fill="rgba(255,255,255,0.12)"/>
        <!-- 碗口 -->
        <ellipse cx="32" cy="20" rx="16" ry="5"/>
        <!-- 碗底 -->
        <ellipse cx="32" cy="46" rx="12" ry="3"/>
        <!-- 药液线 -->
        <path d="M20 30 Q32 33 44 30" opacity="0.6"/>
        <!-- 蒸汽线条 -->
        <path d="M26 14 Q24 8 26 4" opacity="0.5" stroke-width="1.5"/>
        <path d="M32 12 Q30 6 32 2" opacity="0.7" stroke-width="1.5"/>
        <path d="M38 14 Q40 8 38 4" opacity="0.5" stroke-width="1.5"/>
        <!-- 勺子 -->
        <path d="M48 18 L58 10" stroke-width="2.5"/>
        <circle cx="58" cy="8" r="4" fill="rgba(255,255,255,0.15)"/>
      </svg>
    </div>
    <div class="label">方剂查询</div>
    <div class="sub">72 首核心方剂</div>
    <div class="arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a href="446-herbs.html" class="card-btn gold animate-in">
    <div class="icon-wrap">
      <!-- 中药图标：写实草药（根茎叶） -->
      <svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- 主茎 -->
        <path d="M32 60 L32 18"/>
        <!-- 叶片（左） -->
        <path d="M32 20 Q18 16 14 26 Q18 32 32 24 Z" fill="rgba(255,255,255,0.10)"/>
        <!-- 叶片（右） -->
        <path d="M32 24 Q46 20 50 30 Q46 36 32 28 Z" fill="rgba(255,255,255,0.10)"/>
        <!-- 上部叶片（左） -->
        <path d="M32 14 Q20 8 16 16 Q22 22 32 18 Z" fill="rgba(255,255,255,0.08)"/>
        <!-- 上部叶片（右） -->
        <path d="M32 16 Q44 10 48 18 Q44 24 32 20 Z" fill="rgba(255,255,255,0.08)"/>
        <!-- 根（下方） -->
        <path d="M32 60 Q26 64 24 58" stroke-width="1.5"/>
        <path d="M32 60 Q38 65 40 57" stroke-width="1.5"/>
        <path d="M32 60 Q30 66 28 60" stroke-width="1.5"/>
        <!-- 小根须 -->
        <path d="M26 62 Q22 66 20 62" stroke-width="1" opacity="0.6"/>
        <path d="M38 62 Q42 67 44 61" stroke-width="1" opacity="0.6"/>
        <!-- 叶脉 -->
        <path d="M23 22 L32 22" stroke-width="0.8" opacity="0.5"/>
        <path d="M41 26 L32 24" stroke-width="0.8" opacity="0.5"/>
      </svg>
    </div>
    <div class="label">用药表</div>
    <div class="sub">约 80 味核心中药</div>
    <div class="arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a href="446-tcm-terminology-dict.html" class="card-btn orange animate-in">
    <div class="icon-wrap">
      <!-- 词典图标：写实古书（线装书） -->
      <svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- 书脊 -->
        <path d="M14 8 L14 56"/>
        <!-- 封面 -->
        <path d="M14 8 L50 8 L50 56 L14 56 Z" fill="rgba(255,255,255,0.08)"/>
        <!-- 封面条纹（线装书细节） -->
        <path d="M18 8 L18 56" opacity="0.3" stroke-width="1"/>
        <path d="M22 8 L22 56" opacity="0.2" stroke-width="0.8"/>
        <path d="M46 8 L46 56" opacity="0.3" stroke-width="1"/>
        <!-- 书签绳 -->
        <path d="M38 8 L38 18" stroke-width="1.2"/>
        <path d="M36 18 L40 22 L36 26" stroke-width="1" fill="rgba(255,255,255,0.15)"/>
        <!-- 书名横栏 -->
        <path d="M18 24 L46 24" opacity="0.4" stroke-width="0.8"/>
        <path d="M18 30 L46 30" opacity="0.3" stroke-width="0.6"/>
        <path d="M18 34 L42 34" opacity="0.25" stroke-width="0.6"/>
        <!-- 印章/装饰方块 -->
        <rect x="20" y="40" width="8" height="8" rx="1" fill="rgba(255,255,255,0.10)" stroke-width="1"/>
        <!-- 线装孔 -->
        <circle cx="14" cy="16" r="1" fill="rgba(255,255,255,0.3)"/>
        <circle cx="14" cy="28" r="1" fill="rgba(255,255,255,0.3)"/>
        <circle cx="14" cy="40" r="1" fill="rgba(255,255,255,0.3)"/>
        <circle cx="14" cy="52" r="1" fill="rgba(255,255,255,0.3)"/>
      </svg>
    </div>
    <div class="label">术语词典</div>
    <div class="sub">40 个核心术语</div>
    <div class="arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

  <a href="446-training.html" class="card-btn blue animate-in">
    <div class="icon-wrap">
      <!-- 训练图标：靶心/目标 -->
      <svg viewBox="0 0 64 64" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- 外圈 -->
        <circle cx="32" cy="32" r="24" fill="rgba(255,255,255,0.08)"/>
        <!-- 中圈 -->
        <circle cx="32" cy="32" r="16" opacity="0.7"/>
        <!-- 内圈 -->
        <circle cx="32" cy="32" r="8" fill="rgba(255,255,255,0.12)"/>
        <!-- 中心点 -->
        <circle cx="32" cy="32" r="3" fill="white" opacity="0.9"/>
        <!-- 装饰线条（能量/动态感） -->
        <path d="M32 2 L32 8" stroke-width="2" opacity="0.5"/>
        <path d="M32 56 L32 62" stroke-width="2" opacity="0.5"/>
        <path d="M2 32 L8 32" stroke-width="2" opacity="0.5"/>
        <path d="M56 32 L62 32" stroke-width="2" opacity="0.5"/>
      </svg>
    </div>
    <div class="label">训练</div>
    <div class="sub">辨证练习与测试</div>
    <div class="arrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </div>
  </a>

</div>

<script>
  // Hero 入场动画
  document.querySelectorAll('.animate-in').forEach((el, i) => {
    el.style.animationDelay = i * 0.1 + 's';
  });
</script>

</body>
</html>
