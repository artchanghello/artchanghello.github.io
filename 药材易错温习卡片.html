<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药材扫荡学习 · 446辨证</title>
<meta name="description" content="逐题扫荡全部80味药材，每味自评掌握程度，自动积累易错题库">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --secondary: #65A30D;
  --accent: #C2410C;
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-alt: #FFFBEB;
  --border: #E7E5E4;
  --text: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --error: #DC2626;
  --success: #16A34A;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-heading: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* Nav */
.navbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  background: rgba(255,248,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 18px; font-weight: 600; color: var(--primary);
}
.navbar .logo span { color: var(--secondary); }
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 8px 16px; border: none; background: none;
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; border-radius: var(--radius-sm);
  font-family: var(--font-body);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { background: var(--surface-alt); color: var(--primary); }
.tab.active { background: var(--primary); color: white; }

/* Hero */
.hero {
  background: linear-gradient(135deg, #B45309 0%, #D97706 50%, #65A30D 100%);
  color: white; text-align: center;
  padding: 48px 24px 36px;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(1.5rem,3.5vw,2rem);
  font-weight: 600; margin-bottom: 8px;
}
.hero p { font-size: 15px; opacity: 0.85; }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 32px 16px 64px; }

/* ===== Learn Mode (shared) ===== */
.learn-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }

/* Progress bar */
.progress-section {
  width: 100%; max-width: 520px;
  display: flex; flex-direction: column; gap: 8px;
}
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; color: var(--text-secondary); gap: 8px;
}
.progress-top .cat-label {
  font-family: var(--font-heading); font-weight: 600; color: var(--primary);
}
.progress-bar-track {
  width: 100%; height: 6px;
  background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius: 3px; transition: width 0.4s ease;
  width: 0%;
}
.progress-stats {
  font-size: 13px; color: var(--text-muted);
  display: flex; gap: 16px; justify-content: center;
}

/* Card */
.learn-card {
  width: 100%; max-width: 520px; min-height: 340px;
  perspective: 1200px; cursor: pointer;
}
.learn-card-inner {
  position: relative; width: 100%; min-height: 340px;
  transition: transform 0.5s ease;
  transform-style: preserve-3d;
}
.learn-card-inner.flipped { transform: rotateY(180deg); }
.card-front, .card-back {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
  display: flex; flex-direction: column;
}
.card-front {
  background: linear-gradient(135deg, var(--surface-alt), var(--surface));
  justify-content: center; align-items: center; text-align: center;
}
.card-front .herb-name-big {
  font-family: var(--font-heading);
  font-size: 42px; font-weight: 600; color: var(--primary);
  margin-bottom: 8px;
}
.card-front .herb-meta {
  font-size: 14px; color: var(--text-muted);
  margin-bottom: 20px;
}
.card-front .tap-hint {
  font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
}
.card-back {
  background: var(--surface);
  transform: rotateY(180deg);
  overflow-y: auto;
}
.card-back .cb-label {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.3px; margin-bottom: 2px;
}
.card-back .cb-row { margin-bottom: 14px; }
.card-back .cb-value { font-size: 15px; line-height: 1.5; }
.card-back .cb-value.highlight { color: var(--primary); font-weight: 500; }
.card-back .cb-target-box {
  background: #FFF8F0; border-left: 3px solid var(--secondary);
  padding: 12px 14px; border-radius: 6px;
  font-size: 14px; line-height: 1.6; color: var(--text-secondary);
  margin-top: 6px;
}
.card-back .cb-wrong-note {
  background: #FEF2E8; border-left: 3px solid var(--error);
  padding: 10px 14px; border-radius: 6px;
  font-size: 13px; color: var(--error); margin-top: 6px;
}

/* Judgment buttons - ONLY shown after flip */
.judgment-btns {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  min-height: 48px; align-items: center;
}
.judgment-btns .hint-text {
  font-size: 14px; color: var(--text-muted);
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 24px; border: none; border-radius: 40px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #15803D; }
.btn-error { background: var(--error); color: white; }
.btn-error:hover { background: #B91C1C; }
.btn-warn { background: var(--primary); color: white; }
.btn-warn:hover { background: var(--primary-light); }
.btn-small { padding: 6px 14px; font-size: 13px; }

/* Empty / Complete */
.empty-state {
  text-align: center; padding: 60px 24px; color: var(--text-muted);
}
.empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; margin-top: 8px; }
.empty-state .sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* ===== Table Mode ===== */
.table-controls {
  display: flex; gap: 12px; margin-bottom: 24px;
  flex-wrap: wrap; align-items: center;
}
.table-controls input {
  flex: 1; min-width: 200px; padding: 10px 16px;
  border: 1.5px solid var(--border); border-radius: 40px;
  font-size: 14px; outline: none; font-family: var(--font-body);
  background: var(--surface);
}
.table-controls input:focus { border-color: var(--primary); }
.cat-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-filter {
  padding: 5px 14px; border: 1.5px solid var(--border);
  border-radius: 20px; background: var(--surface);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  font-family: var(--font-body); color: var(--text-secondary);
}
.cat-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
.cat-filter:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

.herb-table-wrap { overflow-x: auto; }
.herb-table {
  width: 100%; border-collapse: collapse;
  font-size: 14px;
}
.herb-table th {
  background: var(--surface-alt);
  padding: 10px 12px; text-align: left;
  font-weight: 500; color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0;
}
.herb-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.5;
}
.herb-table tr:hover td { background: var(--surface-alt); }
.herb-table .herb-name-cell {
  font-family: var(--font-heading);
  color: var(--primary); font-weight: 600; white-space: nowrap;
}
.herb-table .herb-cat-tag {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 12px; font-weight: 500;
}
.tag-xu { background: #EBF5FB; color: #1E6FA0; }
.tag-shi { background: #FDEBD0; color: #A25E0A; }
.tag-wai { background: #E8F8F0; color: #1D7A5E; }
.herb-table .target-text {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.55;
}

/* ===== Review Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 1000;
  justify-content: center; align-items: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  max-width: 500px; width: 100%; padding: 32px;
  box-shadow: var(--shadow-lg); max-height: 80vh; overflow-y: auto;
  position: relative;
}
.modal h2 {
  font-family: var(--font-heading);
  font-size: 20px; color: var(--primary); margin-bottom: 4px;
}
.modal .modal-herb-name {
  font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;
}
/* Checkbox list */
.checkbox-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; margin-bottom: 16px;
}
.checkbox-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.15s; user-select: none;
  font-size: 14px;
}
.checkbox-item:hover { border-color: var(--primary); background: var(--surface-alt); }
.checkbox-item.checked { border-color: var(--primary); background: #FEF3C7; }
.checkbox-item input { display: none; }
.checkbox-item .ck-icon { width: 18px; text-align: center; color: var(--text-muted); }
.checkbox-item.checked .ck-icon { color: var(--primary); }
.modal .form-group { margin-bottom: 14px; }
.modal .form-group label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 4px;
}
.modal .form-group textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; outline: none; font-family: var(--font-body);
  resize: vertical;
}
.modal .form-group textarea:focus { border-color: var(--primary); }
.modal .form-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 8px;
}
.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; font-size: 24px;
  color: var(--text-muted); cursor: pointer; line-height: 1;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .navbar { padding: 0 10px; height: 52px; }
  .navbar .logo { font-size: 15px; }
  .tabs { gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .hero { padding: 28px 16px 22px; }
  .hero h1 { font-size: 1.3rem; }
  .hero p { font-size: 13px; }
  .main { padding: 20px 12px 64px; }
  .learn-card { max-width: 100%; min-height: 280px; }
  .learn-card-inner { min-height: 280px; }
  .card-front, .card-back { padding: 20px 16px; }
  .card-front .herb-name-big { font-size: 30px; }
  .card-front .herb-meta { font-size: 13px; margin-bottom: 14px; }
  .card-front .tap-hint { font-size: 12px; }
  .card-back .cb-row { margin-bottom: 10px; }
  .card-back .cb-value { font-size: 14px; }
  .card-back .cb-target-box { padding: 10px 12px; font-size: 13px; }
  .card-back .cb-wrong-note { padding: 8px 12px; font-size: 12px; }
  .judgment-btns { gap: 8px; min-height: 40px; }
  .judgment-btns .btn { font-size: 13px; padding: 8px 16px; }
  .btn { padding: 8px 18px; font-size: 14px; }
  .progress-top { font-size: 13px; flex-wrap: wrap; }
  .progress-stats { font-size: 12px; gap: 10px; flex-wrap: wrap; }
  .herb-table { font-size: 12px; }
  .herb-table th, .herb-table td { padding: 6px 8px; }
  .herb-table .herb-name-cell { font-size: 13px; }
  .table-controls input { min-width: 140px; padding: 8px 14px; font-size: 13px; }
  .cat-filter { font-size: 12px; padding: 4px 10px; }
  .modal { padding: 24px 20px; margin: 0 12px; max-width: 100%; }
  .modal h2 { font-size: 18px; }
  .checkbox-grid { gap: 6px; }
  .checkbox-item { padding: 6px 10px; font-size: 13px; }
  .modal .form-actions { flex-wrap: wrap; }
  .modal .form-actions .btn { flex: 1; justify-content: center; min-width: 80px; }
}

@media (max-width: 480px) {
  .navbar { height: 48px; padding: 0 8px; }
  .navbar .logo { font-size: 14px; }
  .tab { padding: 5px 8px; font-size: 11px; }
  .hero { padding: 22px 12px 18px; }
  .hero h1 { font-size: 1.15rem; }
  .main { padding: 16px 10px 56px; }
  .learn-card { min-height: 240px; }
  .learn-card-inner { min-height: 240px; }
  .card-front, .card-back { padding: 16px 14px; border-radius: var(--radius-md); }
  .card-front .herb-name-big { font-size: 26px; }
  .card-front .herb-meta { font-size: 12px; margin-bottom: 10px; }
  .card-front .tap-hint { font-size: 11px; }
  .card-back .cb-value { font-size: 13px; }
  .card-back .cb-target-box { padding: 8px 10px; font-size: 12px; }
  .card-back .cb-wrong-note { padding: 6px 10px; font-size: 11px; }
  /* 三档按钮垂直堆叠 */
  .judgment-btns { flex-direction: column; align-items: stretch; gap: 6px; width: 100%; max-width: 280px; }
  .judgment-btns .btn { justify-content: center; font-size: 14px; padding: 10px 16px; }
  .progress-top { font-size: 12px; }
  .progress-stats { font-size: 11px; gap: 6px; }
  .table-controls { flex-direction: column; gap: 8px; }
  .table-controls input { min-width: 0; width: 100%; }
  .cat-filters { justify-content: center; }
  .herb-table th:nth-child(5), .herb-table td:nth-child(5),
  .herb-table th:nth-child(6), .herb-table td:nth-child(6) { display: none; }
  .herb-table th:nth-child(3), .herb-table td:nth-child(3) { display: none; }
  .herb-table { font-size: 11px; }
  .herb-table th, .herb-table td { padding: 5px 6px; }
  .modal { padding: 20px 16px; }
  .modal h2 { font-size: 16px; }
  .checkbox-grid { grid-template-columns: 1fr 1fr; gap: 5px; }
  .checkbox-item { padding: 5px 8px; font-size: 12px; }
  .modal .form-group textarea { font-size: 13px; padding: 8px 12px; }
  .btn { padding: 7px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">446<span>·药材</span></div>
  <div class="tabs">
    <button class="tab active" data-mode="sweep" onclick="switchMode('sweep')">📖 扫荡学习</button>
    <button class="tab" data-mode="intensive" onclick="switchMode('intensive')">🎯 错题强化</button>
    <button class="tab" data-mode="table" onclick="switchMode('table')">📋 归经靶点表</button>
  </div>
</nav>

<section class="hero">
  <h1>药材扫荡学习</h1>
  <p>逐题过一遍，每味药都做判断，易错题库自动建成</p>
</section>

<main class="main">

  <!-- ===== Learn Mode (扫荡学习 + 错题强化 共用) ===== -->
  <div id="learnMode">
    <div class="learn-area">

      <!-- Progress -->
      <div class="progress-section" id="progressSection">
        <div class="progress-top">
          <span><span class="cat-label" id="progressCat">四虚·气虚</span> <span id="progressIndex">1/8</span></span>
          <span id="modeLabel">扫荡学习</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-stats">
          <span>已掌握 <strong id="masteredCount">0</strong>/80</span>
          <span>需复习 <strong id="reviewCount">0</strong></span>
          <span>本轮 <strong id="sessionCount">0</strong></span>
        </div>
      </div>

      <!-- Card -->
      <div class="learn-card" id="learnCard" onclick="flipCard()">
        <div class="learn-card-inner" id="cardInner">
          <div class="card-front">
            <div class="herb-name-big" id="cardName">—</div>
            <div class="herb-meta" id="cardMeta"></div>
            <div class="tap-hint" id="tapHint">👆 点击翻转查看完整信息</div>
          </div>
          <div class="card-back">
            <div id="cardBackContent"></div>
          </div>
        </div>
      </div>

      <!-- Judgment buttons -->
      <div class="judgment-btns" id="judgmentBtns">
        <span class="hint-text" id="judgeHint">翻转卡片后选择</span>
      </div>

      <!-- Extra actions -->
      <div style="text-align:center;margin-top:4px">
        <button class="btn btn-secondary btn-small" onclick="resetAll()">🔄 重置全部进度</button>
      </div>

      <!-- Empty / Complete state -->
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="big-icon" id="completeIcon">🎉</div>
        <p id="completeMsg">全部药材已掌握！</p>
        <p class="sub" id="completeSub">点击下方「重置全部进度」重新开始</p>
      </div>
    </div>
  </div>

  <!-- ===== Table Mode ===== -->
  <div id="tableMode" style="display:none;">
    <div class="table-controls">
      <input type="text" id="tableSearch" placeholder="搜索药名、性味、归经、功效…" oninput="renderTable()">
      <div class="cat-filters">
        <button class="cat-filter active" data-cat="all" onclick="filterTable('all')">全部</button>
        <button class="cat-filter" data-cat="四虚" onclick="filterTable('四虚')">四虚</button>
        <button class="cat-filter" data-cat="四实" onclick="filterTable('四实')">四实</button>
        <button class="cat-filter" data-cat="六外感" onclick="filterTable('六外感')">六外感</button>
        <button class="cat-filter" data-cat="易错" onclick="filterTable('易错')">需复习</button>
      </div>
    </div>
    <div class="herb-table-wrap">
      <table class="herb-table">
        <thead>
          <tr>
            <th>药名</th>
            <th>分类</th>
            <th>性味</th>
            <th>归经</th>
            <th>功效</th>
            <th style="min-width:180px">功能靶点</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div class="empty-state" id="tableEmpty" style="display:none;">
      <p>没有匹配的药材</p>
    </div>
  </div>

</main>

<!-- Review Modal -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <button class="modal-close" onclick="closeReviewModal()">&times;</button>
    <h2>回顾：<span id="reviewHerbName"></span></h2>
    <div class="modal-herb-name">哪些点没回忆起来？勾选后系统会针对性提醒</div>
    <div class="checkbox-grid" id="reviewCheckboxGrid">
      <label class="checkbox-item" data-key="xingwei" onclick="toggleCheckbox(this)">
        <span class="ck-icon">☐</span> 性味
      </label>
      <label class="checkbox-item" data-key="guijing" onclick="toggleCheckbox(this)">
        <span class="ck-icon">☐</span> 归经
      </label>
      <label class="checkbox-item" data-key="gongxiao" onclick="toggleCheckbox(this)">
        <span class="ck-icon">☐</span> 功效
      </label>
      <label class="checkbox-item" data-key="target" onclick="toggleCheckbox(this)">
        <span class="ck-icon">☐</span> 功能靶点
      </label>
    </div>
    <div class="form-group">
      <label>具体错在哪（选填）</label>
      <textarea id="reviewDetail" rows="2" placeholder="如：性味记成甘寒了…"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="skipReview()">跳过</button>
      <button class="btn btn-primary" onclick="saveReview()">保存</button>
    </div>
  </div>
</div>

// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'herb_mastery_v2';

let mastery = loadMastery();
let currentMode = 'sweep'; // 'sweep' | 'intensive'
let currentHerb = null;
let sweepQueue = [];
let sweepIndex = 0;
let sessionCount = 0;
let cardFlipped = false;

// 分类顺序（按HERBS中的实际顺序）
const CAT_ORDER = [];
const CAT_MAP = {};
HERBS.forEach(h => {
  if (!CAT_MAP[h.subcat]) {
    CAT_MAP[h.subcat] = {cat: h.cat, subcat: h.subcat, herbs: []};
    CAT_ORDER.push(h.subcat);
  }
  CAT_MAP[h.subcat].herbs.push(h);
});

function loadMastery() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY));
    // v1兼容：如果之前用的是mistakes格式，迁移
    if (d && d.__version === undefined) {
      const migrated = {};
      Object.keys(d).forEach(k => {
        if (k !== '__version') {
          migrated[k] = {
            status: d[k].mastered ? 'mastered' : 'reviewing',
            wrong: d[k].wrong || 0,
            correct: d[k].correct || 0,
            wrongNote: d[k].wrongNote || ''
          };
        }
      });
      migrated.__version = 2;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      return migrated;
    }
    return d || {__version: 2};
  } catch { return {__version: 2}; }
}

function saveMastery() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(mastery));
}

function getHerbStatus(herb) {
  return mastery[herb.name] || {status: undefined, wrong: 0, correct: 0, wrongNote: ''};
}

function isMastered(herb) {
  return getHerbStatus(herb).status === 'mastered';
}

function needsReview(herb) {
  return getHerbStatus(herb).status === 'reviewing';
}

function getReviewHerbs() {
  return HERBS.filter(h => needsReview(h));
}

function getMasteredCount() {
  return HERBS.filter(h => isMastered(h)).length;
}

function getReviewCount() {
  return getReviewHerbs().length;
}

// ============================================================
// SWEEP MODE (扫荡学习) 
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildSweepQueue() {
  sweepQueue = [];
  CAT_ORDER.forEach(subcat => {
    const herbs = CAT_MAP[subcat].herbs.filter(h => !isMastered(h));
    shuffle(herbs);
    sweepQueue.push(...herbs);
  });
  sweepIndex = 0;
  // If all mastered, still give an empty queue
}

function showSweepCard() {
  if (sweepIndex >= sweepQueue.length) {
    // 当前轮扫荡完成
    if (getMasteredCount() === HERBS.length) {
      showComplete('🎉', '全部80味药材已掌握！', '下次可直接用「错题强化」巩固薄弱项');
    } else {
      showComplete('📊', '本轮扫荡完成！', `已掌握 ${getMasteredCount()}/${HERBS.length}，剩余未掌握的可继续扫荡或切到「错题强化」`);
    }
    return;
  }

  const herb = sweepQueue[sweepIndex];
  showHerb(herb, 'sweep');
}

// ============================================================
// INTENSIVE MODE (错题强化)
// ============================================================
function pickIntensiveCard() {
  const review = getReviewHerbs();
  if (review.length === 0) {
    if (getMasteredCount() === HERBS.length) {
      showComplete('🎉', '全部药材已掌握，没有需要强化的了！', '点击下方重置可重新开始');
    } else {
      showComplete('✅', '当前没有需要复习的药材！', `已掌握 ${getMasteredCount()}/${HERBS.length}，未掌握的还没标记，切到「扫荡学习」继续`);
    }
    return;
  }
  // 加权: 错误次数越多出现频率越高
  const weighted = [];
  review.forEach(h => {
    const m = getHerbStatus(h);
    const weight = Math.min(m.wrong || 0, 10) + 1;
    for (let i = 0; i < weight; i++) weighted.push(h);
  });
  const herb = weighted[Math.floor(Math.random() * weighted.length)];
  showHerb(herb, 'intensive');
}

// ============================================================
// SHOW HERB (共用卡片展示)
// ============================================================
function showHerb(herb, mode) {
  closeReviewModal();
  currentHerb = herb;
  cardFlipped = false;

  // 重置卡片翻转
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');

  document.getElementById('learnCard').style.display = '';
  document.getElementById('emptyState').style.display = 'none';

  // 正面
  document.getElementById('cardName').textContent = herb.name;
  document.getElementById('cardMeta').textContent = herb.cat + ' · ' + herb.subcat;
  document.getElementById('tapHint').textContent = '👆 点击翻转查看完整信息';

  // 反面内容
  const m = getHerbStatus(herb);
  const wrongInfo = m.wrongNote || '';
  // 解析 wrongNote：逗号分隔的 key 列表，竖线后是补充文本
  const wrongKeys = wrongInfo ? wrongInfo.split('|')[0].split(',').filter(k => k.length > 0 && !k.includes('错记')) : [];
  const wrongExtra = wrongInfo && wrongInfo.includes('|') ? wrongInfo.split('|').slice(1).join('|') : '';
  const wrongDetail = wrongInfo && !wrongInfo.includes('|') ? wrongInfo : '';

  const backHTML = `
    <div class="cb-row">
      <div class="cb-label">性味</div>
      <div class="cb-value highlight">${herb.xingwei}</div>
    </div>
    <div class="cb-row">
      <div class="cb-label">归经</div>
      <div class="cb-value highlight">${herb.guijing}经</div>
    </div>
    <div class="cb-row">
      <div class="cb-label">功效</div>
      <div class="cb-value">${herb.gongxiao}</div>
    </div>
    ${herb.daibiao ? `<div class="cb-row"><div class="cb-label">代表方</div><div class="cb-value">${herb.daibiao}</div></div>` : ''}
    <div class="cb-row">
      <div class="cb-label">🎯 归经功能靶点</div>
      <div class="cb-target-box">${herb.target}</div>
    </div>
    ${wrongKeys.length > 0 ? `<div class="cb-row"><div class="cb-wrong-note">⚠️ 上次薄弱点：${wrongKeys.map(k => ({xingwei:'性味',guijing:'归经',gongxiao:'功效',target:'靶点'})[k] || k).join('、')}</div></div>` : ''}
    ${wrongExtra || wrongDetail ? `<div class="cb-row"><div class="cb-wrong-note">💡 ${wrongExtra || wrongDetail}</div></div>` : ''}
  `;
  document.getElementById('cardBackContent').innerHTML = backHTML;

  // 隐藏判断按钮（翻转后才显示）
  document.getElementById('judgmentBtns').innerHTML = `<span class="hint-text">翻转卡片后做出判断</span>`;

  // 更新进度
  updateProgress(mode);
}

function updateProgress(mode) {
  if (mode === 'sweep') {
    // 计算当前分类进度
    let totalInCat = 0, doneInCat = 0;
    if (currentHerb) {
      const catHerbs = CAT_MAP[currentHerb.subcat].herbs;
      totalInCat = catHerbs.length;
      doneInCat = sweepIndex;
      // 从队列开始到当前索引，减去已掌握的
      let masteredBefore = 0;
      for (let i = 0; i < sweepIndex; i++) {
        if (isMastered(sweepQueue[i])) masteredBefore++;
      }
      doneInCat = sweepIndex - masteredBefore;
      // 更准确地算：看当前分类中排在当前药之前的有多少
      let idxInCat = 0;
      for (let i = 0; i < sweepQueue.length && sweepQueue[i] !== currentHerb; i++) {
        if (sweepQueue[i].subcat === currentHerb.subcat && !isMastered(sweepQueue[i])) {
          idxInCat++;
        }
      }
      doneInCat = idxInCat;
    }

    // 当前剩余队列中此分类的药
    const remainingInCat = sweepQueue.filter((h, i) => i >= sweepIndex && h.subcat === currentHerb.subcat).length;
    const catTotalForDisplay = totalInCat - (totalInCat - remainingInCat - doneInCat); // 不太好算...

    // 简化：直接显示分类名 + 当前是第几题
    document.getElementById('progressCat').textContent = (currentHerb ? currentHerb.cat + '·' + currentHerb.subcat : '完成');
    document.getElementById('progressIndex').textContent = `第 ${sweepIndex+1}/${sweepQueue.length} 题`;

    const pct = sweepQueue.length > 0 ? (sweepIndex / sweepQueue.length * 100) : 100;
    document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';

    document.getElementById('modeLabel').textContent = '📖 扫荡学习';
  } else {
    // 错题强化
    const review = getReviewHerbs();
    document.getElementById('progressCat').textContent = (currentHerb ? currentHerb.cat + '·' + currentHerb.subcat : '—');
    document.getElementById('progressIndex').textContent = `错题库 ${review.length} 味`;
    document.getElementById('progressBar').style.width = (getMasteredCount() / HERBS.length * 100) + '%';
    document.getElementById('modeLabel').textContent = '🎯 错题强化';
  }

  document.getElementById('masteredCount').textContent = getMasteredCount();
  document.getElementById('reviewCount').textContent = getReviewCount();
  document.getElementById('sessionCount').textContent = sessionCount;
}

// ============================================================
// FLIP & JUDGE
// ============================================================
function flipCard() {
  if (!currentHerb) return;
  const inner = document.getElementById('cardInner');
  inner.classList.toggle('flipped');
  cardFlipped = !cardFlipped;

  if (cardFlipped) {
    // 显示判断按钮 — 三档：全对 / 部分 / 全错
    if (currentMode === 'sweep') {
      document.getElementById('judgmentBtns').innerHTML = `
        <button class="btn btn-success" onclick="judgeSweep('correct')">✅ 全对了</button>
        <button class="btn btn-warn" onclick="judgeSweep('partial')">⚠️ 部分对</button>
        <button class="btn btn-error" onclick="judgeSweep('wrong')">❌ 全错了</button>
      `;
    } else {
      document.getElementById('judgmentBtns').innerHTML = `
        <button class="btn btn-success" onclick="judgeIntensive('correct')">✅ 这次全对</button>
        <button class="btn btn-warn" onclick="judgeIntensive('partial')">⚠️ 部分对</button>
        <button class="btn btn-error" onclick="judgeIntensive('wrong')">❌ 还是错了</button>
      `;
    }
  } else {
    document.getElementById('judgmentBtns').innerHTML = `<span class="hint-text">翻转卡片后做出判断</span>`;
  }
}

// 扫荡模式判断 — 三档
function judgeSweep(result) {
  if (!currentHerb) return;
  const name = currentHerb.name;
  if (!mastery[name]) mastery[name] = {status: undefined, wrong: 0, correct: 0, partial: 0, wrongNote: ''};

  if (result === 'correct') {
    mastery[name].status = 'mastered';
    mastery[name].correct = (mastery[name].correct || 0) + 1;
    saveMastery();
    sessionCount++;
    sweepIndex++;
    showSweepCard();
  } else if (result === 'partial') {
    mastery[name].status = 'reviewing';
    mastery[name].partial = (mastery[name].partial || 0) + 1;
    saveMastery();
    sessionCount++;
    showReviewModal(name, () => {
      sweepIndex++;
      showSweepCard();
    });
  } else {
    mastery[name].status = 'reviewing';
    mastery[name].wrong = (mastery[name].wrong || 0) + 1;
    saveMastery();
    sessionCount++;
    showReviewModal(name, () => {
      sweepIndex++;
      showSweepCard();
    });
  }
}

// 错题强化判断 — 三档
function judgeIntensive(result) {
  if (!currentHerb) return;
  const name = currentHerb.name;
  if (!mastery[name]) mastery[name] = {status: undefined, wrong: 0, correct: 0, partial: 0, wrongNote: ''};

  if (result === 'correct') {
    mastery[name].correct = (mastery[name].correct || 0) + 1;
    // 连续正确3次以上且错误率低 → 标记为掌握
    if (mastery[name].correct >= 3 && (mastery[name].wrong || 0) <= mastery[name].correct / 1.5) {
      mastery[name].status = 'mastered';
    }
    saveMastery();
    sessionCount++;
    pickIntensiveCard();
  } else if (result === 'partial') {
    mastery[name].status = 'reviewing';
    mastery[name].partial = (mastery[name].partial || 0) + 1;
    saveMastery();
    sessionCount++;
    showReviewModal(name, () => {
      pickIntensiveCard();
    });
  } else {
    mastery[name].status = 'reviewing';
    mastery[name].wrong = (mastery[name].wrong || 0) + 1;
    mastery[name].correct = 0;
    saveMastery();
    sessionCount++;
    showReviewModal(name, () => {
      pickIntensiveCard();
    });
  }
}

// ============================================================
// COMPLETE STATE
// ============================================================
function showComplete(icon, msg, sub) {
  currentHerb = null;
  document.getElementById('learnCard').style.display = 'none';
  document.getElementById('judgmentBtns').innerHTML = '';
  document.getElementById('emptyState').style.display = '';
  document.getElementById('completeIcon').textContent = icon;
  document.getElementById('completeMsg').textContent = msg;
  document.getElementById('completeSub').textContent = sub;
  
  document.getElementById('masteredCount').textContent = getMasteredCount();
  document.getElementById('reviewCount').textContent = getReviewCount();
  document.getElementById('sessionCount').textContent = sessionCount;
  document.getElementById('progressBar').style.width = '100%';
}

// ============================================================
// REVIEW MODAL (统一弹窗：部分对/全错 均可记录)
// ============================================================
let reviewCallback = null;
let reviewHerbName = '';

function toggleCheckbox(el) {
  el.classList.toggle('checked');
  const icon = el.querySelector('.ck-icon');
  icon.textContent = el.classList.contains('checked') ? '☑' : '☐';
}

function showReviewModal(herbName, callback) {
  reviewHerbName = herbName;
  reviewCallback = callback;
  document.getElementById('reviewHerbName').textContent = herbName;
  // 重置 checkbox
  document.querySelectorAll('.checkbox-item').forEach(el => {
    el.classList.remove('checked');
    el.querySelector('.ck-icon').textContent = '☐';
  });
  document.getElementById('reviewDetail').value = '';
  document.getElementById('reviewModal').classList.add('active');
  setTimeout(() => document.getElementById('reviewDetail').focus(), 100);
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('active');
}

function getCheckedKeys() {
  const checked = [];
  document.querySelectorAll('.checkbox-item.checked').forEach(el => {
    checked.push(el.dataset.key);
  });
  return checked;
}

function saveReview() {
  const keys = getCheckedKeys();
  const detail = document.getElementById('reviewDetail').value.trim();
  const parts = [];
  if (keys.length > 0) parts.push(keys.join(','));
  if (detail) parts.push(detail);
  const note = parts.join('|');
  if (note && mastery[reviewHerbName]) {
    mastery[reviewHerbName].wrongNote = note;
    saveMastery();
  }
  closeReviewModal();
  if (reviewCallback) {
    const cb = reviewCallback;
    reviewCallback = null;
    cb();
  }
}

function skipReview() {
  closeReviewModal();
  if (reviewCallback) {
    const cb = reviewCallback;
    reviewCallback = null;
    cb();
  }
}

// ============================================================
// SWITCH MODE
// ============================================================
function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-mode="${mode}"]`).classList.add('active');

  if (mode === 'table') {
    document.getElementById('learnMode').style.display = 'none';
    document.getElementById('tableMode').style.display = '';
    renderTable();
    return;
  }

  document.getElementById('learnMode').style.display = '';
  document.getElementById('tableMode').style.display = 'none';

  sessionCount = 0;
  closeReviewModal();

  if (mode === 'sweep') {
    buildSweepQueue();
    showSweepCard();
  } else {
    pickIntensiveCard();
  }
}

// ============================================================
// TABLE MODE
// ============================================================
let currentFilterCat = 'all';

function renderTable() {
  const q = document.getElementById('tableSearch').value.trim().toLowerCase();
  let herbs = [...HERBS];

  if (currentFilterCat === '易错') {
    herbs = herbs.filter(h => needsReview(h));
  } else if (currentFilterCat !== 'all') {
    herbs = herbs.filter(h => h.cat === currentFilterCat);
  }
  if (q) {
    herbs = herbs.filter(h =>
      h.name.includes(q) || h.xingwei.includes(q) || h.guijing.includes(q) ||
      h.gongxiao.includes(q) || (h.target && h.target.includes(q))
    );
  }

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('tableEmpty');

  if (herbs.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = herbs.map(h => {
    const tagClass = h.cat === '四虚' ? 'tag-xu' : h.cat === '四实' ? 'tag-shi' : 'tag-wai';
    const status = getHerbStatus(h);
    const badge = status.status === 'mastered' ? ' ✅' : status.status === 'reviewing' ? ' 🔄' : '';
    const rowBg = status.status === 'reviewing' ? 'style="background:#FEF2E8"' : status.status === 'mastered' ? 'style="background:#F0FDF4"' : '';
    return `<tr ${rowBg}>
      <td class="herb-name-cell">${h.name}${badge}</td>
      <td><span class="herb-cat-tag ${tagClass}">${h.cat}</span> ${h.subcat}</td>
      <td>${h.xingwei}</td>
      <td>${h.guijing}经</td>
      <td style="font-size:13px">${h.gongxiao}</td>
      <td><div class="target-text">${h.target}</div></td>
    </tr>`;
  }).join('');
}

function filterTable(cat) {
  currentFilterCat = cat;
  document.querySelectorAll('.cat-filter').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderTable();
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
  if (!confirm('确定重置所有药材的掌握记录？这将清除你的学习进度。')) return;
  mastery = {__version: 2};
  saveMastery();
  sessionCount = 0;
  if (currentMode === 'sweep') {
    buildSweepQueue();
    showSweepCard();
  } else {
    pickIntensiveCard();
  }
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.getElementById('reviewModal').classList.contains('active')) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveReview(); }
    if (e.key === 'Escape') { skipReview(); }
    return;
  }
  if (document.getElementById('learnMode').style.display !== 'none' && currentHerb) {
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
    if (cardFlipped) {
      if (e.key === 'ArrowRight') {
        currentMode === 'sweep' ? judgeSweep('correct') : judgeIntensive('correct');
      }
      if (e.key === 'ArrowUp') {
        currentMode === 'sweep' ? judgeSweep('partial') : judgeIntensive('partial');
      }
      if (e.key === 'ArrowLeft') {
        currentMode === 'sweep' ? judgeSweep('wrong') : judgeIntensive('wrong');
      }
    }
  }
  if (e.key === 'Escape') closeReviewModal();
});

// ============================================================
// INIT
// ============================================================
buildSweepQueue();
showSweepCard();
</script>
