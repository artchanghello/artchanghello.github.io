<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药材扫荡学习 · 446辨证</title>
<meta name="description" content="逐题扫荡全部80味药材，每味自评掌握程度，自动积累易错题库">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --secondary: #65A30D;
  --accent: #C2410C;
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-alt: #FFFBEB;
  --border: #E7E5E4;
  --text: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --error: #DC2626;
  --success: #16A34A;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-lg: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-heading: 'Noto Serif SC', serif;
  --font-body: 'Noto Sans SC', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

/* Nav */
.navbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 60px;
  background: rgba(255,248,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 18px; font-weight: 600; color: var(--primary);
}
.navbar .logo span { color: var(--secondary); }
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 8px 16px; border: none; background: none;
  font-size: 14px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; border-radius: var(--radius-sm);
  font-family: var(--font-body);
  transition: all 0.2s;
  white-space: nowrap;
}
.tab:hover { background: var(--surface-alt); color: var(--primary); }
.tab.active { background: var(--primary); color: white; }

/* Hero */
.hero {
  background: linear-gradient(135deg, #B45309 0%, #D97706 50%, #65A30D 100%);
  color: white; text-align: center;
  padding: 48px 24px 36px;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: clamp(1.5rem,3.5vw,2rem);
  font-weight: 600; margin-bottom: 8px;
}
.hero p { font-size: 15px; opacity: 0.85; }

/* Main */
.main { max-width: 960px; margin: 0 auto; padding: 32px 16px 64px; }

/* ===== Learn Mode (shared) ===== */
.learn-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }

/* Progress bar */
.progress-section {
  width: 100%; max-width: 520px;
  display: flex; flex-direction: column; gap: 8px;
}
.progress-top {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; color: var(--text-secondary); gap: 8px;
}
.progress-top .cat-label {
  font-family: var(--font-heading); font-weight: 600; color: var(--primary);
}
.progress-bar-track {
  width: 100%; height: 6px;
  background: var(--border); border-radius: 3px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--secondary));
  border-radius: 3px; transition: width 0.4s ease;
  width: 0%;
}
.progress-stats {
  font-size: 13px; color: var(--text-muted);
  display: flex; gap: 16px; justify-content: center;
}

/* ===== Fill Form (填空交互) ===== */
.fill-form {
  width: 100%; max-width: 520px;
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  box-shadow: var(--shadow-md);
  border: 1px solid var(--border);
}

.herb-header {
  text-align: center; margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}
.herb-header .herb-name-big {
  font-family: var(--font-heading);
  font-size: 32px; font-weight: 600; color: var(--primary);
  line-height: 1.2;
}
.herb-header .herb-meta {
  font-size: 13px; color: var(--text-muted); margin-top: 4px;
}
.herb-header .wrong-note-box {
  background: #FEF2E8; border-left: 3px solid var(--error);
  padding: 8px 12px; border-radius: 6px;
  font-size: 13px; color: var(--error); margin-top: 10px; text-align: left;
  line-height: 1.5;
}

.efficacy-panel {
  background: var(--surface-alt);
  padding: 12px 16px; border-radius: var(--radius-sm);
  margin-bottom: 18px;
  font-size: 14px; line-height: 1.6; color: var(--text-secondary);
}
.efficacy-panel .ep-label {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.3px; margin-bottom: 2px;
}

/* 填空区 */
.fill-section {
  margin-bottom: 14px;
}
.fill-label {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.3px; margin-bottom: 6px;
}
.fill-blank-row {
  font-size: 15px; line-height: 1.8; color: var(--text-secondary);
  display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
}

.fill-slot {
  display: inline-block; min-width: 60px; padding: 2px 10px;
  border: 2px dashed var(--border); border-radius: 6px;
  text-align: center; font-size: 15px; font-weight: 500; color: var(--text-muted);
  transition: all 0.2s; cursor: default;
}
.fill-slot.multi { min-width: 100px; }
.fill-slot.correct {
  border-color: var(--success); background: #F0FDF4; color: var(--success);
}
.fill-slot.wrong {
  border-color: var(--error); background: #FEF2E8; color: var(--error);
}
.fill-slot.filled {
  color: var(--text); border-color: var(--primary);
}
.slot-count {
  font-size: 12px; color: var(--text-muted); margin-left: 6px;
}

/* Chip 选项卡片 */
.chip-group {
  display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
}
.chip {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 5px 14px; border: 1.5px solid var(--border);
  border-radius: 20px; font-size: 14px; font-family: var(--font-body);
  color: var(--text-secondary); background: var(--surface);
  cursor: pointer; transition: all 0.15s; user-select: none;
}
.chip:hover { border-color: var(--primary); color: var(--primary); background: var(--surface-alt); }
.chip.selected {
  background: var(--primary); color: white; border-color: var(--primary);
}
.chip.disabled {
  opacity: 0.5; cursor: not-allowed; pointer-events: none;
}
.chip.correct-show {
  background: var(--success); color: white; border-color: var(--success); opacity: 0.85;
}
.chip.wrong-show {
  background: var(--error); color: white; border-color: var(--error); opacity: 0.85;
}

/* 功能归经靶点（统批后显示） */
.target-display {
  background: #FFF8F0; border-left: 3px solid var(--secondary);
  padding: 12px 16px; border-radius: 6px;
  margin-bottom: 16px;
}
.target-display .td-label {
  font-size: 11px; font-weight: 500; color: var(--text-muted);
  letter-spacing: 0.3px; margin-bottom: 4px;
}
.target-display .td-content {
  font-size: 14px; line-height: 1.6; color: var(--text-secondary);
}

/* 底部操作 */
.form-actions {
  display: flex; gap: 10px; justify-content: center; margin-top: 8px;
}

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 10px 24px; border: none; border-radius: 40px;
  font-size: 15px; font-weight: 500; cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.2s;
}
.btn:hover { transform: translateY(-1px); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-light); }
.btn-secondary { background: var(--surface); color: var(--text-secondary); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: #15803D; }
.btn-error { background: var(--error); color: white; }
.btn-error:hover { background: #B91C1C; }
.btn-warn { background: var(--primary); color: white; }
.btn-warn:hover { background: var(--primary-light); }
.btn-small { padding: 6px 14px; font-size: 13px; }

/* Empty / Complete */
.empty-state {
  text-align: center; padding: 60px 24px; color: var(--text-muted);
}
.empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 16px; margin-top: 8px; }
.empty-state .sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

/* ===== Table Mode ===== */
.table-controls {
  display: flex; gap: 12px; margin-bottom: 24px;
  flex-wrap: wrap; align-items: center;
}
.table-controls input {
  flex: 1; min-width: 200px; padding: 10px 16px;
  border: 1.5px solid var(--border); border-radius: 40px;
  font-size: 14px; outline: none; font-family: var(--font-body);
  background: var(--surface);
}
.table-controls input:focus { border-color: var(--primary); }
.cat-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.cat-filter {
  padding: 5px 14px; border: 1.5px solid var(--border);
  border-radius: 20px; background: var(--surface);
  font-size: 13px; cursor: pointer; transition: all 0.2s;
  font-family: var(--font-body); color: var(--text-secondary);
}
.cat-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
.cat-filter:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

.herb-table-wrap { overflow-x: auto; }
.herb-table {
  width: 100%; border-collapse: collapse;
  font-size: 14px;
}
.herb-table th {
  background: var(--surface-alt);
  padding: 10px 12px; text-align: left;
  font-weight: 500; color: var(--text-secondary);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  position: sticky; top: 0;
}
.herb-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: top; line-height: 1.5;
}
.herb-table tr:hover td { background: var(--surface-alt); }
.herb-table .herb-name-cell {
  font-family: var(--font-heading);
  color: var(--primary); font-weight: 600; white-space: nowrap;
}
.herb-table .herb-cat-tag {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  border-radius: 12px; font-weight: 500;
}
.tag-xu { background: #EBF5FB; color: #1E6FA0; }
.tag-shi { background: #FDEBD0; color: #A25E0A; }
.tag-wai { background: #E8F8F0; color: #1D7A5E; }
.herb-table .target-text {
  font-size: 13px; color: var(--text-secondary);
  line-height: 1.55;
}

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: #292524; color: white; padding: 10px 24px;
  border-radius: 40px; font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-lg); z-index: 2000;
  opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
  white-space: nowrap; font-family: var(--font-body);
}
.toast.show { opacity: 1; }

/* ===== Review Modal ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 1000;
  justify-content: center; align-items: center;
  padding: 24px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-lg);
  max-width: 500px; width: 100%; padding: 32px;
  box-shadow: var(--shadow-lg); max-height: 80vh; overflow-y: auto;
  position: relative;
}
.modal h2 {
  font-family: var(--font-heading);
  font-size: 20px; color: var(--primary); margin-bottom: 4px;
}
.modal .modal-herb-name {
  font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;
}
/* 错误项摘要 */
.error-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 14px; border-radius: var(--radius-sm);
  font-size: 14px; line-height: 1.5;
}
.error-item.err-xingwei { background: #FEF2E8; border-left: 3px solid var(--error); }
.error-item.err-guijing { background: #FEF2E8; border-left: 3px solid var(--error); }
.error-item .ei-label { font-weight: 600; color: var(--error); white-space: nowrap; }
.error-item .ei-correct { color: var(--text-secondary); }
.modal .form-group { margin-bottom: 14px; }
.modal .form-group label {
  display: block; font-size: 13px; font-weight: 500;
  color: var(--text-secondary); margin-bottom: 4px;
}
.modal .form-group textarea {
  width: 100%; padding: 10px 14px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 14px; outline: none; font-family: var(--font-body);
  resize: vertical;
}
.modal .form-group textarea:focus { border-color: var(--primary); }
.modal .form-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 8px;
}
.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; font-size: 24px;
  color: var(--text-muted); cursor: pointer; line-height: 1;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .navbar { padding: 0 10px; height: 52px; }
  .navbar .logo { font-size: 15px; }
  .tabs { gap: 2px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 6px 10px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .hero { padding: 28px 16px 22px; }
  .hero h1 { font-size: 1.3rem; }
  .hero p { font-size: 13px; }
  .main { padding: 20px 12px 64px; }
  .fill-form { padding: 20px 16px; }
  .herb-header .herb-name-big { font-size: 26px; }
  .herb-header .herb-meta { font-size: 12px; }
  .efficacy-panel { padding: 10px 14px; font-size: 13px; }
  .fill-blank-row { font-size: 14px; }
  .fill-slot { min-width: 50px; font-size: 14px; padding: 1px 8px; }
  .fill-slot.multi { min-width: 80px; }
  .chip { font-size: 13px; padding: 4px 12px; }
  .target-display { padding: 10px 14px; }
  .target-display .td-content { font-size: 13px; }
  .btn { padding: 8px 18px; font-size: 14px; }
  .progress-top { font-size: 13px; flex-wrap: wrap; }
  .progress-stats { font-size: 12px; gap: 10px; flex-wrap: wrap; }
  .herb-table { font-size: 12px; }
  .herb-table th, .herb-table td { padding: 6px 8px; }
  .herb-table .herb-name-cell { font-size: 13px; }
  .table-controls input { min-width: 140px; padding: 8px 14px; font-size: 13px; }
  .cat-filter { font-size: 12px; padding: 4px 10px; }
  .modal { padding: 24px 20px; margin: 0 12px; max-width: 100%; }
  .modal h2 { font-size: 18px; }
  .error-item { font-size: 13px; padding: 8px 12px; }
  .modal .form-actions { flex-wrap: wrap; }
  .modal .form-actions .btn { flex: 1; justify-content: center; min-width: 80px; }
}

@media (max-width: 480px) {
  .navbar { height: 48px; padding: 0 8px; }
  .navbar .logo { font-size: 14px; }
  .tab { padding: 5px 8px; font-size: 11px; }
  .hero { padding: 22px 12px 18px; }
  .hero h1 { font-size: 1.15rem; }
  .main { padding: 16px 10px 56px; }
  .fill-form { padding: 16px 12px; border-radius: var(--radius-md); }
  .herb-header .herb-name-big { font-size: 22px; }
  .efficacy-panel { padding: 8px 12px; font-size: 12px; }
  .fill-blank-row { font-size: 13px; }
  .fill-slot { min-width: 40px; font-size: 13px; padding: 1px 6px; }
  .fill-slot.multi { min-width: 70px; }
  .chip { font-size: 12px; padding: 3px 10px; }
  .target-display .td-content { font-size: 12px; }
  .form-actions { flex-direction: column; align-items: stretch; gap: 8px; }
  .form-actions .btn { justify-content: center; }
  .progress-top { font-size: 12px; }
  .progress-stats { font-size: 11px; gap: 6px; }
  .table-controls { flex-direction: column; gap: 8px; }
  .table-controls input { min-width: 0; width: 100%; }
  .cat-filters { justify-content: center; }
  .herb-table th:nth-child(5), .herb-table td:nth-child(5),
  .herb-table th:nth-child(6), .herb-table td:nth-child(6) { display: none; }
  .herb-table th:nth-child(3), .herb-table td:nth-child(3) { display: none; }
  .herb-table { font-size: 11px; }
  .herb-table th, .herb-table td { padding: 5px 6px; }
  .modal { padding: 20px 16px; }
  .modal h2 { font-size: 16px; }
  .error-item { font-size: 12px; padding: 6px 10px; }
  .modal .form-group textarea { font-size: 13px; padding: 8px 12px; }
  .btn { padding: 7px 14px; font-size: 13px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">446<span>·药材</span></div>
  <div class="tabs">
    <button class="tab active" data-mode="sweep" onclick="switchMode('sweep')">📖 扫荡学习</button>
    <button class="tab" data-mode="intensive" onclick="switchMode('intensive')">🎯 错题强化</button>
    <button class="tab" data-mode="table" onclick="switchMode('table')">📋 归经靶点表</button>
  </div>
</nav>

<section class="hero">
  <h1>药材扫荡学习</h1>
  <p>逐题过一遍，每味药都做判断，易错题库自动建成</p>
</section>

<main class="main">

  <!-- ===== Learn Mode (扫荡学习 + 错题强化 共用) ===== -->
  <div id="learnMode">
    <div class="learn-area">

      <!-- Progress -->
      <div class="progress-section" id="progressSection">
        <div class="progress-top">
          <span><span class="cat-label" id="progressCat">四虚·气虚</span> <span id="progressIndex">1/8</span></span>
          <span id="modeLabel">扫荡学习</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-stats">
          <span>已掌握 <strong id="masteredCount">0</strong>/80</span>
          <span>需复习 <strong id="reviewCount">0</strong></span>
          <span>本轮 <strong id="sessionCount">0</strong></span>
        </div>
      </div>

      <!-- Fill Form (填空交互) -->
      <div class="fill-form" id="fillForm">
        <!-- 药材名 + 分类标签 + 薄弱点提示 -->
        <div class="herb-header">
          <div class="herb-name-big" id="herbName">—</div>
          <div class="herb-meta" id="herbMeta"></div>
          <div class="wrong-note-box" id="wrongNoteBox" style="display:none"></div>
        </div>

        <!-- 功效（显示，不可交互） -->
        <div class="efficacy-panel">
          <div class="ep-label">功效</div>
          <div id="herbEfficacy">—</div>
        </div>

        <!-- 四性五味 填空区 -->
        <div class="fill-section">
          <div class="fill-label">四性五味</div>
          <div class="fill-blank-row">
            <span>性 </span><span class="fill-slot" id="slotSiXing" data-ans="四性">?</span>
            <span>，味 </span><span class="fill-slot" id="slotXingWei" data-ans="五味">?</span>
          </div>
        </div>

        <!-- 四性选项卡片 -->
        <div class="chip-group" id="sixingChips">
          <span class="chip" data-value="寒">寒</span>
          <span class="chip" data-value="热">热</span>
          <span class="chip" data-value="温">温</span>
          <span class="chip" data-value="凉">凉</span>
          <span class="chip" data-value="平">平</span>
          <span class="chip" data-value="微寒">微寒</span>
          <span class="chip" data-value="微温">微温</span>
        </div>

        <!-- 五味选项卡片 -->
        <div class="chip-group" id="wuweiChips">
          <span class="chip" data-value="酸">酸</span>
          <span class="chip" data-value="苦">苦</span>
          <span class="chip" data-value="甘">甘</span>
          <span class="chip" data-value="辛">辛</span>
          <span class="chip" data-value="咸">咸</span>
          <span class="chip" data-value="淡">淡</span>
          <span class="chip" data-value="涩">涩</span>
        </div>

        <!-- 归经 填空区 -->
        <div class="fill-section">
          <div class="fill-label">归经</div>
          <div class="fill-blank-row">
            归 <span class="fill-slot multi" id="slotGuijing">?</span> 经
            <span class="slot-count" id="guijingCount">已选 0</span>
          </div>
        </div>

        <!-- 十二经选项卡片 -->
        <div class="chip-group" id="meridianChips">
          <span class="chip" data-value="心">心</span>
          <span class="chip" data-value="肝">肝</span>

const STORAGE_KEY = 'herb_mastery_v2';

let mastery = loadMastery();
let currentMode = 'sweep'; // 'sweep' | 'intensive'
let currentHerb = null;
let sweepQueue = [];
let sweepIndex = 0;
let lastSweepHerb = null; // 离开扫荡模式时记录的当前位置药材名
let sessionCount = 0;

// 分类顺序（按HERBS中的实际顺序）
const CAT_ORDER = [];
const CAT_MAP = {};
HERBS.forEach(h => {
  if (!CAT_MAP[h.subcat]) {
    CAT_MAP[h.subcat] = {cat: h.cat, subcat: h.subcat, herbs: []};
    CAT_ORDER.push(h.subcat);
  }
  CAT_MAP[h.subcat].herbs.push(h);
});

function loadMastery() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const d = JSON.parse(raw);
    const herbKeys = Object.keys(d || {}).filter(k => k !== '__version');
    console.log(`loadMastery: raw="${raw ? (raw.slice(0,50)+'…') : 'null'}", herbs=${herbKeys.length}`);
    // v1兼容：如果之前用的是mistakes格式，迁移
    if (d && d.__version === undefined) {
      const migrated = {};
      Object.keys(d).forEach(k => {
        if (k !== '__version') {
          migrated[k] = {
            status: d[k].mastered ? 'mastered' : 'reviewing',
            wrong: d[k].wrong || 0,
            correct: d[k].correct || 0,
            wrongNote: d[k].wrongNote || ''
          };
        }
      });
      migrated.__version = 2;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
      console.log('v1→v2 迁移完成');
      return migrated;
    }
    // 清理废弃的 wrongNote key（checkbox 时代遗留的 gongxiao, target）
    if (d) {
      Object.keys(d).forEach(k => {
        if (k === '__version') return;
        const entry = d[k];
        if (entry && entry.wrongNote) {
          const parts = entry.wrongNote.split('|');
          const keys = parts[0].split(',').filter(kk => kk && kk !== 'gongxiao' && kk !== 'target');
          if (keys.length === 0 && parts.length === 1) {
            // 全都是废弃 key → 清空
            delete entry.wrongNote;
          } else if (keys.join(',') !== parts[0]) {
            // 部分废弃 → 更新
            parts[0] = keys.join(',');
            entry.wrongNote = parts.join('|');
          }
        }
      });
    }
    return d || {__version: 2};
  } catch(e) {
    console.error('loadMastery 出错:', e.message);
    return {__version: 2};
  }
}

function saveMastery() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mastery));
    showToast('✅ 已保存');
  } catch(e) {
    console.error('localStorage 保存失败:', e);
    showToast('❌ 保存失败，请检查存储空间');
  }
}

let toastTimer = null;
function showToast(msg, duration) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration || 1500);
}

// ======== 导出/导入 ========
function exportMastery() {
  const data = JSON.stringify(mastery, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `药材学习记录_${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('✅ 已导出为 JSON 文件');
}

function importMastery() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const data = JSON.parse(ev.target.result);
        // 验证格式
        if (typeof data !== 'object' || data === null) throw new Error('无效格式');
        const herbCount = Object.keys(data).filter(k => k !== '__version').length;
        if (herbCount === 0 && !data.__version) throw new Error('无有效数据');
        if (!confirm(`导入后将覆盖当前学习记录（${herbCount} 味药材），确定？`)) return;
        mastery = data;
        saveMastery();
        // 重建视图
        if (currentMode === 'sweep') {
          buildSweepQueue();
          showSweepCard();
        } else if (currentMode === 'intensive') {
          pickIntensiveCard();
        } else {
          renderTable();
        }
        updateProgress(currentMode);
        showToast(`✅ 导入成功：${herbCount} 条记录`);
      } catch(err) {
        showToast('❌ 导入失败：文件格式错误');
        console.error('导入错误:', err);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function getHerbStatus(herb) {
  return mastery[herb.name] || {status: undefined, wrong: 0, correct: 0, wrongNote: ''};
}

function isMastered(herb) {
  return getHerbStatus(herb).status === 'mastered';
}

function needsReview(herb) {
  return getHerbStatus(herb).status === 'reviewing';
}

function getReviewHerbs() {
  return HERBS.filter(h => needsReview(h));
}

function getMasteredCount() {
  return HERBS.filter(h => isMastered(h)).length;
}

function getReviewCount() {
  return getReviewHerbs().length;
}

// ============================================================
// SWEEP MODE (扫荡学习) 
// ============================================================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildSweepQueue() {
  sweepQueue = [];
  CAT_ORDER.forEach(subcat => {
    const herbs = CAT_MAP[subcat].herbs.filter(h => !isMastered(h));
    shuffle(herbs);
    sweepQueue.push(...herbs);
  });
  sweepIndex = 0;
  // 如有记录的上次位置，在新队列中找回去
  if (lastSweepHerb) {
    const idx = sweepQueue.findIndex(h => h.name === lastSweepHerb);
    if (idx >= 0) sweepIndex = idx;
    lastSweepHerb = null; // 用完即弃，避免后续重建也偏移
  }
}

function showSweepCard() {
  if (sweepIndex >= sweepQueue.length) {
    // 当前轮扫荡完成
    if (getMasteredCount() === HERBS.length) {
      showComplete('🎉', '全部80味药材已掌握！', '下次可直接用「错题强化」巩固薄弱项');
    } else {
      showComplete('📊', '本轮扫荡完成！', `已掌握 ${getMasteredCount()}/${HERBS.length}，剩余未掌握的可继续扫荡或切到「错题强化」`);
    }
    return;
  }

  const herb = sweepQueue[sweepIndex];
  showHerb(herb, 'sweep');
}

// ============================================================
// INTENSIVE MODE (错题强化)
// ============================================================
function pickIntensiveCard() {
  const review = getReviewHerbs();
  if (review.length === 0) {
    if (getMasteredCount() === HERBS.length) {
      showComplete('🎉', '全部药材已掌握，没有需要强化的了！', '点击下方重置可重新开始');
    } else {
      showComplete('✅', '当前没有需要复习的药材！', `已掌握 ${getMasteredCount()}/${HERBS.length}，未掌握的还没标记，切到「扫荡学习」继续`);
    }
    return;
  }
  // 加权: 错误次数越多出现频率越高
  const weighted = [];
  review.forEach(h => {
    const m = getHerbStatus(h);
    const weight = Math.min(m.wrong || 0, 10) + 1;
    for (let i = 0; i < weight; i++) weighted.push(h);
  });
  const herb = weighted[Math.floor(Math.random() * weighted.length)];
  showHerb(herb, 'intensive');
}

// SHOW HERB (填空表单渲染)
// ============================================================
function showHerb(herb, mode) {
  closeReviewModal();
  currentHerb = herb;

  document.getElementById('fillForm').style.display = '';
  document.getElementById('emptyState').style.display = 'none';

  // 药材名 + 分类
  document.getElementById('herbName').textContent = herb.name;
  document.getElementById('herbMeta').textContent = herb.cat + ' · ' + herb.subcat;

  // 薄弱点提示（扫荡模式不显示上次错记内容）
  const wrongNoteBox = document.getElementById('wrongNoteBox');
  if (mode === 'sweep') {
    wrongNoteBox.style.display = 'none';
  } else {
    const m = getHerbStatus(herb);
    const wrongInfo = m.wrongNote || '';
    const wrongKeys = wrongInfo ? wrongInfo.split('|')[0].split(',').filter(k => k.length > 0 && !k.includes('错记') && k !== 'gongxiao' && k !== 'target') : [];
    const wrongExtra = wrongInfo && wrongInfo.includes('|') ? wrongInfo.split('|').slice(1).join('|') : '';
    const wrongDetail = wrongInfo && !wrongInfo.includes('|') ? wrongInfo : '';
    if (wrongKeys.length > 0 || wrongExtra || wrongDetail) {
      const parts = [];
      if (wrongKeys.length > 0) parts.push('⚠️ 上次薄弱点：' + wrongKeys.map(k => ({xingwei:'性味',guijing:'归经',gongxiao:'功效',target:'靶点'})[k] || k).join('、'));
      if (wrongExtra || wrongDetail) parts.push('💡 ' + (wrongExtra || wrongDetail));
      wrongNoteBox.innerHTML = parts.join('<br>');
      wrongNoteBox.style.display = 'block';
    } else {
      wrongNoteBox.style.display = 'none';
    }
  }

  // 功效
  document.getElementById('herbEfficacy').textContent = herb.gongxiao;

  // 重置填空 slot
  resetSlots();

  // 重置 chip 选择
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected', 'disabled', 'correct-show', 'wrong-show'));

  // 隐藏统批后元素
  document.getElementById('targetDisplay').style.display = 'none';

  // 按钮状态
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('nextBtn').style.display = 'none';

  // 启用所有 chip
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('disabled'));

  // 更新进度
  updateProgress(mode);
}

function updateProgress(mode) {
  if (mode === 'sweep') {
    // 计算当前分类进度
    let totalInCat = 0, doneInCat = 0;
    if (currentHerb) {
      const catHerbs = CAT_MAP[currentHerb.subcat].herbs;
      totalInCat = catHerbs.length;
      doneInCat = sweepIndex;
      // 从队列开始到当前索引，减去已掌握的
      let masteredBefore = 0;
      for (let i = 0; i < sweepIndex; i++) {
        if (isMastered(sweepQueue[i])) masteredBefore++;
      }
      doneInCat = sweepIndex - masteredBefore;
      // 更准确地算：看当前分类中排在当前药之前的有多少
      let idxInCat = 0;
      for (let i = 0; i < sweepQueue.length && sweepQueue[i] !== currentHerb; i++) {
        if (sweepQueue[i].subcat === currentHerb.subcat && !isMastered(sweepQueue[i])) {
          idxInCat++;
        }
      }
      doneInCat = idxInCat;
    }

    // 当前剩余队列中此分类的药
    const remainingInCat = sweepQueue.filter((h, i) => i >= sweepIndex && h.subcat === currentHerb.subcat).length;
    const catTotalForDisplay = totalInCat - (totalInCat - remainingInCat - doneInCat); // 不太好算...

    // 简化：直接显示分类名 + 当前是第几题
    document.getElementById('progressCat').textContent = (currentHerb ? currentHerb.cat + '·' + currentHerb.subcat : '完成');
    document.getElementById('progressIndex').textContent = `第 ${sweepIndex+1}/${sweepQueue.length} 题`;

    const pct = sweepQueue.length > 0 ? (sweepIndex / sweepQueue.length * 100) : 100;
    document.getElementById('progressBar').style.width = Math.min(pct, 100) + '%';

    document.getElementById('modeLabel').textContent = '📖 扫荡学习';
  } else {
    // 错题强化
    const review = getReviewHerbs();
    document.getElementById('progressCat').textContent = (currentHerb ? currentHerb.cat + '·' + currentHerb.subcat : '—');
    document.getElementById('progressIndex').textContent = `错题库 ${review.length} 味`;
    document.getElementById('progressBar').style.width = (getMasteredCount() / HERBS.length * 100) + '%';
    document.getElementById('modeLabel').textContent = '🎯 错题强化';
  }

  document.getElementById('masteredCount').textContent = getMasteredCount();
  document.getElementById('reviewCount').textContent = getReviewCount();
  document.getElementById('sessionCount').textContent = sessionCount;
}

// ============================================================
// CHECK ALL (统批校验)
// ============================================================
function parseXingWei(xingwei) {
  // "甘，温" → 五味=["甘"], 四性="温"
  // "苦、甘，温" → 五味=["苦","甘"], 四性="温"
  // "甘、微温" → 五味=["甘"], 四性="微温"
  // "大辛，大热；有毒" → 五味=["辛"], 四性="热"
  // "辛、甘，温" → 五味=["辛","甘"], 四性="温"
  // "甘、酸、涩，温" → 五味=["甘","酸","涩"], 四性="温"
  // "甘，平" → 五味=["甘"], 四性="平"
  const cleaned = xingwei.replace(/大/g, '').replace(/；有毒/g, '').replace(/；有小毒/g, '').trim();
  
  // 优先用中文逗号分割
  const lastComma = cleaned.lastIndexOf('，');
  if (lastComma > 0) {
    // 有逗号：逗号左=五味，右=四性
    const wuweiStr = cleaned.slice(0, lastComma);
    const sixingStr = cleaned.slice(lastComma + 1);
    const wuwei = wuweiStr.split(/[、,，]/).map(s => s.trim()).filter(s => s.length > 0);
    const sixing = sixingStr.trim();
    return { wuwei, sixing };
  }
  
  // 无逗号（如"甘、微温"）：全部用顿号，最后一项是四性
  const parts = cleaned.split('、').map(s => s.trim()).filter(s => s.length > 0);
  if (parts.length <= 1) {
    return { wuwei: [], sixing: parts[0] || '' };
  }
  return { wuwei: parts.slice(0, -1), sixing: parts[parts.length - 1] };
}

function checkAll() {
  if (!currentHerb) return;

  // 防止重复点击
  const checkBtn = document.getElementById('checkBtn');
  if (checkBtn.disabled) return;
  checkBtn.disabled = true;

  // 禁用所有 chip，防止修改
  document.querySelectorAll('.chip').forEach(c => c.classList.add('disabled'));

  const herb = currentHerb;

  // 解析正确答案
  const { wuwei: ansWuwei, sixing: ansSixing } = parseXingWei(herb.xingwei);
  const ansGuijing = herb.guijing.split(/[、,，]/).map(s => s.trim()).filter(s => s.length > 0);

  // 收集用户选择
  const userSixing = document.querySelector('#sixingChips .chip.selected');
  const userSixingVal = userSixing ? userSixing.dataset.value : '';

  const userWuwei = Array.from(document.querySelectorAll('#wuweiChips .chip.selected')).map(c => c.dataset.value);
  const userGuijing = Array.from(document.querySelectorAll('#meridianChips .chip.selected')).map(c => c.dataset.value);

  // 校验结果
  let allCorrect = true;
  let anyCorrect = false;

  // 四性校验
  const slotSiXing = document.getElementById('slotSiXing');
  const sixingCorrect = userSixingVal === ansSixing;
  if (sixingCorrect) {
    slotSiXing.className = 'fill-slot correct';
    slotSiXing.textContent = ansSixing;
    anyCorrect = true;
  } else {
    slotSiXing.className = 'fill-slot wrong';
    slotSiXing.textContent = userSixingVal || '?';
    allCorrect = false;
  }

  // 五味校验（order无关）
  const wuweiCorrect = arraysMatchIgnoringOrder(userWuwei, ansWuwei);
  const slotXingWei = document.getElementById('slotXingWei');
  if (wuweiCorrect) {
    slotXingWei.className = 'fill-slot correct';
    slotXingWei.textContent = ansWuwei.join('、');
    anyCorrect = true;
  } else {
    slotXingWei.className = 'fill-slot wrong';
    slotXingWei.textContent = userWuwei.length > 0 ? userWuwei.join('、') : '?';
    allCorrect = false;
  }

  // 归经校验（order无关）
  const guijingCorrect = arraysMatchIgnoringOrder(userGuijing, ansGuijing);
  const slotGuijing = document.getElementById('slotGuijing');
  if (guijingCorrect) {
    slotGuijing.className = 'fill-slot multi correct';
    slotGuijing.textContent = ansGuijing.join('、');
    anyCorrect = true;
  } else {
    slotGuijing.className = 'fill-slot multi wrong';
    slotGuijing.textContent = userGuijing.length > 0 ? userGuijing.join('、') : '?';
    allCorrect = false;
  }

  // Chip 高亮：正确变绿，错误变红
  // 四性 chips
  document.querySelectorAll('#sixingChips .chip').forEach(c => {
    if (c.dataset.value === ansSixing) {
      c.classList.add('correct-show');
    } else if (c.classList.contains('selected')) {
      c.classList.add('wrong-show');
    }
  });
  // 五味 chips
  document.querySelectorAll('#wuweiChips .chip').forEach(c => {
    if (c.classList.contains('selected') && !ansWuwei.includes(c.dataset.value)) {
      c.classList.add('wrong-show');
    } else if (!c.classList.contains('selected') && ansWuwei.includes(c.dataset.value)) {
      c.classList.add('correct-show');
    } else if (c.classList.contains('selected') && ansWuwei.includes(c.dataset.value)) {
      c.classList.add('correct-show');
    }
  });
  // 归经 chips
  document.querySelectorAll('#meridianChips .chip').forEach(c => {
    if (c.classList.contains('selected') && !ansGuijing.includes(c.dataset.value)) {
      c.classList.add('wrong-show');
    } else if (!c.classList.contains('selected') && ansGuijing.includes(c.dataset.value)) {
      c.classList.add('correct-show');
    } else if (c.classList.contains('selected') && ansGuijing.includes(c.dataset.value)) {
      c.classList.add('correct-show');
    }
  });

  // 显示功能归经靶点
  document.getElementById('targetContent').textContent = herb.target;
  document.getElementById('targetDisplay').style.display = '';

  // 判断结果 + 收集错误项
  const wrongParts = [];
  if (!sixingCorrect || !wuweiCorrect) wrongParts.push('xingwei');
  if (!guijingCorrect) wrongParts.push('guijing');

  let result;
  if (allCorrect) {
    result = 'correct';
    showToast('✅ 全对了！');
  } else if (anyCorrect) {
    result = 'partial';
    showToast('⚠️ 部分正确，继续加油');
  } else {
    result = 'wrong';
    showToast('❌ 全错了，看看正确答案吧');
  }

  // 调用判断逻辑（传递错误项以便弹窗显示）
  if (currentMode === 'sweep') {
    judgeSweep(result, wrongParts);
  } else {
    judgeIntensive(result, wrongParts);
  }
}

function arraysMatchIgnoringOrder(a, b) {
  if (a.length !== b.length) return false;
  const sortedA = [...a].sort();
  const sortedB = [...b].sort();
  return sortedA.every((v, i) => v === sortedB[i]);
}

function nextCard() {
  if (currentMode === 'sweep') {
    showSweepCard();
  } else {
    pickIntensiveCard();
  }
}

// 扫荡模式判断 — 三档（仅记录状态，不自动推进）
function judgeSweep(result, wrongParts) {
  if (!currentHerb) return;
  const name = currentHerb.name;
  if (!mastery[name]) mastery[name] = {status: undefined, wrong: 0, correct: 0, partial: 0, wrongNote: ''};

  sessionCount++;

  if (result === 'correct') {
    mastery[name].status = 'mastered';
    mastery[name].correct = (mastery[name].correct || 0) + 1;
    saveMastery();
    sweepIndex++;
    showNextBtn();
  } else {
    mastery[name].status = 'reviewing';
    if (result === 'partial') {
      mastery[name].partial = (mastery[name].partial || 0) + 1;
    } else {
      mastery[name].wrong = (mastery[name].wrong || 0) + 1;
    }
    saveMastery();
    sweepIndex++;
    showReviewModal(name, wrongParts, () => { showNextBtn(); });
  }
}

// 错题强化判断 — 三档（仅记录状态，不自动推进）
function judgeIntensive(result, wrongParts) {
  if (!currentHerb) return;
  const name = currentHerb.name;
  if (!mastery[name]) mastery[name] = {status: undefined, wrong: 0, correct: 0, partial: 0, wrongNote: ''};

  sessionCount++;

  if (result === 'correct') {
    mastery[name].correct = (mastery[name].correct || 0) + 1;
    if (mastery[name].correct >= 3 && (mastery[name].wrong || 0) <= mastery[name].correct / 1.5) {
      mastery[name].status = 'mastered';
    }
    saveMastery();
    showNextBtn();
  } else {
    mastery[name].status = 'reviewing';
    if (result === 'partial') {
      mastery[name].partial = (mastery[name].partial || 0) + 1;
    } else {
      mastery[name].wrong = (mastery[name].wrong || 0) + 1;
      mastery[name].correct = 0;
    }
    saveMastery();
    showReviewModal(name, wrongParts, () => { showNextBtn(); });
  }
}

function showNextBtn() {
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('nextBtn').style.display = '';
  updateProgress(currentMode);
}

// ============================================================
// COMPLETE STATE
// ============================================================
function showComplete(icon, msg, sub) {
  currentHerb = null;
  document.getElementById('fillForm').style.display = 'none';
  document.getElementById('emptyState').style.display = '';
  document.getElementById('completeIcon').textContent = icon;
  document.getElementById('completeMsg').textContent = msg;
  document.getElementById('completeSub').textContent = sub;
  
  document.getElementById('masteredCount').textContent = getMasteredCount();
  document.getElementById('reviewCount').textContent = getReviewCount();
  document.getElementById('sessionCount').textContent = sessionCount;
  document.getElementById('progressBar').style.width = '100%';
}

// ============================================================
// REVIEW MODAL (自动记录错误项 + 显示正确答案)
// ============================================================
let reviewCallback = null;
let reviewHerbName = '';

const LABEL_MAP = { xingwei:'性味', guijing:'归经' };

function showReviewModal(herbName, wrongParts, callback) {
  reviewHerbName = herbName;
  reviewCallback = callback;

  document.getElementById('reviewHerbName').textContent = herbName;
  document.getElementById('reviewDetail').value = '';

  // 构建错误摘要
  const summary = document.getElementById('errorSummary');
  summary.innerHTML = '';

  // 如果有历史薄弱点，先显示
  const m = mastery[herbName] || {};
  if (m.wrongNote) {
    const oldKeys = m.wrongNote.split('|')[0].split(',').filter(k => k && !k.includes('错记') && k !== 'gongxiao' && k !== 'target');
    if (oldKeys.length > 0) {
      const extra = document.createElement('div');
      extra.className = 'error-item err-xingwei';
      extra.style.borderLeftColor = '#D97706';
      extra.style.background = '#FFFBEB';
      extra.innerHTML = `<span class="ei-label" style="color:#D97706">📌</span><span class="ei-correct">上次薄弱：${oldKeys.map(k => LABEL_MAP[k] || k).join('、')}</span>`;
      summary.appendChild(extra);
    }
  }

  // 显示本次错误项 + 正确答案
  if (!wrongParts || wrongParts.length === 0) {
    // 兜底：不应发生，以防万一
    const item = document.createElement('div');
    item.className = 'error-item err-xingwei';
    item.innerHTML = `<span class="ei-label">❌</span><span class="ei-correct">有内容未答对，看看上方标红的区域</span>`;
    summary.appendChild(item);
  } else {
    wrongParts.forEach(key => {
      const item = document.createElement('div');
      item.className = 'error-item err-' + key;
      const label = LABEL_MAP[key] || key;
      let correctText = '';
      if (key === 'xingwei' && currentHerb) {
        correctText = '正确答案：' + currentHerb.xingwei.replace(/；有毒|；有小毒/g, '');
      } else if (key === 'guijing' && currentHerb) {
        correctText = '正确答案：' + currentHerb.guijing + '经';
      }
      item.innerHTML = `<span class="ei-label">❌ ${label}</span><span class="ei-correct">${correctText}</span>`;
      summary.appendChild(item);
    });
  }

  // 自动记录错误项到 wrongNote
  if (wrongParts && wrongParts.length > 0 && mastery[herbName]) {
    const note = wrongParts.join(',');
    mastery[herbName].wrongNote = note;
    saveMastery();
  }

  document.getElementById('reviewModal').classList.add('active');
  setTimeout(() => document.getElementById('reviewDetail').focus(), 100);
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('active');
}

function saveReview() {
  // 保存补充文本（如果有）
  const detail = document.getElementById('reviewDetail').value.trim();
  if (detail && mastery[reviewHerbName]) {
    const existing = mastery[reviewHerbName].wrongNote || '';
    const parts = existing.split('|');
    if (parts.length >= 1) {
      parts[1] = detail;
    } else {
      parts.push(detail);
    }
    mastery[reviewHerbName].wrongNote = parts.join('|');
    saveMastery();
  }
  closeReviewModal();
  if (reviewCallback) {
    const cb = reviewCallback;
    reviewCallback = null;
    cb();
  }
}

function skipReview() {
  closeReviewModal();
  if (reviewCallback) {
    const cb = reviewCallback;
    reviewCallback = null;
    cb();
  }
}

// ============================================================
// SWITCH MODE
// ============================================================
function switchMode(mode) {
  // 离开扫荡模式前记录当前位置
  if (currentMode === 'sweep' && mode !== 'sweep') {
    lastSweepHerb = sweepQueue[sweepIndex]?.name || null;
  }
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-mode="${mode}"]`).classList.add('active');

  if (mode === 'table') {
    document.getElementById('learnMode').style.display = 'none';
    document.getElementById('tableMode').style.display = '';
    renderTable();
    return;
  }

  document.getElementById('learnMode').style.display = '';
  document.getElementById('tableMode').style.display = 'none';

  sessionCount = 0;
  closeReviewModal();

  if (mode === 'sweep') {
    buildSweepQueue();
    showSweepCard();
  } else {
    pickIntensiveCard();
  }
}

// ============================================================
// TABLE MODE
// ============================================================
let currentFilterCat = 'all';

function renderTable() {
  const q = document.getElementById('tableSearch').value.trim().toLowerCase();
  let herbs = [...HERBS];

  if (currentFilterCat === '易错') {
    herbs = herbs.filter(h => needsReview(h));
  } else if (currentFilterCat !== 'all') {
    herbs = herbs.filter(h => h.cat === currentFilterCat);
  }
  if (q) {
    herbs = herbs.filter(h =>
      h.name.includes(q) || h.xingwei.includes(q) || h.guijing.includes(q) ||
      h.gongxiao.includes(q) || (h.target && h.target.includes(q))
    );
  }

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('tableEmpty');

  if (herbs.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = herbs.map(h => {
    const tagClass = h.cat === '四虚' ? 'tag-xu' : h.cat === '四实' ? 'tag-shi' : 'tag-wai';
    const status = getHerbStatus(h);
    const badge = status.status === 'mastered' ? ' ✅' : status.status === 'reviewing' ? ' 🔄' : '';
    const rowBg = status.status === 'reviewing' ? 'style="background:#FEF2E8"' : status.status === 'mastered' ? 'style="background:#F0FDF4"' : '';
    return `<tr ${rowBg}>
      <td class="herb-name-cell">${h.name}${badge}</td>
      <td><span class="herb-cat-tag ${tagClass}">${h.cat}</span> ${h.subcat}</td>
      <td>${h.xingwei}</td>
      <td>${h.guijing}经</td>
      <td style="font-size:13px">${h.gongxiao}</td>
      <td><div class="target-text">${h.target}</div></td>
    </tr>`;
  }).join('');
}

function filterTable(cat) {
  currentFilterCat = cat;
  document.querySelectorAll('.cat-filter').forEach(b => {
    b.classList.toggle('active', b.dataset.cat === cat);
  });
  renderTable();
}

// ============================================================
// RESET
// ============================================================
function resetAll() {
  if (!confirm('确定重置所有药材的掌握记录？这将清除你的学习进度。')) return;
  mastery = {__version: 2};
  saveMastery();
  sessionCount = 0;
  if (currentMode === 'sweep') {
    buildSweepQueue();
    showSweepCard();
  } else {
    pickIntensiveCard();
  }
}

// ============================================================
// KEYBOARD
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (document.getElementById('reviewModal').classList.contains('active')) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveReview(); }
    if (e.key === 'Escape') { skipReview(); }
    return;
  }
  if (document.getElementById('learnMode').style.display !== 'none' && currentHerb) {
    // 填空交互：无快捷判断键，仅通过「检查答案」按钮
    // 保留 Escape 用于关闭弹窗
  }
  if (e.key === 'Escape') closeReviewModal();
});

// ============================================================
// INIT
// ============================================================
// 检查 localStorage 可用性
(function checkStorage() {
  try {
    const testKey = '__storage_test__';
    localStorage.setItem(testKey, '1');
    localStorage.removeItem(testKey);
  } catch(e) {
    console.warn('localStorage 不可用:', e.message);
    document.getElementById('progressSection').innerHTML +=
      '<div style="color:var(--error);text-align:center;font-size:13px;padding:8px;background:#FEF2E8;border-radius:8px;">⚠️ 浏览器存储不可用，刷新后数据会丢失。<br>请使用「导出记录」保存到本地，下次使用时「导入记录」</div>';
  }
})();

// 显示已加载的数据量，帮助诊断数据是否持久化
const loadedCount = Object.keys(mastery).filter(k => k !== '__version').length;
if (loadedCount > 0) {
  setTimeout(() => showToast(`📂 已加载 ${loadedCount} 条学习记录`), 800);
} else {
  console.log('本地无已保存的学习记录，首次使用或数据已清空');
}

buildSweepQueue();
showSweepCard();
</script>
