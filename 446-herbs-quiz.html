<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --secondary: #65A30D;
  --accent: #C2410C;
  --bg: #FFF8F0;
  --surface: #FFFFFF;
  --surface-alt: #FFFBEB;
  --border: #E7E5E4;
  --text: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 10px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg: 0 10px 20px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --font-heading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-body: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
  --fs-body: clamp(0.95rem, 2vw, 1.05rem);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* Nav */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(255, 248, 240, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 600; color: var(--primary);
  text-decoration: none;
}
.navbar .logo span { color: var(--secondary); }
.nav-links { display: flex; align-items: center; gap: 10px; }
.nav-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 18px;
  background: var(--primary); color: white !important;
  border-radius: var(--radius-sm); text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: background 0.25s ease, transform 0.15s ease;
  cursor: pointer; font-family: inherit;
}
.nav-btn:hover { background: var(--primary-light); }
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.nav-btn.secondary { background: var(--secondary); }
.nav-btn.secondary:hover { background: #4D7C0F; }

.container { max-width: 720px; margin: 0 auto; padding: 32px 16px 64px; }

/* Status */
.status-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px; font-size: 14px; color: var(--text-secondary);
}
.score-badge {
  background: var(--primary); color: #fff;
  padding: 4px 14px; border-radius: 20px; font-weight: 600;
  font-size: 13px;
}
.progress-bar {
  width: 100%; height: 4px; background: var(--border);
  border-radius: 2px; margin-bottom: 24px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--secondary);
  border-radius: 2px; transition: width 0.35s ease;
}

/* Quiz card */
.quiz-card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  padding: 36px 28px;
  margin-bottom: 24px;
  text-align: center;
  border: 1px solid var(--border);
}
.quiz-card .label {
  font-size: 14px; color: var(--text-muted); margin-bottom: 8px;
}
.quiz-card .formula-name {
  font-family: var(--font-heading);
  font-size: 28px; font-weight: 600; color: var(--primary);
  margin-bottom: 28px;
  line-height: 1.3;
}

/* Blanks */
.blanks-area {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
  margin-bottom: 24px;
}
.blank-slot {
  min-width: 84px; min-height: 44px;
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  padding: 6px 16px;
  font-size: 15px; color: var(--primary); font-weight: 500;
  font-family: var(--font-body);
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg);
  user-select: none;
}
.blank-slot.filled {
  border-style: solid;
  border-color: var(--secondary);
  background: #F0F9E8;
  color: var(--text);
}
.blank-slot.filled:hover {
  border-color: var(--accent);
  background: #FFF0E8;
}
.blank-slot.correct {
  border-color: var(--secondary) !important;
  background: #E8F5E0 !important;
  color: #3B6D0E !important;
  cursor: default;
}
.blank-slot.wrong {
  border-color: #DC2626 !important;
  background: #FEF2F2 !important;
  color: #DC2626 !important;
  cursor: default;
}
.blank-slot.show-answer {
  border-color: #D97706 !important;
  background: #FFF8E7 !important;
  color: #B45309 !important;
  cursor: default;
}

/* Options area */
.options-area {
  background: var(--surface);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  padding: 24px;
  border: 1px solid var(--border);
}
.options-area .section-title {
  font-size: 14px; font-weight: 500; color: var(--text-muted);
  margin-bottom: 16px; text-align: center;
}
.herbs-grid {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 8px;
}
.herb-btn {
  padding: 8px 18px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface); color: var(--text);
  font-size: 14px; cursor: pointer;
  transition: all 0.2s ease;
  font-family: var(--font-body);
}
.herb-btn:hover:not(.used) {
  border-color: var(--primary);
  background: #FFF5EB;
}
.herb-btn.used {
  opacity: 0.3;
  pointer-events: none;
  border-style: dashed;
}

/* Buttons */
.actions {
  display: flex; justify-content: center; gap: 12px;
  margin-top: 24px;
}
.btn {
  padding: 10px 28px; border-radius: var(--radius-sm);
  border: none; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font-body);
  transition: all 0.2s ease;
}
.btn-primary {
  background: var(--primary); color: #fff;
}
.btn-primary:hover:not(:disabled) { background: var(--primary-light); }
.btn-primary:disabled {
  background: #D6D3D1; color: #A8A29E; cursor: not-allowed;
}
.btn-outline {
  background: var(--surface); color: var(--text-secondary);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* Toast */
.result-toast {
  position: fixed; top: 76px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 500;
  z-index: 999; opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
  box-shadow: var(--shadow-md);
}
.result-toast.show { opacity: 1; }
.result-toast.correct { background: #E8F5E0; color: #3B6D0E; }
.result-toast.wrong { background: #FFF0F0; color: #DC2626; }

/* End screen */
.end-screen {
  text-align: center; padding: 48px 20px;
  display: none;
}
.end-screen .big-score {
  font-size: 72px; font-weight: 700; color: var(--primary);
  line-height: 1; font-family: var(--font-heading);
}
.end-screen .big-score small {
  font-size: 20px; font-weight: 400; color: var(--text-muted);
}
.end-screen .subtitle {
  font-size: 16px; color: var(--text-secondary);
  margin-top: 12px; margin-bottom: 32px;
}

/* Animation */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.animate-in { animation: fadeSlideUp 0.35s ease-out; }

/* Mobile */
@media (max-width: 768px) {
  .navbar { padding: 0 16px; height: 56px; }
  .navbar .logo { font-size: 17px; }
  .nav-btn { padding: 6px 12px; font-size: 13px; }
  .container { padding: 24px 12px 48px; }
  .quiz-card { padding: 24px 16px; }

  .herb-btn { padding: 8px 14px; font-size: 13px; min-height: 44px; }
  .blank-slot { min-width: 68px; min-height: 44px; padding: 6px 12px; font-size: 14px; }
}
@media (max-width: 380px) {
  .quiz-card .formula-name { font-size: 18px; }
  .quiz-card { padding: 20px 12px; }
}
</style>

// 优先尝试加载外部数据文件，如果失败则用内嵌数据
(function loadExternalData() {
  // 尝试加载外部文件，但不阻塞页面渲染
  const script = document.createElement('script');
  script.src = '446-formula-herbs.js';
  script.onload = function() {
    if (typeof FORMULA_HERBS_EXTERNAL !== 'undefined' && FORMULA_HERBS_EXTERNAL.length > 0) {
      FORMULA_HERBS.length = 0;
      FORMULA_HERBS.push(...FORMULA_HERBS_EXTERNAL);
      if (typeof init === 'function') init();
    }
  };
  document.head.appendChild(script);
})();

// ============ 状态 ============
let currentIndex = 0;
let score = 0;
let quizOrder = [];
let currentFormula = null;
let filledSlots = [];
let currentButtons = [];
let currentOptions = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function init() {
  quizOrder = [...Array(FORMULA_HERBS.length).keys()];
  shuffle(quizOrder);
  currentIndex = 0;
  score = 0;
  updateStatus();
  loadQuestion();
}

function loadQuestion() {
  const idx = quizOrder[currentIndex];
  currentFormula = FORMULA_HERBS[idx];
  filledSlots = new Array(currentFormula.herbs.length).fill(null);

  document.getElementById("formulaName").textContent = currentFormula.name;
  renderBlanks();
  generateOptions();
  updateStatus();
  document.getElementById("submitBtn").disabled = true;

  const card = document.getElementById("quizCard");
  card.classList.remove("animate-in");
  void card.offsetWidth;
  card.classList.add("animate-in");
}

function renderBlanks() {
  const area = document.getElementById("blanksArea");
  area.innerHTML = "";
  filledSlots.forEach((herb, i) => {
    const slot = document.createElement("div");
    slot.className = "blank-slot" + (herb ? " filled" : "");
    slot.textContent = herb || "？";
    slot.onclick = () => removeFilled(i);
    area.appendChild(slot);
  });
}

function generateOptions() {
  const correct = currentFormula.herbs;
  const distractorSet = new Set();
  FORMULA_HERBS.forEach(f => {
    if (f.name === currentFormula.name) return;
    f.herbs.forEach(h => distractorSet.add(h));
  });
  const distractors = Array.from(distractorSet).filter(h => !correct.includes(h));
  shuffle(distractors);
  const totalOptions = Math.min(16, correct.length + distractors.length);
  const numDistractors = Math.min(distractors.length, totalOptions - correct.length);
  const selected = distractors.slice(0, numDistractors);
  currentOptions = [...correct, ...selected];
  shuffle(currentOptions);

  const grid = document.getElementById("herbsGrid");
  grid.innerHTML = "";
  currentButtons = [];
  currentOptions.forEach(herb => {
    const btn = document.createElement("button");
    btn.className = "herb-btn";
    btn.textContent = herb;
    btn.onclick = () => selectHerb(herb, btn);
    grid.appendChild(btn);
    currentButtons.push({ herb, el: btn });
  });
}

function selectHerb(herb, btnEl) {
  const emptyIdx = filledSlots.indexOf(null);
  if (emptyIdx === -1) return;
  filledSlots[emptyIdx] = herb;
  btnEl.classList.add("used");
  renderBlanks();
  if (filledSlots.indexOf(null) === -1) {
    document.getElementById("submitBtn").disabled = false;
  }
}

function removeFilled(slotIdx) {
  const herb = filledSlots[slotIdx];
  if (!herb) return;
  filledSlots[slotIdx] = null;
  currentButtons.forEach(item => {
    if (item.herb === herb && item.el.classList.contains("used")) {
      if (!filledSlots.includes(herb)) {
        item.el.classList.remove("used");
      }
    }
  });
  renderBlanks();
  document.getElementById("submitBtn").disabled = true;
}

function checkAnswer() {
  const correct = currentFormula.herbs;
  const slots = document.querySelectorAll(".blank-slot");
  const correctCopy = [...correct];
  filledSlots.forEach((herb, i) => {
    if (!herb) {
      slots[i].classList.add("wrong");
    } else {
      const idx = correctCopy.indexOf(herb);
      if (idx !== -1) {
        slots[i].classList.add("correct");
        correctCopy.splice(idx, 1);
      } else {
        slots[i].classList.add("wrong");
      }
    }
  });

  let rightNum = 0;
  const correctCopy2 = [...correct];
  filledSlots.forEach(herb => {
    if (!herb) return;
    const idx = correctCopy2.indexOf(herb);
    if (idx !== -1) {
      rightNum++;
      correctCopy2.splice(idx, 1);
    }
  });

  if (rightNum === correct.length) {
    score++;
    showToast("全部正确！", "correct");
    setTimeout(() => goNext(), 900);
  } else {
    showToast("答对 " + rightNum + "/" + correct.length + "，显示正确答案", "wrong");
    setTimeout(() => showCorrectAnswer(), 1200);
  }
  updateStatus();
}

function showCorrectAnswer() {
  const correct = currentFormula.herbs;
  const slots = document.querySelectorAll(".blank-slot");
  const usedCorrect = new Set();
  slots.forEach((slotEl, i) => {
    if (slotEl.classList.contains("correct")) {
      usedCorrect.add(filledSlots[i]);
    }
  });
  let correctIdx = 0;
  slots.forEach((slotEl, i) => {
    if (!slotEl.classList.contains("correct")) {
      while (correctIdx < correct.length && usedCorrect.has(correct[correctIdx])) {
        correctIdx++;
      }
      if (correctIdx < correct.length) {
        slotEl.textContent = correct[correctIdx];
        slotEl.classList.remove("wrong");
        slotEl.classList.add("show-answer");
        usedCorrect.add(correct[correctIdx]);
        correctIdx++;
      }
    }
  });
  setTimeout(() => goNext(), 2000);
}

function goNext() {
  currentIndex++;
  if (currentIndex >= FORMULA_HERBS.length) {
    showEndScreen();
  } else {
    loadQuestion();
  }
}

function resetCurrent() {
  filledSlots = new Array(currentFormula.herbs.length).fill(null);
  currentButtons.forEach(item => item.el.classList.remove("used"));
  renderBlanks();
  document.getElementById("submitBtn").disabled = true;
}

function updateStatus() {
  document.getElementById("progressText").textContent =
    "第 " + (currentIndex + 1) + " / " + FORMULA_HERBS.length + " 题";
  document.getElementById("scoreBadge").textContent = "得分 " + score;
  document.getElementById("progressFill").style.width =
    ((currentIndex) / FORMULA_HERBS.length * 100) + "%";
}

function showToast(msg, type) {
  const toast = document.getElementById("resultToast");
  toast.textContent = msg;
  toast.className = "result-toast " + type + " show";
  setTimeout(function() { toast.classList.remove("show"); }, 1500);
}

function showEndScreen() {
  document.getElementById("quizCard").style.display = "none";
  document.getElementById("optionsArea").style.display = "none";
  document.getElementById("statusBar").style.display = "none";
  document.querySelector(".progress-bar").style.display = "none";

  const end = document.getElementById("endScreen");
  end.style.display = "block";

  const pct = Math.round(score / FORMULA_HERBS.length * 100);
  document.getElementById("bigScore").innerHTML =
    score + '<small> / ' + FORMULA_HERBS.length + '</small>';

  var msg = "";
  if (pct >= 90) msg = "太厉害了，你已经完全掌握用药表！";
  else if (pct >= 70) msg = "不错，再加把劲就能完全掌握。";
  else if (pct >= 50) msg = "继续加油，多练几次就能记住。";
  else msg = "建议多看看用药表，熟悉方剂组成。";
  document.getElementById("endSubtitle").textContent = msg;
  document.getElementById("progressFill").style.width = "100%";
}

function restartQuiz() {
  document.getElementById("quizCard").style.display = "";
  document.getElementById("optionsArea").style.display = "";
  document.getElementById("statusBar").style.display = "";
  document.querySelector(".progress-bar").style.display = "";
  document.getElementById("endScreen").style.display = "none";
  init();
}

init();
</script>
</body>
</html>
