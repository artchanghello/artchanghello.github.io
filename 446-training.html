<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>446辨证训练 · 四虚四实六外感</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* === 蓝色配色（保留原色系） === */
  --primary: #1565C0;
  --primary-50: #E3F2FD;
  --primary-light: #1976D2;
  --primary-600: #0D47A1;
  --accent: #0288D1;
  --accent-light: #03A9F4;
  --surface-warm: #F0F4F8;
  --surface-card: #FFFFFF;
  --surface-alt: #E3F2FD;
  --text-primary: #1A1A1A;
  --text-secondary: #555555;
  --text-muted: #999999;
  --border: #E0E4E8;

  /* 功能色 */
  --correct: #2E7D32;
  --wrong: #C62828;
  --timeout: #E65100;
  --correct-bg: #E8F5E9;
  --wrong-bg: #FFEBEE;
  --timeout-bg: #FFF3E0;

  /* 字体 */
  --font-heading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-body: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;

  /* 字号 */
  --fs-h1: clamp(1.5rem, 4vw, 2rem);
  --fs-h2: clamp(1.15rem, 3vw, 1.5rem);
  --fs-body: clamp(0.95rem, 2vw, 1.05rem);
  --fs-small: clamp(0.85rem, 1.5vw, 0.9rem);
  --fs-caption: 0.75rem;

  /* 间距 */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 48px;
  --space-2xl: 64px;

  /* 圆角 */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;

  /* 阴影 */
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --shadow-modal: 0 10px 15px rgba(0,0,0,0.08), 0 4px 6px rgba(0,0,0,0.04);

  /* 过渡 */
  --transition-fast: 150ms ease;
  --transition-base: 250ms ease;
  --transition-slow: 350ms ease;

  /* 布局 */
  --container-narrow: 800px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--surface-warm);
  color: var(--text-primary);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* ===== 可访问性 ===== */
.skip-link {
  position: absolute; top: -40px; left: 0;
  background: var(--primary); color: white;
  padding: 8px 16px; z-index: 10000;
  border-radius: 0 0 var(--radius-sm) 0;
  font-family: var(--font-body);
  font-size: var(--fs-small);
}
.skip-link:focus { top: 0; }

/* ===== 导航栏 ===== */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-lg);
  height: 64px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  letter-spacing: 1px;
}
.navbar .logo span { color: var(--primary); }
.nav-links { display: flex; align-items: center; gap: var(--space-sm); }
.home-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 18px;
  background: var(--primary);
  color: white !important;
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-size: var(--fs-small); font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background var(--transition-base), transform var(--transition-fast);
}
.home-btn:hover {
  background: var(--primary-600);
  transform: translateY(-1px);
}
.home-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ===== 英雄区 ===== */
.hero {
  background: linear-gradient(135deg, #1565C0 0%, #0288D1 50%, #03A9F4 100%);
  color: white;
  text-align: center;
  padding: var(--space-xl) var(--space-lg) 40px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,255,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(3,169,244,0.08) 0%, transparent 50%);
  pointer-events: none;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--fs-h1);
  font-weight: 700;
  margin-bottom: var(--space-sm);
  position: relative;
}
.hero p {
  font-size: var(--fs-small);
  opacity: 0.8;
  letter-spacing: 3px;
  margin-bottom: var(--space-lg);
  position: relative;
}

/* ===== 模式切换标签 ===== */
.mode-tabs {
  display: flex; justify-content: center;
  gap: var(--space-sm);
  flex-wrap: wrap;
  position: relative;
}
.mode-tab {
  padding: 10px 24px;
  border-radius: 24px;
  border: 1.5px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.9);
  font-size: var(--fs-small);
  cursor: pointer;
  font-family: var(--font-body);
  transition: all var(--transition-base);
  -webkit-tap-highlight-color: transparent;
}
.mode-tab:hover { background: rgba(255,255,255,0.18); }
.mode-tab.active {
  background: white;
  color: var(--primary-600);
  font-weight: 600;
  border-color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}

/* ===== 进度统计栏 ===== */
.stats-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: var(--space-lg);
  padding: var(--space-md) var(--space-lg);
  background: var(--surface-card);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.stat-item { text-align: center; }
.stat-label {
  font-size: var(--fs-caption);
  color: var(--text-muted);
  letter-spacing: 1px;
  margin-bottom: 2px;
}
.stat-value {
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  font-family: var(--font-heading);
}
.stat-value.correct-rate { color: var(--correct); }
.progress-bar-track {
  width: 180px;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--accent));
  border-radius: 3px;
  transition: width 0.35s ease;
}

/* ===== 布局容器 ===== */
.layout {
  max-width: var(--container-narrow);
  margin: 0 auto;
  padding: var(--space-lg);
}

/* ===== 题目卡片 ===== */
.question-card {
  background: var(--surface-card);
  border-radius: var(--radius-md);
  padding: var(--space-lg);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  margin-bottom: var(--space-lg);
}
.question-text {
  font-size: var(--fs-body);
  line-height: 1.9;
  margin-bottom: var(--space-lg);
  padding: var(--space-md);
  background: var(--surface-warm);
  border-radius: var(--radius-sm);
  border-left: 4px solid var(--primary);
  color: var(--text-primary);
}
.question-mode-badge {
  font-size: var(--fs-caption);
  color: var(--primary);
  font-weight: 600;
  margin-bottom: var(--space-sm);
  display: inline-block;
  padding: 2px 10px;
  background: var(--primary-50);
  border-radius: 4px;
}

/* ===== 倒计时条 ===== */
.timer-bar {
  display: flex; align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
  padding: 10px 14px;
  background: var(--timeout-bg);
  border-radius: var(--radius-sm);
}
.timer-bar.warning { background: var(--wrong-bg); }
.timer-track {
  flex: 1; height: 6px;
  background: #E7E5E4;
  border-radius: 3px;
  overflow: hidden;
}
.timer-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.3s linear;
}
.timer-bar.warning .timer-fill { background: var(--wrong); }
.timer-text {
  font-size: var(--fs-small);
  font-weight: 700;
  color: var(--text-secondary);
  min-width: 60px; text-align: right;
}
.timer-bar.warning .timer-text { color: var(--wrong); }

/* ===== 选项按钮 ===== */
.options { display: flex; flex-direction: column; gap: var(--space-sm); }
.option {
  padding: 14px 18px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: var(--surface-card);
  color: var(--text-primary);
  font-size: var(--fs-body);
  cursor: pointer;
  text-align: left;
  font-family: var(--font-body);
  line-height: 1.6;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}
.option:hover:not(:disabled) {
  border-color: var(--primary);
  background: var(--surface-warm);
}
.option:disabled { cursor: default; opacity: 0.7; }
.option.correct {
  border-color: var(--correct);
  background: var(--correct-bg);
  color: var(--correct);
  font-weight: 600;
}
.option.wrong {
  border-color: var(--wrong);
  background: var(--wrong-bg);
  color: var(--wrong);
  text-decoration: line-through;
}
.option.timeout {
  border-color: var(--timeout);
  background: var(--timeout-bg);
  color: var(--timeout);
}
.option:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* ===== 反馈区 ===== */
.feedback {
  margin-top: var(--space-md);
  padding: var(--space-md);
  border-radius: var(--radius-sm);
  font-size: var(--fs-small);
  line-height: 1.8;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct {
  background: var(--correct-bg);
  border-left: 4px solid var(--correct);
}
.feedback.wrong {
  background: var(--wrong-bg);
  border-left: 4px solid var(--wrong);
}
.feedback.timeout {
  background: var(--timeout-bg);
  border-left: 4px solid var(--timeout);
}
.feedback-title { font-weight: 700; margin-bottom: var(--space-xs); }
.feedback-detail { color: var(--text-secondary); font-size: var(--fs-small); }

/* ===== 导航按钮 ===== */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--space-sm);
  margin-top: var(--space-lg);
}
.nav-btn {
  padding: 10px 24px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface-card);
  font-size: var(--fs-small);
  cursor: pointer;
  font-family: var(--font-body);
  color: var(--text-secondary);
  min-height: 44px;
  transition: all var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}
.nav-btn:hover:not(:disabled) {
  border-color: var(--primary);
  color: var(--primary);
}
.nav-btn.primary {
  background: var(--primary);
  color: white;
  border-color: transparent;
}
.nav-btn.primary:hover { background: var(--primary-600); }
.nav-btn:disabled { opacity: 0.4; cursor: default; }

/* ===== 交卷页面 ===== */
.score-card {
  text-align: center;
  padding: var(--space-xl) var(--space-lg);
}
.score-card h2 {
  font-family: var(--font-heading);
  font-size: var(--fs-h2);
  color: var(--text-primary);
  margin-bottom: var(--space-md);
}
.score-circle {
  width: 120px; height: 120px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: var(--space-md) auto;
  font-size: 34px; font-weight: 700;
  font-family: var(--font-heading);
}
.score-detail {
  font-size: var(--fs-body);
  color: var(--text-secondary);
  line-height: 2.2;
}
.score-btn {
  margin-top: var(--space-lg);
  padding: 12px 36px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--primary);
  color: white;
  font-size: var(--fs-body);
  cursor: pointer;
  font-family: var(--font-body);
  transition: background var(--transition-base);
  -webkit-tap-highlight-color: transparent;
}
.score-btn:hover { background: var(--primary-600); }
.score-btn:focus-visible {
  outline: 2px solid var(--primary);
  outline-offset: 2px;
}

/* ===== 页脚 ===== */
.footer {
  text-align: center;
  padding: var(--space-lg) var(--space-md);
  color: var(--text-muted);
  font-size: var(--fs-caption);
  border-top: 1px solid var(--border);
  margin-top: var(--space-xl);
}

/* ===== 空状态 ===== */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-secondary);
}
.empty-state h3 {
  font-size: var(--fs-body);
  margin-bottom: var(--space-sm);
  color: var(--text-primary);
}

/* ===== FAB 浮动按钮组 ===== */
.fab-group {
  position: fixed;
  bottom: var(--space-lg);
  right: var(--space-lg);
  z-index: 999;
  display: flex; flex-direction: column;
  gap: var(--space-sm);
  align-items: flex-end;
}
.fab-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: white;
  box-shadow: var(--shadow-elevated);
  transition: transform var(--transition-base), opacity var(--transition-slow);
  opacity: 0; transform: scale(0.8);
  pointer-events: none;
  -webkit-tap-highlight-color: transparent;
}
.fab-btn.show {
  opacity: 1; transform: scale(1);
  pointer-events: auto;
}
.fab-btn:hover { transform: scale(1.08); }
.fab-btn.top-btn { background: var(--primary); }
.fab-btn.font-btn {
  background: var(--accent);
  font-weight: 700;
  font-size: var(--fs-small);
}

/* ===== 字体弹窗 ===== */
.font-popup {
  position: fixed;
  bottom: 80px;
  right: var(--space-lg);
  z-index: 1000;
  background: var(--surface-card);
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-modal);
  padding: var(--space-sm) 0;
  display: none;
  min-width: 120px;
}
.font-popup.show { display: block; }
.font-option {
  display: block; width: 100%;
  padding: 10px 20px;
  border: none;
  background: none;
  text-align: left;
  cursor: pointer;
  font-family: var(--font-body);
  color: var(--text-primary);
  font-size: var(--fs-small);
  transition: background var(--transition-fast);
}
.font-option:hover { background: var(--surface-warm); }
.font-option.active {
  color: var(--accent);
  font-weight: 700;
}

/* ===== 字号切换 ===== */
body.font-small .question-text { font-size: 0.85rem; }
body.font-large .question-text { font-size: 1.15rem; }
body.font-xlarge .question-text { font-size: 1.3rem; }

/* ===== 移动端优化 ===== */
@media (max-width: 768px) {
  * { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }

  .navbar { padding: 0 var(--space-md); height: 56px; }
  .navbar .logo { font-size: 17px; }
  .home-btn { padding: 6px 12px; font-size: var(--fs-caption); }

  .hero { padding: var(--space-lg) var(--space-md) 32px; }
  .hero h1 { letter-spacing: 1px; }
  .hero p { font-size: var(--fs-caption); letter-spacing: 2px; margin-bottom: var(--space-md); }
  .mode-tabs { gap: 6px; }
  .mode-tab { padding: 8px 14px; font-size: var(--fs-caption); }

  .stats-bar { padding: var(--space-sm) var(--space-md); gap: var(--space-sm); }
  .stat-value { font-size: 18px; }
  .progress-bar-track { width: 100px; }

  .layout { padding: var(--space-md); }

  .question-card { padding: var(--space-md); margin-bottom: var(--space-md); }
  .question-text { font-size: 0.95rem; padding: var(--space-sm); line-height: 1.9; }
  .question-mode-badge { font-size: 0.7rem; }

  .option {
    padding: 14px 16px;
    font-size: var(--fs-body);
    min-height: 50px;
    line-height: 1.7;
    border-radius: var(--radius-sm);
  }
  .timer-bar { padding: var(--space-sm) var(--space-sm); font-size: var(--fs-small); }
  .timer-text { font-size: var(--fs-small); min-width: 50px; }
  .feedback { padding: var(--space-sm); font-size: var(--fs-small); }

  .nav-buttons { flex-direction: column-reverse; gap: var(--space-sm); }
  .nav-btn { width: 100%; padding: 12px 0; font-size: var(--fs-body); min-height: 48px; border-radius: var(--radius-sm); }
  .nav-btn.primary { order: -1; }

  .score-card { padding: var(--space-lg) var(--space-md); }
  .score-circle { width: 100px; height: 100px; font-size: 26px; }
  .score-card h2 { font-size: var(--fs-h2); }
  .score-btn { width: 100%; padding: 14px 0; font-size: var(--fs-body); min-height: 48px; }

  .fab-group { bottom: var(--space-md); right: var(--space-md); gap: var(--space-sm); }
  .fab-btn { width: 40px; height: 40px; font-size: 16px; }
  .font-popup { bottom: 64px; right: var(--space-md); }
}

@media (max-width: 380px) {
  .hero h1 { font-size: 1.35rem; }
  .mode-tab { font-size: 0.7rem; padding: 7px 10px; }
  .question-text { font-size: 0.88rem; }
  .option { font-size: var(--fs-small); padding: 12px 14px; }
  .stats-bar { gap: 6px; }
  .stat-label { font-size: 0.65rem; }
}
</style>
</head><body>
<a href="#main-content" class="skip-link">跳到主要内容</a>
<nav class="navbar"><a href="index.html" class="logo">446<span>·</span>辨证训练</a><div class="nav-links"><a href="index.html" class="home-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg><span>首页</span></a></div></nav>
<section class="hero"><h1>446辨证训练</h1><p>四虚四实六外感 · 实战训练</p><div class="mode-tabs"><div class="mode-tab active" data-mode="pattern" onclick="switchMode('pattern')">看案辨证（30题）</div><div class="mode-tab" data-mode="discern" onclick="switchMode('discern')">鉴别冲刺（15题·60秒）</div></div></section>
<div class="stats-bar">
<div class="stat-item"><div class="stat-label">进度</div><div class="stat-value" id="qNum">0/0</div></div>
<div class="stat-item"><div class="stat-label">得分</div><div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div></div>
<div class="stat-item"><div class="stat-label">正确率</div><div class="stat-value correct-rate" id="accuracy">0%</div></div></div>
<div class="layout" id="main-content"><div id="questionArea"></div></div>
<div class="footer"><p>446辨证体系 · 四虚四实六外感</p></div>
<div class="fab-group"><button id="jumpTopBtn" class="fab-btn top-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button><button id="fontSizeBtn" class="fab-btn font-btn">A</button><div id="fontPopup" class="font-popup">
<button class="font-option active" data-size="font-normal">中</button><button class="font-option" data-size="font-small">小</button><button class="font-option" data-size="font-large">大</button><button class="font-option" data-size="font-xlarge">特大</button></div></div>
<script src="446-training-data.js"></script><script>
const MODE_SIZES={pattern:30,discern:15};
const SEEN_KEY='446_train_v3';
let currentMode='pattern',filteredIndices=[],currentIndex=0,answered={},results={},totalAnswered=0,correctCount=0,timerInterval=null;
let currentDisplayOrder = []; // 显示顺序映射：displayOrder[i] = 原始options中的索引
let cachedDiscernData = null;   // 缓存DISCERN题目，避免每次重新生成
let questionDisplayOrders = {};  // 每个题目的显示顺序：{idx: [0,1,2,3]}

function getDiscernQuestions(){
    let questions = [...DISCERN_DATA];
    PATTERN_DATA.forEach((q,idx)=>{
        // 解析正确答案文本（兼容 answer 是文本 或 "A"/"B"/"C"/"D" 两种格式）
        let correctOpt;
        if(q.answer==='A'||q.answer==='B'||q.answer==='C'||q.answer==='D'){
            let correctIdx = {'A':0,'B':1,'C':2,'D':3}[q.answer];
            correctOpt = q.options[correctIdx];
        } else {
            correctOpt = q.answer;
        }
        let wrongOpts = q.options.filter(o => o !== correctOpt);
        let wrongOpt = wrongOpts[Math.floor(Math.random()*wrongOpts.length)];
        // 从 explanation 提取"方药→功效"映射
        let eff = {};
        if(q.explanation){
            q.explanation.split(/[；;]/g).forEach(function(part){
                let m = part.match(/([^=＝]+)[=＝](.+)/);
                if(m) eff[m[1].trim()]= m[2].trim();
            });
        }
        let correctLabel = eff[correctOpt] ? correctOpt+' '+eff[correctOpt] : correctOpt;
        let wrongLabel  = eff[wrongOpt]  ? wrongOpt+' '+eff[wrongOpt]  : wrongOpt;
        let isCorrectFirst = Math.random()<0.5;
        let options = isCorrectFirst ? [correctLabel, wrongLabel] : [wrongLabel, correctLabel];
        questions.push({
            id:'P'+(idx+1),
            symptoms:q.symptoms,
            options:options,
            answer:isCorrectFirst?'A':'B',
            explanation:q.explanation
        });
    });
    return questions;
}

function getData(){
    if(currentMode==='pattern')return PATTERN_DATA;
    if(!cachedDiscernData)cachedDiscernData=getDiscernQuestions();
    return cachedDiscernData;
}

function getSeen(){try{return JSON.parse(localStorage.getItem(SEEN_KEY))||{}}catch(e){return{}}}
function saveSeen(s){try{localStorage.setItem(SEEN_KEY,JSON.stringify(s))}catch(e){}}

function buildFilter(){
const data=getData(),s=MODE_SIZES[currentMode],seen=getSeen();
let pool=[];
for(let i=0;i<data.length;i++){if(!seen[currentMode]||!seen[currentMode][i])pool.push(i)}
if(pool.length<s){if(seen[currentMode]){for(let k in seen[currentMode])delete seen[currentMode][k]}saveSeen(seen);pool=[];for(let i=0;i<data.length;i++)pool.push(i)}
for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
filteredIndices=pool.slice(0,Math.min(s,pool.length));currentIndex=0;
answered={};results={};totalAnswered=0;correctCount=0;

// 为每个题目生成并显示顺序（只生成一次）
questionDisplayOrders={};
filteredIndices.forEach(idx=>{
    if(currentMode==='pattern'){
        let order=[0,1,2,3];
        for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]]}
        questionDisplayOrders[idx]=order;
    }else{
        questionDisplayOrders[idx]=[0,1];
    }
});
}

function markSeen(i){const s=getSeen();if(!s[currentMode])s[currentMode]={};s[currentMode][i]=true;saveSeen(s)}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}

function renderQ(){
stopTimer();const area=document.getElementById('questionArea'),data=getData();
if(!filteredIndices.length){area.innerHTML='<div class="empty-state"><h3>题库用完</h3><button class="score-btn" onclick="resetAll()">重置题库</button></div>';updStats();return}
if(currentIndex>=filteredIndices.length){showScore();return}
const idx=filteredIndices[currentIndex],q=data[idx],isAns=answered[idx]!==undefined,isCor=results[idx];
const modeLabel=currentMode==='pattern'?'看案辨证':'鉴别冲刺';
const allDone=filteredIndices.every(i=>answered[i]!==undefined),isLast=currentIndex===filteredIndices.length-1;

// 从缓存读取本题的显示顺序（buildFilter时已生成，不再重新随机）
currentDisplayOrder = questionDisplayOrders[idx] || (currentMode==='pattern'?[0,1,2,3]:[0,1]);

const labels=currentMode==='discern'?['A','B']:['A','B','C','D'];

// 渲染选项：用currentDisplayOrder映射
let ops = currentDisplayOrder.map((origIdx,i)=>{
    const o = q.options[origIdx];
    let c='option',d='';
    if(isAns){
        d='disabled';
        if(results[idx]==='timeout')c+=' timeout';
        else if(isAnsCorrect(q, origIdx))c+=' correct';
        else if(answered[idx]===origIdx)c+=' wrong';
    }
    return '<button class="'+c+'" onclick="selOptIdx('+idx+','+origIdx+')" '+d+'>'+labels[i]+'. '+o+'</button>';
}).join('');

// 反馈：显示答案文本
let ansText;
if(currentMode==='pattern'){
    // PATTERN模式：answer可能是答案文本，也可能是"A"/"B"/"C"/"D"
    if(q.answer==='A'||q.answer==='B'||q.answer==='C'||q.answer==='D'){
        let correctIdx = {'A':0,'B':1,'C':2,'D':3}[q.answer];
        ansText = q.options[correctIdx];
    } else {
        ansText = q.answer;
    }
} else {
    ansText = q.answer==='A'?q.options[0]:q.options[1];
}
let fb='';
if(isAns){
    const fc=results[idx]==='timeout'?'timeout':(isCor?'correct':'wrong'),
          ft=results[idx]==='timeout'?'超时':(isCor?'正确！':'错误');
    fb='<div class="feedback show '+fc+'"><div class="feedback-title">'+ft+'</div><div class="feedback-detail">答案：<strong>'+ansText+'</strong></div><div class="feedback-detail">'+q.explanation+'</div></div>'
}

let timer='';if(currentMode==='discern'&&!isAns)timer='<div class="timer-bar" id="tBar"><span>倒计时</span><div class="timer-track"><div class="timer-fill" id="tFill" style="width:100%"></div></div><span class="timer-text" id="tText">60s</span></div>';
let nav='';if(allDone&&isLast)nav='<div class="nav-buttons"><button class="nav-btn" onclick="prevQ()" '+(currentIndex===0?'disabled':'')+'>上一题</button><button class="nav-btn primary" onclick="showScore()">答完交卷</button></div>';
else nav='<div class="nav-buttons"><button class="nav-btn" onclick="prevQ()" '+(currentIndex===0?'disabled':'')+'>上一题</button><span style="font-size:13px;color:var(--text-secondary);align-self:center;">'+(currentIndex+1)+'/'+filteredIndices.length+'</span><button class="nav-btn primary" onclick="nextQ()">'+(isLast?'交卷':'下一题')+'</button></div>';
area.innerHTML='<div class="question-card"><div class="question-mode-badge">'+modeLabel+'</div>'+timer+'<div class="question-text">'+q.symptoms+'</div><div class="options">'+ops+'</div>'+fb+nav+'</div>';
updStats();window.scrollTo({top:0,behavior:'smooth'});
if(currentMode==='discern'&&!isAns){let t=60;const f=document.getElementById('tFill'),tx=document.getElementById('tText'),b=document.getElementById('tBar');if(!f||!tx)return;stopTimer();timerInterval=setInterval(()=>{t--;if(f)f.style.width=(t/60)*100+'%';if(tx)tx.textContent=t+'s';if(b&&t<=10)b.classList.add('warning');if(t<=0){stopTimer();if(answered[idx]===void 0){answered[idx]=-1;results[idx]='timeout';totalAnswered++;renderQ()}}},1000)}
}

// isAnsCorrect：接受原始索引，直接比较
// PATTERN模式 answer 有两种格式：答案文本 或 "A"/"B"/"C"/"D"
function isAnsCorrect(q, clickedOrigIdx){
    if(currentMode==='pattern'){
        let correctIdx;
        if(q.answer==='A'||q.answer==='B'||q.answer==='C'||q.answer==='D'){
            // answer是"A"/"B"/"C"/"D"，对应原始options的索引
            correctIdx = {'A':0,'B':1,'C':2,'D':3}[q.answer];
        } else {
            // answer是答案文本，在options中查找
            correctIdx = q.options.indexOf(q.answer);
        }
        return correctIdx === clickedOrigIdx;
    } else {
        // DISCERN模式：q.answer是"A"或"B"
        if(q.answer==='A'&&clickedOrigIdx===0)return true;
        if(q.answer==='B'&&clickedOrigIdx===1)return true;
        return false;
    }
}

function selOptIdx(qi, origIdx){
    if(answered[qi]!==void 0)return;
    stopTimer();
    const d=getData(),q=d[qi];
    answered[qi]=origIdx;
    results[qi]=isAnsCorrect(q, origIdx);
    if(results[qi])correctCount++;
    totalAnswered++;
    markSeen(qi);
    renderQ();
}

function nextQ(){if(currentIndex<filteredIndices.length-1)currentIndex++;renderQ()}
function prevQ(){if(currentIndex>0)currentIndex--;renderQ()}
function showScore(){stopTimer();const t=filteredIndices.length,p=t?Math.round(correctCount/t*100):0,g=p>=90?'卓越':p>=70?'良好':p>=50?'继续加油':'需加强',gc=p>=90?'#2E7D32':p>=70?'#F57F17':'#C62828',mn={pattern:'看案辨证',discern:'鉴别冲刺'};document.getElementById('questionArea').innerHTML='<div class="score-card"><h2>'+g+'</h2><div class="score-circle" style="background:'+(p>=70?'#E8F5E9':'#FFEBEE')+';color:'+gc+'">'+p+'%</div><div class="score-detail"><p>'+mn[currentMode]+'</p><p>答对 <strong>'+correctCount+'</strong>/<strong>'+t+'</strong></p></div><button class="score-btn" onclick="nextRound()">再来一组（不重复）</button><br><button class="score-btn" style="background:#999;margin-top:10px;border-radius:8px" onclick="resetAll()">重置全部题库</button></div>';updStats()}
function nextRound(){buildFilter();renderQ()}
function resetAll(){try{localStorage.removeItem(SEEN_KEY)}catch(e){};cachedDiscernData=null;questionDisplayOrders={};buildFilter();renderQ()}
function updStats(){const t=filteredIndices.length;document.getElementById('qNum').textContent=totalAnswered+'/'+t;document.getElementById('accuracy').textContent=(totalAnswered?Math.round(correctCount/totalAnswered*100):0)+'%';document.getElementById('progressFill').style.width=(t?Math.round(totalAnswered/t*100):0)+'%'}
function switchMode(m){stopTimer();currentMode=m;cachedDiscernData=null;questionDisplayOrders={};document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));document.querySelector('.mode-tab[data-mode="'+m+'"]').classList.add('active');buildFilter();renderQ()}
buildFilter();renderQ();
(function(){const tb=document.getElementById('jumpTopBtn');window.addEventListener('scroll',function(){tb.classList.toggle('show',window.scrollY>300)},{passive:true});const fb=document.getElementById('fontSizeBtn'),fp=document.getElementById('fontPopup'),sz=['font-small','font-normal','font-large','font-xlarge'];function as(s){sz.forEach(x=>document.body.classList.remove(x));if(s!=='font-normal')document.body.classList.add(s);try{localStorage.setItem('446f',s)}catch(e){};document.querySelectorAll('.font-option').forEach(el=>el.classList.toggle('active',el.dataset.size===s))}fb.addEventListener('click',function(e){e.stopPropagation();fp.classList.toggle('show')});document.querySelectorAll('.font-option').forEach(el=>{el.addEventListener('click',function(){as(this.dataset.size);fp.classList.remove('show')})});document.addEventListener('click',function(e){if(!fp.contains(e.target)&&e.target!==fb)fp.classList.remove('show')});try{var s=localStorage.getItem('446f');if(s&&sz.includes(s))as(s)}catch(e){}})();
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight')nextQ();if(e.key==='ArrowLeft')prevQ()});
</script></body></html>
