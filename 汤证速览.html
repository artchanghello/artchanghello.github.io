.key-row .row-val{color:var(--text);font-weight:500}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}

let curSec='all',curQ='';
const secs=[...new Set(D.map(f=>f.section))].filter(Boolean);
const cs=s=>{let r=s.replace(/^[一二三四五六七八九十百]+\u3001/,'').replace(/（[^）]*）/g,'').trim();return r};
const tw=document.getElementById('tabWrap');
secs.forEach(s=>{const b=document.createElement('button');b.className='tab-btn';b.textContent=cs(s);b.dataset.sec=s;b.onclick=()=>sec(s);tw.appendChild(b)});

function sec(s){curSec=s;document.querySelectorAll('.tab-btn').forEach(t=>t.classList.remove('active'));const tb=document.querySelector('.tab-btn[data-sec="'+s+'"]');if(tb){tb.classList.add('active');tb.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'})}go()}

function go(){
  curQ=document.getElementById('s').value.trim();
  const f=D.filter(f=>{
    if(curSec!=='all'&&f.section!==curSec)return false;
    if(!curQ)return true;
    return (f.name+f.type446+f.plain+f.pattern_name+f.key_symptoms+f.bagang+f.she_mai+f.mechanism).toLowerCase().includes(curQ.toLowerCase());
