* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {

}

}

}
.album-art::before {

.album-art::after {

}
.song-meta { flex: 1; min-width: 0; }
.song-meta .title {
  font-family: var(--font-heading);
  font-size: var(--fs-body);
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.song-meta .artist {
  font-size: var(--fs-small);

  margin-top: 2px;
}
.song-meta .duration {

}

/* ===== Progress ===== */
.progress-area {

  gap: 10px;

  color: var(--text-secondary);

}
.progress-bar-wrap {
  flex: 1;
  height: 4px;

  border-radius: 2px;
  cursor: pointer;
  position: relative;
  transition: height 150ms ease;
}
.progress-bar-wrap:hover { height: 6px; }
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
  position: relative;

}
.progress-bar-fill::after {
  content: '';

}

}

.controls button svg { width: 20px; height: 20px; }

.mode-row {

// ============================================================
// LRC Parser
// ============================================================
function parseLRC(text) {
  const lines = [];
  const regex = /\[(\d{2}):(\d{2})\.(\d{2})\](.*)/;
  text.split('\n').forEach(line => {
    const m = line.match(regex);
    if (m) {
      const time = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3]) / 100;
      const text = m[4].trim();
      if (text) lines.push({ time, text });
    }
  });
  lines.sort((a, b) => a.time - b.time);
  return lines;
}

// ============================================================
// Load Song
// ============================================================

  const song = SONGS[index];
  if (!song) return;

  songTitle.textContent = song.title;
  songArtist.textContent = song.artist;
  audio.src = song.src;
  audio.load();
  currentLineIdx = -1;
  lyricLines = [];

  // Load LRC (inline, avoid file:// fetch restriction)
  lyricLines = parseLRC(LRC_DATA);
  renderLyrics();
}

// ============================================================
// Render Lyrics
// ============================================================
function renderLyrics() {
  lyricsViewport.innerHTML = '';
  lyricLineEls = [];

  if (lyricLines.length === 0) return;

  lyricLines.forEach((line, i) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    div.textContent = line.text;
    div.dataset.index = i;
    div.addEventListener('click', () => {
      audio.currentTime = line.time;
      if (!isPlaying) {
        audio.play();
      }
    });
    lyricsViewport.appendChild(div);
    lyricLineEls.push(div);
  });
}

// ============================================================
// Update Lyrics
// ============================================================
function updateLyrics(currentTime) {
  if (lyricLines.length === 0 || lyricLineEls.length === 0) return;

  // Find current line
  let newIdx = -1;
  for (let i = lyricLines.length - 1; i >= 0; i--) {
    if (currentTime >= lyricLines[i].time) {
      newIdx = i;
      break;
    }
  }

  if (newIdx === currentLineIdx) return;
  currentLineIdx = newIdx;

  lyricLineEls.forEach((el, i) => {
    el.className = 'lyric-line';
    if (i < currentLineIdx) el.classList.add('past');
    else if (i === currentLineIdx) el.classList.add('active');
  });

  // Scroll active line into center
  if (currentLineIdx >= 0 && lyricLineEls[currentLineIdx]) {
    const el = lyricLineEls[currentLineIdx];
    const viewportRect = lyricsViewport.getBoundingClientRect();
    const elRect = el.getBoundingClientRect();
    const offset = elRect.top - viewportRect.top - viewportRect.height / 2 + elRect.height / 2;
    lyricsViewport.scrollBy({ top: offset, behavior: 'smooth' });
  }
}

// ============================================================
// Player Controls
// ============================================================
function togglePlay() {
  if (audio.paused) {
    audio.play();
  } else {
    audio.pause();
  }
}

function updatePlayButton(playing) {
  isPlaying = playing;
  playIcon.style.display = playing ? 'none' : '';
  pauseIcon.style.display = playing ? '' : 'none';
}

function formatTime(s) {
  if (isNaN(s)) return '00:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
}

function updateProgress() {
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  progressFill.style.width = pct + '%';
  timeCurrent.textContent = formatTime(audio.currentTime);
}

function getNextIndex() {
  if (playMode === 'once') return currentIndex;
  if (playMode === 'shuffle') {
    let next;
    do { next = Math.floor(Math.random() * SONGS.length); } while (next === currentIndex && SONGS.length > 1);
    return next;
  }
  // repeat
  return (currentIndex + 1) % SONGS.length;
}

function getPrevIndex() {
  if (playMode === 'shuffle') {
    let prev;
    do { prev = Math.floor(Math.random() * SONGS.length); } while (prev === currentIndex && SONGS.length > 1);
    return prev;
  }
  return (currentIndex - 1 + SONGS.length) % SONGS.length;
}

function nextSong() {
  currentIndex = getNextIndex();
  loadSong(currentIndex);
  audio.play();
}

function prevSong() {
  // If more than 3s in, restart current song
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  currentIndex = getPrevIndex();
  loadSong(currentIndex);
  audio.play();
}

// ============================================================
// Play Mode
// ============================================================
function setMode(mode) {
  playMode = mode;
  modeBtns.forEach(btn => {
    btn.classList.toggle('active', btn.dataset.mode === mode);
  });
}

modeBtns.forEach(btn => {
  btn.addEventListener('click', () => setMode(btn.dataset.mode));
});

// ============================================================
// Event Listeners
// ============================================================
btnPlay.addEventListener('click', togglePlay);
btnPrev.addEventListener('click', prevSong);
btnNext.addEventListener('click', nextSong);

audio.addEventListener('play', () => updatePlayButton(true));
audio.addEventListener('pause', () => updatePlayButton(false));
audio.addEventListener('ended', nextSong);

audio.addEventListener('timeupdate', () => {
  if (!isSeeking) updateProgress();
  updateLyrics(audio.currentTime);
});

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = formatTime(audio.duration);
  songDuration.textContent = formatTime(audio.duration);
});

// Progress bar seeking
let isDragging = false;

progressWrap.addEventListener('mousedown', (e) => {
  isDragging = true;
  isSeeking = true;
  setProgressFromEvent(e);
});
document.addEventListener('mousemove', (e) => {
  if (isDragging) setProgressFromEvent(e);
});
document.addEventListener('mouseup', () => {
  if (isDragging) {
    isDragging = false;
    isSeeking = false;
  }
});

// Touch support
progressWrap.addEventListener('touchstart', (e) => {
  isDragging = true;
  isSeeking = true;
  setProgressFromEvent(e.touches[0]);
});
document.addEventListener('touchmove', (e) => {
  if (isDragging) setProgressFromEvent(e.touches[0]);
});
document.addEventListener('touchend', () => {
  if (isDragging) {
    isDragging = false;
    isSeeking = false;
  }
});

function setProgressFromEvent(e) {
  const rect = progressWrap.getBoundingClientRect();
  let pct = (e.clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  progressFill.style.width = (pct * 100) + '%';
  timeCurrent.textContent = formatTime(pct * audio.duration);
  audio.currentTime = pct * audio.duration;
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.currentTime + 10, audio.duration); }
  if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(audio.currentTime - 10, 0); }
  if (e.code === 'ArrowUp') { audio.volume = Math.min(audio.volume + 0.1, 1); }
  if (e.code === 'ArrowDown') { audio.volume = Math.max(audio.volume - 0.1, 0); }
});

// ============================================================
// Init
// ============================================================
loadSong(0);
</script>
</body>
</html>
