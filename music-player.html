<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药材奇问歌 · 446辨证音乐馆</title>
<link rel="icon" href="446-logo-og.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #B45309;
  --primary-light: #D97706;
  --bg-warm: #FFF8F0;
  --bg-card: #FFFFFF;
  --bg-alt: #FFFBEB;
  --text-primary: #292524;
  --text-secondary: #57534E;
  --text-muted: #A8A29E;
  --border: #E7E5E4;
  --font-heading: 'Noto Serif SC', 'Source Han Serif SC', serif;
  --font-body: 'Noto Sans SC', 'Source Han Sans SC', sans-serif;
  --fs-h1: clamp(1.6rem, 4vw, 2rem);
  --fs-body: clamp(0.95rem, 2vw, 1.05rem);
  --fs-lyrics: clamp(1.05rem, 2.8vw, 1.2rem);
  --fs-small: clamp(0.85rem, 1.5vw, 0.9rem);
  --fs-caption: 0.75rem;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 48px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-elevated: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.03);
  --transition-base: 250ms ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg-warm);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ===== Navbar ===== */
.navbar {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 var(--space-lg);
  height: 64px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.navbar .logo {
  font-family: var(--font-heading);
  font-size: 20px; font-weight: 700;
  color: var(--text-primary);
  text-decoration: none;
  letter-spacing: 1px;
}
.navbar .logo span { color: var(--primary); }
.nav-links { display: flex; align-items: center; gap: var(--space-sm); }
.home-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 18px;
  background: var(--primary);
  color: white !important;
  border-radius: var(--radius-sm);
  text-decoration: none;
  font-size: var(--fs-small); font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  transition: background var(--transition-base), transform 150ms ease;
}
.home-btn:hover {
  background: #92400E;
  transform: translateY(-1px);
}
.home-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* ===== Hero ===== */
.hero {
  text-align: center;
  padding: 20px 20px 24px;
}
.hero-icon {
  width: 88px;
  height: 88px;
  margin: 0 auto 16px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FDE68A, #FCD34D 40%, #F59E0B);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(245,158,11,0.2);
  position: relative;
  overflow: hidden;
}
.hero-icon::after {
  content: '藥';
  font-family: var(--font-heading);
  font-size: 44px;
  font-weight: 700;
  color: rgba(180,83,9,0.12);
  position: absolute;
  bottom: -6px;
  right: -6px;
  transform: rotate(-15deg);
}
.hero-icon svg {
  width: 40px;
  height: 40px;
  color: #B45309;
  opacity: 0.7;
}
.hero h1 {
  font-family: var(--font-heading);
  font-size: var(--fs-h1);
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 1px;
}
.hero .artist {
  font-size: var(--fs-small);
  color: var(--text-secondary);
  margin-top: 4px;
}

/* ===== Player ===== */
.player-card {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 20px;
}
.player-inner {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 20px 24px;
}

/* Progress */
.progress-area {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: var(--fs-caption);
  color: var(--text-secondary);
  font-variant-numeric: tabular-nums;
}
.progress-bar-wrap {
  flex: 1;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
  transition: height 150ms ease;
}
.progress-bar-wrap:hover { height: 6px; }
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 2px;
  position: relative;
  transition: width 200ms linear;
}
.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--primary);
  opacity: 0;
  transition: opacity var(--transition-base);
}
.progress-bar-wrap:hover .progress-bar-fill::after { opacity: 1; }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 16px 0 4px;
}
.btn-play {
  width: 56px;
  height: 56px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 10px rgba(180,83,9,0.25);
  transition: all var(--transition-base);
}
.btn-play:hover { box-shadow: 0 5px 18px rgba(180,83,9,0.35); }
.btn-play:active { transform: scale(0.94); }
.btn-play svg { width: 26px; height: 26px; }
.btn-play .pause-icon { display: none; }
.btn-play.playing .play-icon { display: none; }
.btn-play.playing .pause-icon { display: block; }

/* ===== Lyrics ===== */
.lyrics-wrap {
  max-width: 640px;
  margin: 0 auto;
  padding: 0 20px 48px;
}
.lyrics-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-card);
  padding: 20px;
}
.lyric-line {
  padding: 8px 12px;
  text-align: center;
  font-family: var(--font-heading);
  font-size: var(--fs-lyrics);
  line-height: 1.8;
  letter-spacing: 0.03em;
  color: var(--text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
}
.lyric-line.topic {
  margin-top: 28px;
  position: relative;
}
.lyric-line.topic::before {
  content: '';
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
}

/* ===== Footer ===== */
.footer-bar {
  text-align: center;
  padding: 0 20px 32px;
}
.footer-bar a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: var(--fs-small);
  transition: color var(--transition-base);
}
.footer-bar a:hover { color: var(--primary); }

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .hero { padding: 12px 16px 20px; }
  .hero-icon { width: 72px; height: 72px; }
  .hero-icon::after { font-size: 34px; }
  .hero-icon svg { width: 32px; height: 32px; }
  .player-inner { padding: 16px; }
  .btn-play { width: 50px; height: 50px; }
  .btn-play svg { width: 22px; height: 22px; }
  .lyrics-card { padding: 14px; }
  .lyric-line { padding: 6px 8px; }
  .lyric-line.topic { margin-top: 20px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="logo">446<span>·</span>音乐馆</a>

<!-- Hero -->
<div class="hero">

      <circle cx="12" cy="12" r="10"/>
      <path d="M9 9c0-1.7 1.3-3 3-3s3 1.3 3 3c0 1.3-1.4 1.5-1.8 3.2"/>

  <h1>药材奇问歌</h1>

<!-- Player -->
<div class="player-card">
  <div class="player-inner">

        <svg class="play-icon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg class="pause-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>

</div>

<!-- Lyrics -->
<div class="lyrics-wrap">

<div class="footer-bar">

<!-- Audio -->
<audio id="audio" preload="auto" src="music/药材奇问歌.mp3"></audio>

<script>
// ============================================================
// LRC Data
// ============================================================
const LRC_DATA = `\
[ti:药材奇问歌]
[ar:AI]
[by:446辨证体系]
[00:00.00]老中医把病瞧 十八般武艺怀中揣好
[00:03.75]谁气虚谁血少 一把草药见分晓
[00:07.50]这是本草的战场 是辨证的较量
[00:11.25]八十味药心中藏 每味都有它的强项
[00:15.00]人没力气怎么办 气短懒言怎么办
[00:21.25]生黄芪固表托疮走全身 人参大补元气是救命丸
[00:27.50]炙甘草调和诸药像个和事官 白术健脾燥湿把源头管
[00:33.75]糯米救脱像救火不能晚 粳米养胃白虎汤里把家安
[00:40.00]寒从骨子里透出来怎么办
[00:46.25]附子回阳救逆谁敢拦 干姜守中焦暖胃肠
[00:52.50]桂枝通阳化气十二经都走完 生姜止呕开胃也是温阳的好搭档
[00:58.75]吴茱萸降逆散寒力量强 寒凝一碰它就散

[01:21.50]大枣养血安神家常必有
[01:27.00]口干舌燥火往上冒怎么办
[01:33.25]麦冬养阴润肺清心安 知母清热泻火把津液添
[01:39.50]百合润肺清心不简单 火麻仁润肠通便不伤阴
[01:45.75]山药补脾固肾平补最稳 麦芽糖缓急止痛甘甜入口
[01:52.00]久泻不止收不住怎么办
[01:58.25]赤石脂禹余粮涩肠固脱来接班
[02:04.50]龙骨镇惊安神潜阳不散 牡蛎平肝潜阳软坚一揽子
[02:10.75]五味子五味俱全敛汗又生津 山茱萸补益肝肾固脱最专
[02:17.00]正气存内邪不可干 药为兵将证为关
[02:21.50]气虚黄芪参术甘 温阳附子干姜悍
[02:26.00]血虚归芍地胶枣 阴虚麦冬知母百合坛
[02:30.50]本草如兵各有长 辨证清楚就是王
[02:35.00]胀满不通怎么办 气滞的人胸闷烦
[02:40.50]柴胡疏肝解郁把气升 枳实破气消积像个推土机
[02:46.00]厚朴下气除满燥湿行 川芎活血行气是血中气药
[02:51.50]气滞血瘀一次清 气顺了人才轻松
[02:57.00]刺痛不移怎么办 瘀血堵在哪疼在哪
[03:02.50]桃仁红花破血化瘀往前杀 赤芍丹皮凉血活血灭瘀炸
[03:08.00]牛膝引血下行补肝肾下 地龙通经络走窜不拖沓
[03:13.50]血府逐瘀桃红四物都是当家花
[03:19.00]痰多水肿怎么办 水湿泛滥体内乱
[03:24.50]半夏降逆止呕化痰最猛 陈皮理气健脾湿气散
[03:30.00]茯苓利水渗湿安神又健脾 猪苓泽泻利水消肿通淋道
[03:35.50]薏苡仁健脾利湿舒筋好 防己祛风利水双腿轻巧
[03:41.00]热得像火烧怎么办 邪热嚣张谁来挡
[03:46.19]石膏泻火除烦白虎汤的主将 大黄泻下攻积把肠道清场
[03:51.40]黄连黄芩黄柏三兄弟苦寒力量 栀子泻火利湿除烦闷
[03:56.59]茵陈蒿利胆退黄治阳黄 白头翁治热毒血痢专攻
[04:01.80]芒硝润燥软坚通便不慌 清热大军一出手邪气全投降
[04:07.00]感冒怕冷不出汗怎么办
[04:12.00]麻黄发汗散寒第一把好伞 细辛温肺化饮散寒通窍管
[04:17.00]荆芥防风祛风胜湿家常老搭档 苍术燥湿健脾又祛风不忙乱
[04:22.00]解表的药一下肚 浑身轻松寒气散
[04:27.00]嗓子疼发烧怎么办
[04:31.39]金银花连翘清热解毒风热散 牛蒡子利咽消肿有奇算
[04:35.80]薄荷疏散风热头目清亮 桑叶清肺润燥明目又凉
[04:40.19]枇杷叶降逆止咳不慌 葛根解肌生津又止泻
[04:44.60]升麻发表透疹把毒清场 风热一退百病让
[04:49.00]八十味药记住了 辨证用药路路通
[04:54.50]气虚补气先辨清 温阳附子干姜雄
[05:00.00]血虚当归芍地枣 滋阴麦冬知母逢
[05:05.50]利水茯苓猪苓泽 清热石膏连栀攻
[05:11.00]外感麻黄桂枝起 风热银翘薄荷从
[05:16.50]闭目一想药性在 从此开方不慌张
`;

// ============================================================
// State
// ============================================================
let isSeeking = false;

const audio = document.getElementById('audio');
const btnPlay = document.getElementById('btnPlay');
const progressFill = document.getElementById('progressFill');
const progressWrap = document.getElementById('progressWrap');
const timeCurrent = document.getElementById('timeCurrent');
const timeTotal = document.getElementById('timeTotal');
const lyricsSection = document.getElementById('lyricsSection');

// ============================================================
// LRC Parser
// ============================================================
function parseLRC(text) {
  const lines = [];
  const regex = /\[(\d{2}):(\d{2})\.(\d{2})\](.*)/;
  text.split('\n').forEach(line => {
    const m = line.match(regex);
    if (m) {
      const time = parseInt(m[1]) * 60 + parseInt(m[2]) + parseInt(m[3]) / 100;
      const text = m[4].trim();
      if (text) lines.push({ time, text });
    }
  });
  lines.sort((a, b) => a.time - b.time);
  return lines;
}

// ============================================================
// Render Lyrics
// ============================================================
function renderLyrics() {
  lyricsSection.innerHTML = '';
  lyricLines.forEach((line) => {
    const div = document.createElement('div');
    div.className = 'lyric-line';
    const isTopic = line.text.includes('怎么办')
      || line.text.startsWith('正气存内')
      || line.text.startsWith('本草如兵')
      || line.text.startsWith('八十味药记住了')
      || line.text.startsWith('闭目一想');
    if (isTopic) div.classList.add('topic');
    div.textContent = line.text;
    lyricsSection.appendChild(div);
  });
}

// ============================================================
// Player Controls
// ============================================================
function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

function updatePlayButton() {
  btnPlay.classList.toggle('playing', !audio.paused);
}

function formatTime(s) {
  if (isNaN(s)) return '00:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
}

function updateProgress() {
  const pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  progressFill.style.width = pct + '%';
  timeCurrent.textContent = formatTime(audio.currentTime);
}

// ============================================================
// Seek
// ============================================================
let isDragging = false;

function setProgressFromEvent(e) {
  const rect = progressWrap.getBoundingClientRect();
  let pct = (e.clientX - rect.left) / rect.width;
  pct = Math.max(0, Math.min(1, pct));
  progressFill.style.width = (pct * 100) + '%';
  timeCurrent.textContent = formatTime(pct * audio.duration);
  audio.currentTime = pct * audio.duration;
}

progressWrap.addEventListener('mousedown', (e) => { isDragging = true; isSeeking = true; setProgressFromEvent(e); });
document.addEventListener('mousemove', (e) => { if (isDragging) setProgressFromEvent(e); });
document.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; isSeeking = false; } });

progressWrap.addEventListener('touchstart', (e) => { isDragging = true; isSeeking = true; setProgressFromEvent(e.touches[0]); });
document.addEventListener('touchmove', (e) => { if (isDragging) setProgressFromEvent(e.touches[0]); });
document.addEventListener('touchend', () => { if (isDragging) { isDragging = false; isSeeking = false; } });

// ============================================================
// Event Listeners
// ============================================================
btnPlay.addEventListener('click', togglePlay);
audio.addEventListener('play', updatePlayButton);
audio.addEventListener('pause', updatePlayButton);
audio.addEventListener('ended', () => { audio.currentTime = 0; updatePlayButton(); });

audio.addEventListener('timeupdate', () => {
  if (!isSeeking) updateProgress();
});

audio.addEventListener('loadedmetadata', () => {
  timeTotal.textContent = formatTime(audio.duration);
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') { audio.currentTime = Math.min(audio.currentTime + 10, audio.duration); }
  if (e.code === 'ArrowLeft') { audio.currentTime = Math.max(audio.currentTime - 10, 0); }
  if (e.code === 'ArrowUp') { audio.volume = Math.min(audio.volume + 0.1, 1); }
  if (e.code === 'ArrowDown') { audio.volume = Math.max(audio.volume - 0.1, 0); }
});

// ============================================================
// Init
// ============================================================
lyricLines = parseLRC(LRC_DATA);
renderLyrics();
</script>
</body>
</html>
